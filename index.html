<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Hub</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f1a;
  color: white;
}

/* LOGIN */
#loginScreen {
  text-align: center;
  padding: 100px 20px;
}

#loginScreen input {
  padding: 10px;
  width: 200px;
}

#loginScreen button {
  padding: 10px 20px;
  margin-top: 10px;
}

/* HEADER */
header {
  padding: 20px;
  text-align: center;
  background: #1a1a2e;
}

#search {
  margin-top: 10px;
  padding: 10px;
  width: 60%;
  border-radius: 8px;
  border: none;
}

/* ===== GAMES GRID (3 PER ROW) ===== */
.game-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  padding: 10px;
}

/* ===== EXCLUSIVES VERTICAL ===== */
.exclusives-list {
  display: flex;
  flex-direction: column;
  gap: 15px;
  padding: 10px;
  max-height: 500px;
  overflow-y: auto;
}

/* CARD */
.game-card {
  background: #1a1a2e;
  border-radius: 12px;
  overflow: hidden;
  text-align: center;
}

.game-card img {
  width: 100%;
  height: 140px;
  object-fit: cover;
}

.game-info {
  padding: 10px;
}

.game-card button {
  margin-top: 10px;
  padding: 8px 15px;
  border: none;
  background: #4c6fff;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

/* FOOTER */
footer {
  margin-top: 40px;
  padding: 20px;
  background: #1a1a2e;
  text-align: center;
}

a {
  color: #4c6fff;
  margin: 0 10px;
  cursor: pointer;
}

/* MOBILE */
@media (max-width: 700px) {
  .game-grid {
    grid-template-columns: repeat(3, 1fr);
    font-size: 12px;
  }
  .game-card img {
    height: 90px;
  }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <h2>Login to Rift Hub</h2>
  <input type="text" id="usernameInput" placeholder="Enter username">
  <br>
  <button onclick="login()">Login</button>
</div>

<!-- SITE -->
<div id="site" style="display:none;">

<header>
  <h1>🎮 Rift Hub 🎮</h1>
  <p>Welcome, <span id="username"></span>!</p>
  <input type="text" id="search" placeholder="Search games...">
</header>

<!-- GAMES -->
<section>
  <h2 align="center">Games</h2>

  <div class="game-grid">

    <div class="game-card" data-name="snake">
      <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/Nokia_6110_Snake_game.png">
      <div class="game-info">
        <h3>Snake</h3>
        <button onclick="openGame('snake.html','Snake','https://via.placeholder.com/400x200?text=Snake')">Play</button>
      </div>
    </div>

    <div class="game-card" data-name="tetris">
      <img src="https://upload.wikimedia.org/wikipedia/en/0/0a/Tetris_Game_Boy.jpg">
      <div class="game-info">
        <h3>Tetris</h3>
        <button onclick="openGame('tetris.html','Tetris','https://via.placeholder.com/400x200?text=Tetris')">Play</button>
      </div>
    </div>

    <div class="game-card" data-name="pong">
      <img src="https://upload.wikimedia.org/wikipedia/commons/6/6a/Pong_Game_Test2.gif">
      <div class="game-info">
        <h3>Pong</h3>
        <button onclick="openGame('pong.html','Pong','https://via.placeholder.com/400x200?text=Pong')">Play</button>
      </div>
    </div>

  </div>
</section>

<!-- EXCLUSIVES -->
<section>
  <h2 align="center">🔥 Rift Hub Exclusives 🔥</h2>

  <div class="exclusives-list">

    <div class="game-card" data-name="rift-runner">
      <div class="game-info">
        <h3>Rift Runner</h3>
        <button onclick="openGame('riftrunner.html','Rift Runner','https://via.placeholder.com/400x200/ff4c4c?text=Rift+Runner')">Play</button>
      </div>
    </div>

    <div class="game-card" data-name="rift-defense">
      <div class="game-info">
        <h3>Rift Defense</h3>
        <button onclick="openGame('riftdefense.html','Rift Defense','https://via.placeholder.com/400x200/00ff99?text=Rift+Defense')">Play</button>
      </div>
    </div>

  </div>
</section>

<!-- RECENTLY PLAYED -->
<section>
  <h2 align="center">🕘 Recently Played</h2>
  <div class="game-grid" id="historyGrid"></div>
</section>

</div>

<!-- FOOTER -->
<footer>
  <h3>Rift Hub</h3>

  <p style="max-width:600px; margin:auto; font-size:14px;">
    Rift Hub is a free browser game platform with fun mini-games and exclusives.
  </p>

  <div style="margin-top:15px;">
    <a onclick="alert('About Rift Hub:\nStudent-made game hub with browser games and exclusives.')">About</a>

    <a onclick="alert('Contact:\nofficialrifthub@gmail.com')">Contact</a>

    <a onclick="alert('Privacy Policy:\n\n- We store only username locally\n- No tracking\n- No cookies')">Privacy</a>
  </div>

  <small>© 2026 Rift Hub</small>
</footer>

<script>

/* LOGIN */
function login() {
  const username = document.getElementById("usernameInput").value;

  if (!username.trim()) {
    alert("Enter a username");
    return;
  }

  localStorage.setItem("riftUsername", username);
  loadUser();
}

function loadUser() {
  const username = localStorage.getItem("riftUsername");

  if (username) {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("site").style.display = "block";
    document.getElementById("username").textContent = username;
  }
}

loadUser();

/* OPEN GAME + SAVE HISTORY */
function openGame(page, name, img) {
  saveHistory(name, page, img);
  window.location.href = page;
}

/* HISTORY SYSTEM */
function saveHistory(name, page, img) {
  let history = JSON.parse(localStorage.getItem("riftHistory")) || [];

  // remove duplicates
  history = history.filter(g => g.name !== name);

  // add newest first
  history.unshift({ name, page, img });

  // ✅ LIMIT TO 3 ONLY (THIS IS THE CHANGE)
  history = history.slice(0, 3);

  localStorage.setItem("riftHistory", JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  const grid = document.getElementById("historyGrid");
  let history = JSON.parse(localStorage.getItem("riftHistory")) || [];

  grid.innerHTML = history.map(g => `
    <div class="game-card">
      <img src="${g.img}">
      <div class="game-info">
        <h3>${g.name}</h3>
        <button onclick="openGame('${g.page}','${g.name}','${g.img}')">Play</button>
      </div>
    </div>
  `).join("");
}

renderHistory();

/* SEARCH */
document.getElementById("search").addEventListener("input", function () {
  const value = this.value.toLowerCase();
  const cards = document.querySelectorAll(".game-card");

  cards.forEach(card => {
    const name = card.getAttribute("data-name");
    if (!name) return;

    card.style.display = name.toLowerCase().includes(value) ? "block" : "none";
  });
});
  <audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
document.addEventListener("click", function startMusic() {
    document.getElementById("bgMusic").play();
    document.removeEventListener("click", startMusic);
});
</script>

</script>

</body>
</html>
