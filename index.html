<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Hub</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f1a;
  color: white;
}

#loginScreen {
  text-align: center;
  padding: 100px 20px;
}

#loginScreen input {
  padding: 10px;
  width: 200px;
  margin: 5px;
}

button {
  padding: 8px 15px;
  border: none;
  background: #4c6fff;
  color: white;
  border-radius: 6px;
  cursor: pointer;
  margin-top: 5px;
}

header {
  padding: 20px;
  text-align: center;
  background: #1a1a2e;
}

#search {
  margin-top: 10px;
  padding: 10px;
  width: 60%;
  border-radius: 8px;
  border: none;
}

.game-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  padding: 10px;
}

.exclusives-list {
  display: flex;
  flex-direction: column;
  gap: 15px;
  padding: 10px;
  max-height: 500px;
  overflow-y: auto;
}

.game-card {
  background: #1a1a2e;
  border-radius: 12px;
  text-align: center;
  overflow: hidden;
}

.game-card img {
  width: 100%;
  height: 140px;
  object-fit: cover;
}

.game-info {
  padding: 10px;
}

footer {
  margin-top: 40px;
  padding: 20px;
  background: #1a1a2e;
  text-align: center;
}

a {
  color: #4c6fff;
  margin: 0 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<audio id="bgMusic" autoplay loop>
  <source src="magpiemusic-action-trailer-promo-rock-513687.mp3" type="audio/mpeg">
</audio>


<!-- LOGIN -->
<div id="loginScreen">
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>

  <button onclick="login()">Login</button>
  <button onclick="signup()">Sign Up</button>
</div>

<!-- SITE -->
<div id="site" style="display:none;">

<header>
  <h1>🎮 Rift Hub 🎮</h1>
  <p>Welcome, <span id="username"></span></p>
  <input type="text" id="search" placeholder="Search games...">
</header>

<section>
<h2 align="center">Games</h2>

<div class="game-grid">

  <div class="game-card" data-name="snake">
    <div class="game-info">
      <h3>Snake</h3>
      <button onclick="openGame('snake.html','Snake')">Play</button>
    </div>
  </div>

  <div class="game-card" data-name="tetris">
    <div class="game-info">
      <h3>Tetris</h3>
      <button onclick="openGame('tetris.html','Tetris')">Play</button>
    </div>
  </div>

  <div class="game-card" data-name="pong">
    <div class="game-info">
      <h3>Pong</h3>
      <button onclick="openGame('pong.html','Pong')">Play</button>
    </div>
  </div>
    <div class="game-card" data-name="flappybird">
    <div class="game-info">
      <h3>Flappy Bird</h3>
      <button onclick="openGame('flappybird.html','Flappy Bird')">Play</button>
    </div>
  </div>

</div>
</section>

<section>
<h2 align="center">🔥 Exclusives 🔥</h2>

<div class="exclusives-list">

  <div class="game-card">
    <div class="game-info">
      <h3>Rift Runner</h3>
      <button onclick="openGame('riftrunner.html','Rift Runner','https://via.placeholder.com/400x200/ff4c4c')">Play</button>
    </div>
  </div>

  <div class="game-card">
    <div class="game-info">
      <h3>Rift Defense</h3>
      <button onclick="openGame('riftdefense.html','Rift Defense','https://via.placeholder.com/400x200/00ff99')">Play</button>
    </div>
  </div>

</div>
</section>

<section>
<h2 align="center">🕘 Recently Played</h2>
<div class="game-grid" id="historyGrid"></div>
</section>

</div>

<footer>
<h3>Rift Hub</h3>
<p>Free browser game platform.</p>

<div>
  <a onclick="alert('About: student-made game hub')">About</a>
  <a onclick="alert('Contact: officialrifthub@gmail.com')">Contact</a>
  <a onclick="alert('Privacy: we only store local data')">Privacy</a>
</div>
</footer>

<!-- FIREBASE (ONLY ONE CLEAN VERSION) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyD2XQWUKM4SQO8azXkm2XwG_e9ZQWpYJi0",
  authDomain: "rifthub-4275a.firebaseapp.com",
  projectId: "rifthub-4275a",
  storageBucket: "rifthub-4275a.firebasestorage.app",
  messagingSenderId: "56609352786",
  appId: "1:56609352786:web:55dc5d3b32412bf1e3838b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* LOGIN */
window.login = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(u => loadUser(u.user.email))
    .catch(err => alert(err.message));
};

/* SIGN UP */
window.signup = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(u => loadUser(u.user.email))
    .catch(err => alert(err.message));
};

function loadUser(email) {
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("site").style.display = "block";
  document.getElementById("username").textContent = email;

  document.getElementById("bgMusic").play().catch(() => {});
}

onAuthStateChanged(auth, (user) => {
  if (user) loadUser(user.email);
});

/* GAME + HISTORY */
window.openGame = function (page, name, img) {
  let history = JSON.parse(localStorage.getItem("riftHistory")) || [];

  history = history.filter(g => g.name !== name);
  history.unshift({ name, page, img });
  history = history.slice(0, 3);

  localStorage.setItem("riftHistory", JSON.stringify(history));
  renderHistory();

  window.location.href = page;
};

function renderHistory() {
  const grid = document.getElementById("historyGrid");
  let history = JSON.parse(localStorage.getItem("riftHistory")) || [];

  grid.innerHTML = history.map(g => `
    <div class="game-card">
      <img src="${g.img}">
      <div class="game-info">
        <h3>${g.name}</h3>
        <button onclick="openGame('${g.page}','${g.name}','${g.img}')">Play</button>
      </div>
    </div>
  `).join("");
}

renderHistory();

/* SEARCH (FIXED) */
document.getElementById("search").addEventListener("input", function () {
  const val = this.value.toLowerCase();

  document.querySelectorAll(".game-grid .game-card").forEach(card => {
    const name = card.getAttribute("data-name");
    if (!name) return;

    card.style.display = name.toLowerCase().includes(val) ? "block" : "none";
  });
});
/* MUSIC */

const music = document.getElementById("bgMusic");

/* Very, very quiet */
music.volume = 0.05;
</script>

</body>
</html>
