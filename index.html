<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Hub</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f1a;
  color: white;
}

#loginScreen {
  text-align: center;
  padding: 100px 20px;
}

#loginScreen input {
  padding: 10px;
  width: 200px;
}

#loginScreen button {
  padding: 10px 20px;
  margin-top: 10px;
}

header {
  padding: 20px;
  text-align: center;
  background: #1a1a2e;
}

#search {
  margin-top: 10px;
  padding: 10px;
  width: 60%;
  border-radius: 8px;
  border: none;
}

.game-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  padding: 10px;
}

.exclusives-list {
  display: flex;
  flex-direction: column;
  gap: 15px;
  padding: 10px;
  max-height: 500px;
  overflow-y: auto;
}

.game-card {
  background: #1a1a2e;
  border-radius: 12px;
  overflow: hidden;
  text-align: center;
}

.game-card img {
  width: 100%;
  height: 140px;
  object-fit: cover;
}

.game-info {
  padding: 10px;
}

button {
  margin-top: 10px;
  padding: 8px 15px;
  border: none;
  background: #4c6fff;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

footer {
  margin-top: 40px;
  padding: 20px;
  background: #1a1a2e;
  text-align: center;
}

a {
  color: #4c6fff;
  margin: 0 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <input id="email" placeholder="Email">
<br>
<input id="password" type="password" placeholder="Password">
<br>

<button onclick="login()">Login</button>
<button onclick="signup()">Sign Up</button>
</div>

<!-- SITE -->
<div id="site" style="display:none;">

<header>
  <h1>🎮 Rift Hub 🎮</h1>
  <p>Welcome, <span id="username"></span>!</p>
  <input type="text" id="search" placeholder="Search games...">
</header>

<section>
  <h2 align="center">Games</h2>

  <div class="game-grid">

    <div class="game-card" data-name="snake">
      <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/Nokia_6110_Snake_game.png">
      <div class="game-info">
        <h3>Snake</h3>
        <button onclick="openGame('snake.html','Snake','https://upload.wikimedia.org/wikipedia/commons/6/6b/Nokia_6110_Snake_game.png')">Play</button>
      </div>
    </div>

    <div class="game-card" data-name="tetris">
      <img src="https://upload.wikimedia.org/wikipedia/en/0/0a/Tetris_Game_Boy.jpg">
      <div class="game-info">
        <h3>Tetris</h3>
        <button onclick="openGame('tetris.html','Tetris','https://upload.wikimedia.org/wikipedia/en/0/0a/Tetris_Game_Boy.jpg')">Play</button>
      </div>
    </div>

    <div class="game-card" data-name="pong">
      <img src="https://upload.wikimedia.org/wikipedia/commons/6/6a/Pong_Game_Test2.gif">
      <div class="game-info">
        <h3>Pong</h3>
        <button onclick="openGame('pong.html','Pong','https://upload.wikimedia.org/wikipedia/commons/6/6a/Pong_Game_Test2.gif')">Play</button>
      </div>
    </div>

  </div>
</section>

<section>
  <h2 align="center">🔥 Exclusives 🔥</h2>

  <div class="exclusives-list">

    <div class="game-card">
      <div class="game-info">
        <h3>Rift Runner</h3>
        <button onclick="openGame('riftrunner.html','Rift Runner','https://via.placeholder.com/400x200/ff4c4c')">Play</button>
      </div>
    </div>

    <div class="game-card">
      <div class="game-info">
        <h3>Rift Defense</h3>
        <button onclick="openGame('riftdefense.html','Rift Defense','https://via.placeholder.com/400x200/00ff99')">Play</button>
      </div>
    </div>

  </div>
</section>

<section>
  <h2 align="center">🕘 Recently Played</h2>
  <div class="game-grid" id="historyGrid"></div>
</section>

</div>

<footer>
  <h3>Rift Hub</h3>

  <p style="max-width:600px; margin:auto;">
    Free browser game platform.
  </p>

  <div>
    <a onclick="alert('About Rift Hub')">About</a>
    <a onclick="alert('Contact: officialrifthub@gmail.com')">Contact</a>
    <a onclick="alert('Privacy: local data only')">Privacy</a>
  </div>
</footer>

<script>

/* ===== FIREBASE LOGIN (REAL ONLINE) ===== */
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyD2XQWUKM4SQO8azXkm2XWUKM4SQO8azXkm2XWUKM4SQO",
  authDomain: "rifthub-4275a.firebaseapp.com",
  projectId: "rifthub-4275a",
  storageBucket: "rifthub-4275a.firebasestorage.app",
  messagingSenderId: "56609352786",
  appId: "1:56609352786:web:55dc5d3b32412bf1e3838b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function () {
  const email = document.getElementById("usernameInput").value;
  const password = "123456";

  signInWithEmailAndPassword(auth, email, password)
    .then(u => loadUser(u.user.email))
    .catch(() => {
      createUserWithEmailAndPassword(auth, email, password)
        .then(u => loadUser(u.user.email))
        .catch(err => alert(err.message));
    });
};

function loadUser(name) {
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("site").style.display = "block";
  document.getElementById("username").textContent = name;
}

onAuthStateChanged(auth, (user) => {
  if (user) loadUser(user.email);
});

/* ===== GAME OPEN + HISTORY ===== */
function openGame(page, name, img) {
  let history = JSON.parse(localStorage.getItem("riftHistory")) || [];

  history = history.filter(g => g.name !== name);
  history.unshift({ name, page, img });
  history = history.slice(0, 3);

  localStorage.setItem("riftHistory", JSON.stringify(history));
  renderHistory();

  window.location.href = page;
}

function renderHistory() {
  const grid = document.getElementById("historyGrid");
  let history = JSON.parse(localStorage.getItem("riftHistory")) || [];

  grid.innerHTML = history.map(g => `
    <div class="game-card">
      <img src="${g.img}">
      <div class="game-info">
        <h3>${g.name}</h3>
        <button onclick="openGame('${g.page}','${g.name}','${g.img}')">Play</button>
      </div>
    </div>
  `).join("");
}

renderHistory();

/* ===== SEARCH ===== */
document.getElementById("search").addEventListener("input", function () {
  const val = this.value.toLowerCase();
  document.querySelectorAll(".game-card").forEach(card => {
    const name = card.getAttribute("data-name");
    if (!name) return;
    card.style.display = name.toLowerCase().includes(val) ? "block" : "none";
  });
});

</script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { 
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "rifthub-4275a.firebaseapp.com",
  projectId: "rifthub-4275a",
  storageBucket: "rifthub-4275a.firebasestorage.app",
  messagingSenderId: "56609352786",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

//
// 🔐 SIGN UP
//
window.signup = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(user => {
      loadUser(user.user.email);
    })
    .catch(err => alert(err.message));
};

//
// 🔐 LOGIN
//
window.login = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(user => {
      loadUser(user.user.email);
    })
    .catch(err => alert("Login failed: " + err.message));
};

//
// 👤 SHOW USER
//
function loadUser(email) {
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("site").style.display = "block";
  document.getElementById("username").textContent = email;
}

//
// 🔁 AUTO LOGIN
//
onAuthStateChanged(auth, (user) => {
  if (user) {
    loadUser(user.email);
  }
});
</script>
</body>
</html>
