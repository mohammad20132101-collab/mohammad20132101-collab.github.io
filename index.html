<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Hub</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f1a;
  color: white;
}

/* HEADER */
header {
  padding: 20px;
  text-align: center;
  background: #1a1a2e;
}

#search {
  margin-top: 10px;
  padding: 10px;
  width: 60%;
  border-radius: 8px;
  border: none;
}

/* LOGIN */
#loginScreen {
  text-align: center;
  padding: 100px 20px;
}

#loginScreen input {
  padding: 10px;
  width: 200px;
  margin: 5px;
}

/* BUTTONS */
button {
  padding: 8px 15px;
  border: none;
  background: #4c6fff;
  color: white;
  border-radius: 6px;
  cursor: pointer;
  margin-top: 5px;
}

/* GAME GRID */
.game-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  padding: 10px;
}

.game-card {
  background: #1a1a2e;
  border-radius: 12px;
  text-align: center;
  padding: 10px;
}

/* FOOTER RESTORED */
footer {
  margin-top: 40px;
  padding: 20px;
  background: #1a1a2e;
  text-align: center;
}

footer a {
  color: #4c6fff;
  margin: 0 10px;
  cursor: pointer;
}

/* LEADERBOARD */
#lbBtn {
  position: fixed;
  top: 15px;
  right: 15px;
  background: #4c6fff;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
  z-index: 999;
}

#lbPanel {
  position: fixed;
  top: 60px;
  right: 15px;
  width: 280px;
  background: #141428;
  border: 2px solid #4c6fff;
  border-radius: 12px;
  padding: 10px;
  display: none;
  z-index: 999;
}

.lb-tabs button {
  width: 100%;
  margin: 3px 0;
}

.lb-entry {
  background: #1a1a2e;
  padding: 8px;
  border-radius: 8px;
  margin: 5px 0;
}
</style>
</head>

<body>

<!-- LEADERBOARD BUTTON -->
<div id="lbBtn" onclick="toggleLB()">🏆</div>

<!-- LEADERBOARD PANEL -->
<div id="lbPanel">
  <h3>Leaderboard</h3>

  <div class="lb-tabs">
    <button onclick="loadLB('pong')">Pong</button>
    <button onclick="loadLB('2048')">2048</button>
    <button onclick="loadLB('flappy')">Flappy</button>
    <button onclick="loadLB('runner')">Runner</button>
    <button onclick="loadLB('defence')">Defence</button>
  </div>

  <div id="lbList">Select a game</div>
</div>

<audio id="bgMusic" autoplay loop>
  <source src="magpiemusic-action-trailer-promo-rock-513687.mp3">
</audio>

<!-- LOGIN -->
<div id="loginScreen">
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>

  <button onclick="login()">Login</button>
  <button onclick="signup()">Sign Up</button>
</div>

<!-- SITE -->
<div id="site" style="display:none;">

<header>
  <h1>🎮 Rift Hub 🎮</h1>
  <p>Welcome, <span id="username"></span></p>
  <input type="text" id="search" placeholder="Search games...">
</header>

<section>
<h2 align="center">Games</h2>

<div class="game-grid">
  <div class="game-card" data-name="pong">
    <h3>Pong</h3>
    <button onclick="openGame('pong.html','pong')">Play</button>
  </div>

  <div class="game-card" data-name="2048">
    <h3>2048</h3>
    <button onclick="openGame('2048.html','2048')">Play</button>
  </div>

  <div class="game-card" data-name="memory">
    <h3>Memory</h3>
    <button onclick="openGame('memory.html','memory')">Play</button>
  </div>
</div>
</section>

<footer>
<h3>Rift Hub</h3>
<p>Free browser game platform.</p>

<a onclick="alert('About: Student-made game hub for fun and learning')">About</a>
<a onclick="alert('Contact: officialrifthub@gmail.com')">Contact</a>
<a onclick="alert('Privacy: Only stores email for login + local game history')">Privacy</a>
</footer>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyD2XQWUKM4SQO8azXkm2XwG_e9ZQWpYJi0",
  authDomain: "rifthub-4275a.firebaseapp.com",
  projectId: "rifthub-4275a",
  storageBucket: "rifthub-4275a.firebasestorage.app",
  messagingSenderId: "56609352786",
  appId: "1:56609352786:web:55dc5d3b32412bf1e3838b",
  measurementId: "G-9NDLTX6KVY"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* LOGIN FIXED */
window.login = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(u => loadUser(u.user.email))
    .catch(err => alert(err.message));
};

window.signup = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(u => loadUser(u.user.email))
    .catch(err => alert(err.message));
};

function loadUser(email){
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("site").style.display="block";
  document.getElementById("username").textContent=email;

  const music=document.getElementById("bgMusic");
  music.volume=0.05;
  music.play().catch(()=>{});
}

onAuthStateChanged(auth,(u)=>{
  if(u) loadUser(u.email);
});

/* GAME */
window.openGame=function(page,name){
  window.location.href=page;
};

/* SEARCH */
document.getElementById("search").addEventListener("input",function(){
  const val=this.value.toLowerCase();
  document.querySelectorAll(".game-card").forEach(c=>{
    const n=c.dataset.name;
    if(n) c.style.display=n.includes(val)?"block":"none";
  });
});

/* LEADERBOARD UI */
window.toggleLB=function(){
  const p=document.getElementById("lbPanel");
  p.style.display=p.style.display==="block"?"none":"block";
};

window.loadLB=function(game){
  document.getElementById("lbList").innerHTML =
    "<div class='lb-entry'>Leaderboard system ready (connect game scores via Firebase Firestore)</div>";
};

</script>

</body>
</html>
