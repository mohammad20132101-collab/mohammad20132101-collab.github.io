<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Hub</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f1a;
  color: white;
}

header {
  padding: 20px;
  text-align: center;
  background: #1a1a2e;
}

#search {
  margin-top: 10px;
  padding: 10px;
  width: 60%;
  border-radius: 8px;
  border: none;
}

#loginScreen {
  text-align: center;
  padding: 100px 20px;
}

#loginScreen input {
  padding: 10px;
  width: 200px;
  margin: 5px;
}

button {
  padding: 8px 15px;
  border: none;
  background: #4c6fff;
  color: white;
  border-radius: 6px;
  cursor: pointer;
  margin-top: 5px;
}

.game-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  padding: 10px;
}

.game-card {
  background: #1a1a2e;
  border-radius: 12px;
  text-align: center;
  padding: 10px;
}

.exclusives-list {
  display: flex;
  flex-direction: column;
  gap: 15px;
  padding: 10px;
}

#historyGrid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  padding: 10px;
}

/* LEADERBOARD */
#lbBtn {
  position: fixed;
  top: 15px;
  right: 15px;
  background: #4c6fff;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
  z-index: 999;
}

#lbPanel {
  position: fixed;
  top: 60px;
  right: 15px;
  width: 300px;
  background: #141428;
  border: 2px solid #4c6fff;
  border-radius: 12px;
  padding: 10px;
  display: none;
  z-index: 999;
}

.lb-entry {
  background: #1a1a2e;
  padding: 8px;
  border-radius: 8px;
  margin: 5px 0;
}
</style>
</head>

<body>

<!-- LEADERBOARD BUTTON -->
<div id="lbBtn" onclick="toggleLB()">🏆</div>

<div id="lbPanel">
  <h3 align="center">Leaderboard</h3>
  <div id="lbList" align="center">Select a game</div>
</div>

<!-- LOGIN -->
<div id="loginScreen">
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>

  <button onclick="login()">Login</button>
  <button onclick="signup()">Sign Up</button>
</div>

<!-- SITE -->
<div id="site" style="display:none;">

<header>
  <h1>🎮 Rift Hub 🎮</h1>
  <p>Welcome, <span id="username"></span></p>
  <input type="text" id="search" placeholder="Search games...">
</header>

<h2 align="center">Games</h2>

<div class="game-grid">
  <div class="game-card"><h3>Snake</h3><button onclick="openGame('snake.html','Snake')">Play</button></div>
  <div class="game-card"><h3>Tetris</h3><button onclick="openGame('tetris.html','Tetris')">Play</button></div>
  <div class="game-card"><h3>Pong</h3><button onclick="openGame('pong.html','Pong')">Play</button></div>
  <div class="game-card"><h3>Snake</h3><button onclick="openGame('flappyblock.html','Flappy Block')">Play</button></div>
  <div class="game-card"><h3>Tetris</h3><button onclick="openGame('2048.html','2048')">Play</button></div>
  <div class="game-card"><h3>Pong</h3><button onclick="openGame('memorymatch.html','Memory Match')">Play</button></div>
</div>

<h2 align="center">🔥 Exclusives 🔥</h2>

<div class="exclusives-list">
  <div class="game-card">
    <h3>Rift Runner</h3>
    <button onclick="openGame('riftrunner.html','Rift Runner')">Play</button>
    <button onclick="openGame('riftdefense.html','Rift Defence')">Play</button>
  </div>
</div>

<h2 align="center">🕘 Recently Played</h2>
<div id="historyGrid"></div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

import { getDatabase, ref, get, set } 
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD2XQWUKM4SQO8azXkm2XwG_e9ZQWpYJi0",
  authDomain: "rifthub-4275a.firebaseapp.com",
  databaseURL: "https://rifthub-4275a-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "rifthub-4275a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

console.log("Firebase loaded");

// LOGIN
window.login = () => {
  const e = document.getElementById("email").value;
  const p = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, e, p)
    .then(u => loadUser(u.user.email))
    .catch(err => alert(err.message));
};

// SIGNUP
window.signup = () => {
  const e = document.getElementById("email").value;
  const p = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, e, p)
    .then(u => loadUser(u.user.email))
    .catch(err => alert(err.message));
};

function loadUser(email){
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("site").style.display = "block";
  document.getElementById("username").textContent = email;
}

onAuthStateChanged(auth, u => {
  if (u) loadUser(u.email);
});

// LEADERBOARD TEST
window.saveScore = (name, score) => {
  set(ref(db, "scores/" + name), score);
};

window.loadLeaderboard = async () => {
  const snap = await get(ref(db, "scores"));
  console.log(snap.val());
};
</script>

</body>
</html>
