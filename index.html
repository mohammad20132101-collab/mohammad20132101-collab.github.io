<!DOCTYPE html>
<html>

  <title>Game Hub</title>
  <link rel="stylesheet" href="style.css"/>

  <body>
 <header>
    <h1>🎮 Rift Hub 🎮</h1>

  <main id="gameGrid">
<script>
function openGame(page) {
  window.location.href = page;
}
</script>
    <!-- Game Card -->
    <div class="game-card" data-name="snake">
      <h3>Snake</h3>
      <button onclick="openGame('snake.html')">Play</button>
    </div>

    <div class="game-card" data-name="tetris">
      <h3>Tetris</h3>
      <button onclick="openGame('tetris.html')">Play</button>
    </div>

    <div class="game-card" data-name="pong">
      <h3>Pong</h3>

    </div>

  </main>
