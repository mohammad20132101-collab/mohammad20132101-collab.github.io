<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Chess</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:white;
  text-align:center;
}

h1{ color:#4c6fff; }

#gameWrapper{
  display:flex;
  justify-content:center;
  align-items:flex-start;
  gap:20px;
  padding:20px;
}

.sidePanel{
  width:160px;
  background:#141428;
  border:2px solid #4c6fff;
  border-radius:12px;
  padding:10px;
  min-height:400px;
}

.sidePanel h3{
  margin:5px 0;
  font-size:14px;
  color:#4c6fff;
}

.captured{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  justify-content:center;
}

.captured span{
  font-size:22px;
}

#board{
  display:grid;
  grid-template-columns:repeat(8,60px);
  grid-template-rows:repeat(8,60px);
  border:4px solid #4c6fff;
  background:#141428;
}

.square{
  width:60px;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  position:relative;
  box-sizing:border-box;
}

.light{ background:#2a2a44; }
.dark{ background:#141428; }

.white-piece{ color:#4c6fff; text-shadow:0 0 8px #4c6fff; }
.black-piece{ color:#9b5cff; text-shadow:0 0 8px #9b5cff; }

.selected{
  outline:3px solid #4c6fff;
  outline-offset:-3px;
}

.legal{
  box-shadow:inset 0 0 0 3px #2cff9b;
}

.capture{
  box-shadow:inset 0 0 0 3px #ff4c4c;
}

#status{ margin-top:10px; font-size:18px; }
</style>
</head>

<body>

<h1>🌀 Rift Chess</h1>

<div id="gameWrapper">

  <div class="sidePanel">
    <h3>Blue Captured</h3>
    <div id="capturedWhite" class="captured"></div>
  </div>

  <div>
    <div id="board"></div>
    <div id="status">Blue's turn</div>
  </div>

  <div class="sidePanel">
    <h3>Purple Captured</h3>
    <div id="capturedBlack" class="captured"></div>
  </div>

</div>

<script>

let pieces = [];
let boardSquares = [];
let selectedSquare = null;
let turn = 1;

let Player = function(color){
    this.color = color;
    this.king = null;
    this.checked = false;
};

let white = new Player("white");
let black = new Player("black");
let currentPlayer = white;

/* SQUARE */
let SquareObject = function(x,y,color,el,piece){
  this.x=x; this.y=y; this.color=color;
  this.element=el; this.piece=piece;
};

SquareObject.prototype.setPiece=function(p){this.piece=p; this.update();};
SquareObject.prototype.unsetPiece=function(){this.piece=null; this.update();};

SquareObject.prototype.update=function(){
  this.element.className="square "+this.color;
  if(this.piece){
    this.element.textContent=this.piece.symbol;
    this.element.classList.add(this.piece.color==="white"?"white-piece":"black-piece");
  }else{
    this.element.textContent="";
  }
};

function getSquare(x,y){
  return boardSquares[(y-1)*8+(x-1)];
}

/* PIECES */
function Piece(x,y,color,type,symbol){
  this.x=x; this.y=y; this.color=color;
  this.type=type; this.symbol=symbol;
  this.captured=false;
}

/* KING (minimal rules, safe) */
function King(x,y,color){
  Piece.call(this,x,y,color,"king",color==="white"?"♔":"♚");
}
King.prototype=Object.create(Piece.prototype);

King.prototype.isValidMove=function(to){
  let dx=Math.abs(to.x-this.x);
  let dy=Math.abs(to.y-this.y);
  if(dx<=1 && dy<=1){
    return {valid:true,capture:to.piece && to.piece.color!==this.color?to:null};
  }
  return {valid:false};
};

/* SIMPLE PIECE MOVEMENT (no jumping issues) */
function Pawn(x,y,color){
  Piece.call(this,x,y,color,"pawn",color==="white"?"♙":"♟");
}
Pawn.prototype=Object.create(Piece.prototype);

Pawn.prototype.isValidMove=function(to){
  let dir=this.color==="white"?-1:1;
  if(to.x===this.x && !to.piece){
    if(to.y===this.y+dir) return {valid:true};
  }
  if(Math.abs(to.x-this.x)===1 && to.y===this.y+dir && to.piece && to.piece.color!==this.color){
    return {valid:true,capture:to};
  }
  return {valid:false};
};

/* INIT BOARD */
function setup(){
  let board=document.getElementById("board");
  for(let y=8;y>=1;y--){
    for(let x=1;x<=8;x++){
      let el=document.createElement("div");
      let color=((x+y)%2)?"dark":"light";
      let sq=new SquareObject(x,y,color,el,null);
      el.onclick=()=>clickSquare(sq);
      board.appendChild(el);
      boardSquares.push(sq);
      sq.update();
    }
  }

  // pawns only (safe demo but works)
  for(let i=1;i<=8;i++){
    let w=new Pawn(i,7,"white");
    let b=new Pawn(i,2,"black");
    pieces.push(w,b);
    getSquare(i,7).setPiece(w);
    getSquare(i,2).setPiece(b);
  }

  let wk=new King(5,8,"white");
  let bk=new King(5,1,"black");
  pieces.push(wk,bk);
  white.king=wk; black.king=bk;
  getSquare(5,8).setPiece(wk);
  getSquare(5,1).setPiece(bk);
}

function clickSquare(sq){
  if(!selectedSquare){
    if(sq.piece && sq.piece.color===currentPlayer.color){
      selectedSquare=sq;
    }
    return;
  }

  let p=selectedSquare.piece;
  let move=p.isValidMove(sq);

  if(move.valid){
    if(move.capture) move.capture.piece.captured=true;
    sq.setPiece(p);
    selectedSquare.unsetPiece();
    selectedSquare=null;
    nextTurn();
  }else{
    selectedSquare=null;
  }
}

function nextTurn(){
  currentPlayer=currentPlayer===white?black:white;
  document.getElementById("status").textContent=
    currentPlayer===white?"Blue's turn":"Purple's turn";
}

setup();

</script>

</body>
</html>
