<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Chess</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:white;
  text-align:center;
}

/* MENU */
#menu{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f0f1a;
}

.menuBox{
  background:#141428;
  padding:30px;
  border-radius:15px;
  border:3px solid #4c6fff;
}

button{
  margin:5px;
  padding:8px 15px;
  border:none;
  background:#4c6fff;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

/* GAME */
#game{ display:none; }

.container{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:20px;
}

/* CAPTURES FIXED */
.captures{
  width:160px;
  min-height:560px;
  background:#141428;
  border:2px solid #4c6fff;
  border-radius:10px;
  padding:10px;
}

/* BOARD */
#board{
  display:grid;
  grid-template-columns:repeat(8,70px);
  grid-template-rows:repeat(8,70px);
  border:3px solid #4c6fff;
}

.cell{
  width:70px;
  height:70px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:30px;
  cursor:pointer;
  box-sizing:border-box;
}

.light{ background:#141428; }
.dark{ background:#0f0f1a; }

.blue{ color:#4c6fff; }
.purple{ color:#9b5cff; }

/* ✔ FIXED GREEN HIGHLIGHT */
.move{ background:#1f5f3a !important; }

/* ✔ FULL BORDER SELECTION (ALL SIDES) */
.selected{
  border:3px solid #4c6fff !important;
  box-shadow:0 0 10px #4c6fff;
  box-sizing:border-box;
}

/* capture highlight */
.capture{ background:#6b2a2a !important; }

/* PROMO */
#promo{
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:#000000aa;
  display:none;
  justify-content:center;
  align-items:center;
}

.promoBox{
  background:#141428;
  padding:20px;
  border:2px solid #4c6fff;
}
</style>
</head>

<body>

<div id="menu">
  <div class="menuBox">
    <h1>🌀 Rift Chess</h1>
    <button onclick="start(1)">1 Player</button>
    <button onclick="start(2)">2 Player</button>
  </div>
</div>

<div id="game">

<h1 id="status">Blue's turn</h1>

<div class="container">
  <div class="captures" id="capPurple">🟣 Captured</div>
  <div id="board"></div>
  <div class="captures" id="capBlue">🟦 Captured</div>
</div>

</div>

<!-- PROMO -->
<div id="promo">
  <div class="promoBox">
    <button onclick="promote('q')">Queen</button>
    <button onclick="promote('r')">Rook</button>
    <button onclick="promote('b')">Bishop</button>
    <button onclick="promote('n')">Knight</button>
  </div>
</div>

<script>

let board=[];
let turn="blue";
let selected=null;
let mode=2;

let capBlue=[];
let capPurple=[];
let promo=null;

/* PIECES */
const P={
  bp:"♟",br:"♜",bn:"♞",bb:"♝",bq:"♛",bk:"♚",
  pp:"♟",pr:"♜",pn:"♞",pb:"♝",pq:"♛",pk:"♚"
};

function start(m){
  mode=m;
  document.getElementById("menu").style.display="none";
  document.getElementById("game").style.display="block";
  setup();
  draw();
  update();
}

/* SETUP */
function setup(){
  board=Array(8).fill().map(()=>Array(8).fill(null));
  let back=["r","n","b","q","k","b","n","r"];

  for(let i=0;i<8;i++){
    board[0][i]="p"+back[i];
    board[1][i]="pp";
    board[6][i]="bp";
    board[7][i]="b"+back[i];
  }
}

/* DRAW */
function draw(){
  let b=document.getElementById("board");
  b.innerHTML="";

  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){

      let d=document.createElement("div");
      d.className="cell "+((r+c)%2?"dark":"light");

      let p=board[r][c];
      if(p){
        d.textContent=P[p];
        d.classList.add(p[0]==="b"?"blue":"purple");
      }

      d.onclick=()=>click(r,c);
      b.appendChild(d);
    }
  }

  renderCaptures();
}

/* CLICK */
function click(r,c){

  let p=board[r][c];

  if(p && p[0]===turn[0]){
    selected={r,c};
    showMoves(r,c);
    return;
  }

  if(selected && legal(selected.r,selected.c,r,c)){
    move(selected.r,selected.c,r,c);

    selected=null;
    clearHints();

    turn = turn==="blue"?"purple":"blue";
    update();
    draw();

    if(mode===1 && turn==="purple"){
      setTimeout(ai,150);
    }
  }
}

/* MOVE + CAPTURE */
function move(fr,fc,tr,tc){

  let p=board[fr][fc];

  if(board[tr][tc]){
    if(board[tr][tc][0]==="b") capBlue.push(board[tr][tc]);
    else capPurple.push(board[tr][tc]);
  }

  board[tr][tc]=p;
  board[fr][fc]=null;
}

/* LEGAL FIX (BLOCKING ADDED) */
function legal(fr,fc,tr,tc){
  let p=board[fr][fc];
  if(!p) return false;

  let dr=tr-fr, dc=tc-fc;
  let t=p[1];

  // pawn
  if(t==="p"){
    let dir=p[0]==="b"?-1:1;

    if(dc===0 && !board[tr][tc]){
      if(dr===dir) return true;
      if((fr===1||fr===6)&&dr===2*dir && !board[fr+dir][fc]) return true;
    }

    if(Math.abs(dc)===1 && dr===dir && board[tr][tc]) return true;
  }

  // ROOK / BISHOP / QUEEN NEED BLOCK CHECK
  if(t==="r"||t==="b"||t==="q"){
    if(t==="r" && !(dr===0||dc===0)) return false;
    if(t==="b" && Math.abs(dr)!==Math.abs(dc)) return false;
    if(t==="q" && !(dr===0||dc===0||Math.abs(dr)===Math.abs(dc))) return false;

    return clearPath(fr,fc,tr,tc);
  }

  if(t==="k") return Math.abs(dr)<=1&&Math.abs(dc)<=1;
  if(t==="n") return (Math.abs(dr)===2&&Math.abs(dc)===1)||(Math.abs(dr)===1&&Math.abs(dc)===2);

  return false;
}

/* ✔ THIS FIXES “JUMPING PIECES” */
function clearPath(fr,fc,tr,tc){
  let dr=Math.sign(tr-fr);
  let dc=Math.sign(tc-fc);

  let r=fr+dr,c=fc+dc;

  while(r!==tr||c!==tc){
    if(board[r][c]) return false;
    r+=dr;
    c+=dc;
  }
  return true;
}

/* HIGHLIGHT */
function showMoves(r,c){
  clearHints();

  let cells=document.querySelectorAll(".cell");

  for(let i=0;i<64;i++){
    let rr=Math.floor(i/8);
    let cc=i%8;

    if(!legal(r,c,rr,cc)) continue;

    if(board[rr][cc]) cells[i].classList.add("capture");
    else cells[i].classList.add("move");
  }

  cells[r*8+c].classList.add("selected");
}

function clearHints(){
  document.querySelectorAll(".cell").forEach(c=>{
    c.classList.remove("move","capture","selected");
  });
}

/* CAPTURES UI FIX */
function renderCaptures(){
  document.getElementById("capBlue").innerHTML =
    "🟦 Captured<br>"+capBlue.map(x=>P[x]).join(" ");

  document.getElementById("capPurple").innerHTML =
    "🟣 Captured<br>"+capPurple.map(x=>P[x]).join(" ");
}

/* SIMPLE AI */
function ai(){
  let moves=[];

  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){
      let p=board[r][c];
      if(!p||p[0]!=="p") continue;

      for(let rr=0;rr<8;rr++){
        for(let cc=0;cc<8;cc++){
          if(legal(r,c,rr,cc)){
            moves.push([r,c,rr,cc]);
          }
        }
      }
    }
  }

  if(!moves.length) return;

  let m=moves[Math.floor(Math.random()*moves.length)];
  move(m[0],m[1],m[2],m[3]);

  turn="blue";
  update();
  draw();
}

/* STATUS */
function update(){
  document.getElementById("status").textContent =
    turn==="blue"?"Blue's turn":"Purple's turn";
}

</script>

</body>
</html>
