<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Chess</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:white;
  text-align:center;
}

/* MENU */
#menu{
  position:absolute;
  width:100%;
  height:100%;
  background:#0f0f1a;
  display:flex;
  justify-content:center;
  align-items:center;
}

.menuBox{
  background:#141428;
  padding:30px;
  border-radius:15px;
  border:3px solid #4c6fff;
}

/* BOARD LAYOUT */
#wrap{
  display:flex;
  justify-content:center;
  align-items:flex-start;
  gap:20px;
  margin-top:20px;
}

.side{
  width:140px;
  min-height:480px;
  background:#141428;
  border:2px solid #4c6fff;
  border-radius:10px;
  padding:10px;
}

.side h3{
  font-size:14px;
  color:#4c6fff;
}

#board{
  display:grid;
  grid-template-columns:repeat(8,60px);
  grid-template-rows:repeat(8,60px);
  border:3px solid #4c6fff;
}

.square{
  width:60px;
  height:60px;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  box-sizing:border-box;
  position:relative;
}

.light{ background:#1a1a2e; }
.dark{ background:#0f0f1a; }

/* PIECES */
.blue{
  color:#4c6fff;
  font-size:28px;
  text-shadow:0 0 8px #4c6fff;
}

.purple{
  color:#9b5cff;
  font-size:28px;
  text-shadow:0 0 8px #9b5cff;
}

/* SELECTION (FULL BORDER) */
.selected{
  outline:3px solid #00ff99;
  outline-offset:-3px;
}

/* MOVE HIGHLIGHT */
.move{
  background:#00ff9940 !important;
}

/* BUTTONS */
button{
  margin:5px;
  padding:8px 14px;
  border:none;
  border-radius:6px;
  background:#4c6fff;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu">
  <div class="menuBox">
    <h1>🌀 Rift Chess</h1>
    <button onclick="start(1)">1 Player</button>
    <button onclick="start(2)">2 Player</button>
  </div>
</div>

<div id="game" style="display:none;">

<h2 id="status">Blue's turn</h2>

<div id="wrap">
  <div class="side" id="blueCap"><h3>Blue Captured</h3></div>
  <div id="board"></div>
  <div class="side" id="purpleCap"><h3>Purple Captured</h3></div>
</div>

<button onclick="reset()">Reset</button>

</div>

<script>

let board = [];
let selected = null;
let turn = "blue";
let mode = 2;

const pieces = [];

function start(m){
  mode = m;
  document.getElementById("menu").style.display="none";
  document.getElementById("game").style.display="block";
  init();
}

function init(){
  board=[];
  pieces.length=0;
  turn="blue";

  let b=document.getElementById("board");
  b.innerHTML="";

  for(let y=0;y<8;y++){
    board[y]=[];
    for(let x=0;x<8;x++){

      let sq=document.createElement("div");
      sq.className="square "+((x+y)%2?"dark":"light");
      sq.dataset.x=x;
      sq.dataset.y=y;

      sq.onclick=()=>clickSquare(x,y);

      b.appendChild(sq);

      board[y][x]={
        el:sq,
        piece:null
      };
    }
  }

  setupPieces();
  render();
}

function setupPieces(){

  function add(type,color,x,y){
    let p={type,color,x,y};
    pieces.push(p);
    board[y][x].piece=p;
  }

  // pawns
  for(let i=0;i<8;i++){
    add("pawn","blue",i,6);
    add("pawn","purple",i,1);
  }

  // kings
  add("king","blue",4,7);
  add("king","purple",4,0);

  // rooks
  add("rook","blue",0,7);
  add("rook","blue",7,7);
  add("rook","purple",0,0);
  add("rook","purple",7,0);

  // knights
  add("knight","blue",1,7);
  add("knight","blue",6,7);
  add("knight","purple",1,0);
  add("knight","purple",6,0);

  // bishops
  add("bishop","blue",2,7);
  add("bishop","blue",5,7);
  add("bishop","purple",2,0);
  add("bishop","purple",5,0);

  add("queen","blue",3,7);
  add("queen","purple",3,0);
}

/* PIECE SYMBOLS */
function symbol(p){
  let s={
    pawn:"♟",
    rook:"♜",
    knight:"♞",
    bishop:"♝",
    queen:"♛",
    king:"♚"
  }[p.type];

  return s;
}

/* CLICK */
function clickSquare(x,y){
  let sq=board[y][x];

  if(selected){
    move(selected.x,selected.y,x,y);
    clearMoves();
    selected=null;
    return;
  }

  if(!sq.piece) return;
  if(sq.piece.color!==turn) return;

  selected=sq.piece;
  showMoves(selected);
}

/* MOVE HIGHLIGHT */
function showMoves(p){
  clearMoves();

  for(let y=0;y<8;y++){
    for(let x=0;x<8;x++){
      if(validMove(p,x,y)){
        board[y][x].el.classList.add("move");
      }
    }
  }
}

function clearMoves(){
  document.querySelectorAll(".square").forEach(s=>{
    s.classList.remove("move");
    s.classList.remove("selected");
  });
}

/* MOVE RULES (simple but safe) */
function validMove(p,x,y){
  let dx=x-p.x;
  let dy=y-p.y;
  let t=board[y][x].piece;

  if(t && t.color===p.color) return false;

  if(p.type==="pawn"){
    let dir=p.color==="blue"?-1:1;

    if(dx===0 && !t){
      if(dy===dir) return true;
    }

    if(Math.abs(dx)===1 && dy===dir && t){
      return true;
    }
  }

  if(p.type==="rook"){
    if(dx!==0 && dy!==0) return false;
    return true;
  }

  if(p.type==="bishop"){
    if(Math.abs(dx)!==Math.abs(dy)) return false;
    return true;
  }

  if(p.type==="queen"){
    return dx===0||dy===0||Math.abs(dx)===Math.abs(dy);
  }

  if(p.type==="knight"){
    return (Math.abs(dx)===2&&Math.abs(dy)===1)||(Math.abs(dx)===1&&Math.abs(dy)===2);
  }

  if(p.type==="king"){
    return Math.abs(dx)<=1&&Math.abs(dy)<=1;
  }

  return false;
}

/* MOVE EXEC */
function move(x1,y1,x2,y2){
  let p=board[y1][x1].piece;
  let t=board[y2][x2].piece;

  if(!validMove(p,x2,y2)) return;

  if(t){
    capture(t);
  }

  board[y1][x1].piece=null;
  board[y2][x2].piece=p;

  p.x=x2;
  p.y=y2;

  turn=turn==="blue"?"purple":"blue";
  document.getElementById("status").innerText=turn+"'s turn";

  render();

  if(mode===1 && turn==="purple"){
    setTimeout(ai,300);
  }
}

/* CAPTURE SIDE */
function capture(p){
  let div=document.createElement("div");
  div.textContent=symbol(p);

  if(p.color==="blue"){
    document.getElementById("purpleCap").appendChild(div);
  }else{
    document.getElementById("blueCap").appendChild(div);
  }
}

/* SIMPLE AI */
function ai(){
  let moves=[];

  for(let y=0;y<8;y++){
    for(let x=0;x<8;x++){
      let p=board[y][x].piece;
      if(p && p.color==="purple"){
        for(let y2=0;y2<8;y2++){
          for(let x2=0;x2<8;x2++){
            if(validMove(p,x2,y2)){
              moves.push({p,x,y,x2,y2});
            }
          }
        }
      }
    }
  }

  if(moves.length===0) return;

  let m=moves[Math.floor(Math.random()*moves.length)];
  move(m.x,m.y,m.x2,m.y2);
}

/* RENDER */
function render(){
  for(let y=0;y<8;y++){
    for(let x=0;x<8;x++){
      let sq=board[y][x];
      let el=sq.el;

      el.innerHTML="";

      if(sq.piece){
        let span=document.createElement("div");
        span.innerText=symbol(sq.piece);
        span.className=sq.piece.color;
        el.appendChild(span);
      }
    }
  }
}

/* RESET */
function reset(){
  location.reload();
}

</script>

</body>
</html>
