<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FNAF Camera System</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f1a;
  color: white;
}

header {
  padding: 20px;
  text-align: center;
  background: #1a1a2e;
}

#gameGrid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 15px;
  padding: 20px;
}

.panel {
  background: #1f1f3a;
  padding: 15px;
  border-radius: 12px;
}

button {
  padding: 8px 12px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  background: #ff2e63;
  color: white;
  cursor: pointer;
}

.camera-btns {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

#cameraView {
  height: 250px;
  background: black;
  border-radius: 10px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 18px;
}

.glitch {
  animation: flicker 0.3s infinite;
}

@keyframes flicker {
  0% { opacity: 1; }
  50% { opacity: 0.7; }
  100% { opacity: 1; }
}
</style>
</head>

<body>

<header>
  <h1>📷 FNAF Camera System</h1>
  <p id="status">Survive until 6 AM</p>
</header>

<div id="gameGrid">

  <!-- CAMERA VIEW -->
  <div class="panel">
    <h2>Camera Feed</h2>
    <div id="cameraView">OFFICE</div>

    <div class="camera-btns">
      <button onclick="switchCam('office')">Office</button>
      <button onclick="switchCam('cam1')">Cam 1</button>
      <button onclick="switchCam('cam2')">Cam 2</button>
      <button onclick="switchCam('cam3')">Cam 3</button>
    </div>
  </div>

  <!-- INFO PANEL -->
  <div class="panel">
    <h3>Stats</h3>
    <p>Time: <span id="time">12 AM</span></p>
    <p>Power: <span id="power">100%</span></p>
    <p>Animatronic: <span id="ai">Office</span></p>

    <button onclick="toggleDoor()">🚪 Door</button>
  </div>

</div>

<script>
let power = 100;
let hour = 12;
let doorClosed = false;
let gameOver = false;

let animatronicRoom = "cam1";
let currentCam = "office";

const rooms = {
  office: "OFFICE",
  cam1: "CAM 1 - Entrance",
  cam2: "CAM 2 - Hallway",
  cam3: "CAM 3 - Storage"
};

function switchCam(cam) {
  if (gameOver) return;

  currentCam = cam;
  document.getElementById("cameraView").innerText = rooms[cam];

  power -= 1;

  // camera glitch when animatronic is near
  if (cam === animatronicRoom) {
    document.getElementById("cameraView").classList.add("glitch");
    document.getElementById("cameraView").innerText = "⚠ MOVEMENT DETECTED ⚠";
  } else {
    document.getElementById("cameraView").classList.remove("glitch");
  }
}

function toggleDoor() {
  doorClosed = !doorClosed;
  power -= doorClosed ? 5 : 2;
}

function updateAI() {
  const path = ["cam1", "cam2", "cam3", "office"];

  let index = path.indexOf(animatronicRoom);
  if (index < path.length - 1) {
    if (Math.random() < 0.5) {
      animatronicRoom = path[index + 1];
    }
  }
}

function tick() {
  if (gameOver) return;

  power -= 2;

  if (Math.random() < 0.4) {
    updateAI();
  }

  if (animatronicRoom === "office" && !doorClosed) {
    document.getElementById("status").innerText = "💀 JUMPSCARE! YOU DIED";
    gameOver = true;
  }

  if (power <= 0) {
    document.getElementById("status").innerText = "⚡ Power Out!";
    gameOver = true;
  }

  if (Math.random() < 0.25) hour++;

  if (hour >= 6) {
    document.getElementById("status").innerText = "🌅 You survived!";
    gameOver = true;
  }

  document.getElementById("time").innerText = hour + " AM";
  document.getElementById("power").innerText = power + "%";
  document.getElementById("ai").innerText = animatronicRoom;
}

setInterval(tick, 2000);
</script>

</body>
</html>
