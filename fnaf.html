<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FNAF 1 Clone</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f1a;
  color: white;
}

header {
  background: #1a1a2e;
  padding: 12px;
  text-align: center;
}

/* MAIN */
#game {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 12px;
  padding: 15px;
}

.panel {
  background: #1f1f3a;
  border-radius: 12px;
  padding: 12px;
}

/* OFFICE VIEW */
#office {
  height: 260px;
  background: #000;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* DOORS */
.doors {
  display: flex;
  justify-content: space-between;
  width: 100%;
  margin-top: 20px;
}

.door {
  width: 80px;
  height: 120px;
  background: #333;
  border-radius: 6px;
}

.door.closed {
  background: #ff2e63;
}

/* LIGHTS */
.light {
  font-size: 12px;
  margin-top: 5px;
  color: yellow;
}

/* CAMERA */
#camScreen {
  height: 260px;
  background: black;
  border-radius: 10px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 16px;
}

.camGrid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
}

button {
  padding: 8px;
  border: none;
  border-radius: 8px;
  background: #ff2e63;
  color: white;
  cursor: pointer;
}

/* MAP */
.map {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px;
  margin-top: 8px;
}

.node {
  background: #2a2a50;
  padding: 4px;
  font-size: 10px;
  text-align: center;
  border-radius: 4px;
}

.node.active {
  background: yellow;
  color: black;
}

/* JUMPSCARE */
#jumpscare {
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  background: red;
  display: none;
  justify-content: center;
  align-items: center;
  font-size: 40px;
  font-weight: bold;
}
</style>
</head>

<body>

<header>
  <h2>🌙 FNAF 1 CLONE (HTML)</h2>
  <p id="status">12 AM - Survive the night</p>
</header>

<div id="game">

  <!-- OFFICE -->
  <div class="panel">
    <h3>🏢 Office</h3>

    <div id="office">
      <div>OFFICE VIEW</div>

      <div class="doors">
        <div>
          <div id="leftDoor" class="door"></div>
          <button onclick="toggleDoor('left')">Left Door</button>
          <div class="light" id="leftLight">OFF</div>
        </div>

        <div>
          <div id="rightDoor" class="door"></div>
          <button onclick="toggleDoor('right')">Right Door</button>
          <div class="light" id="rightLight">OFF</div>
        </div>
      </div>
    </div>

    <p>Power: <span id="power">100</span>%</p>
    <p>Time: <span id="time">12 AM</span></p>
  </div>

  <!-- CAMERAS -->
  <div class="panel">
    <h3>📷 Cameras</h3>

    <div id="camScreen">CAM SYSTEM OFF</div>

    <div class="camGrid">
      <button onclick="cam('cam1')">Cam 1</button>
      <button onclick="cam('cam2')">Cam 2</button>
      <button onclick="cam('cam3')">Cam 3</button>
      <button onclick="cam('cam4')">Cam 4</button>
    </div>

    <h4>Map</h4>
    <div class="map" id="map">
      <div class="node" id="cam1">Cam1</div>
      <div class="node" id="cam2">Cam2</div>
      <div class="node" id="cam3">Cam3</div>
      <div class="node" id="cam4">Cam4</div>
      <div class="node" id="left">Left Door</div>
      <div class="node" id="right">Right Door</div>
    </div>
  </div>

</div>

<div id="jumpscare">💀 YOU DIED</div>

<script>
let power = 100;
let hour = 12;
let gameOver = false;

let currentCam = "cam1";

// ANIMATRONICS POSITIONS
let bonnie = "cam1";
let chica = "cam4";
let freddy = "cam2";

// DOORS
let leftDoor = false;
let rightDoor = false;

// AI PATHS (FNAF STYLE)
const path = ["cam1", "cam2", "cam3", "left", "right"];

function updateUI() {
  document.getElementById("power").innerText = power;
  document.getElementById("time").innerText = hour + " AM";
}

function cam(c) {
  if (gameOver) return;

  currentCam = c;
  power -= 1;

  let screen = document.getElementById("camScreen");

  let threat =
    (bonnie === c || chica === c || freddy === c);

  if (threat) {
    screen.innerText = "⚠ MOVEMENT DETECTED ⚠";
  } else {
    screen.innerText = c.toUpperCase();
  }

  updateMap();
  updateUI();
}

function toggleDoor(side) {
  if (gameOver) return;

  if (side === "left") {
    leftDoor = !leftDoor;
    document.getElementById("leftDoor").classList.toggle("closed");
    document.getElementById("leftLight").innerText = leftDoor ? "ON" : "OFF";
    power -= leftDoor ? 5 : 2;
  }

  if (side === "right") {
    rightDoor = !rightDoor;
    document.getElementById("rightDoor").classList.toggle("closed");
    document.getElementById("rightLight").innerText = rightDoor ? "ON" : "OFF";
    power -= rightDoor ? 5 : 2;
  }

  updateUI();
}

function moveAI() {
  function move(anim, setAnim) {
    let i = path.indexOf(anim);
    if (Math.random() < 0.6 && i < path.length - 1) {
      return path[i + 1];
    }
    return anim;
  }

  bonnie = move(bonnie);
  chica = move(chica);
  freddy = move(freddy);
}

function checkDeath() {
  if (bonnie === "left" && !leftDoor) die("Bonnie");
  if (chica === "right" && !rightDoor) die("Chica");
  if (freddy === "left" && !leftDoor && Math.random() < 0.3) die("Freddy");

  if (power <= 0) die("Power Out");
}

function die(who) {
  gameOver = true;
  document.getElementById("jumpscare").style.display = "flex";
  document.getElementById("jumpscare").innerText = "💀 " + who + " GOT YOU";
}

function updateMap() {
  document.querySelectorAll(".node").forEach(n => n.classList.remove("active"));

  document.getElementById(bonnie).classList.add("active");
  document.getElementById(chica).classList.add("active");
  document.getElementById(freddy).classList.add("active");
}

function tick() {
  if (gameOver) return;

  power -= 2;

  moveAI();
  checkDeath();

  if (Math.random() < 0.3) hour++;

  if (hour >= 6) {
    gameOver = true;
    document.getElementById("status").innerText = "🌅 YOU SURVIVED";
  }

  updateUI();
}

setInterval(tick, 2000);
updateUI();
updateMap();
</script>

</body>
</html>
