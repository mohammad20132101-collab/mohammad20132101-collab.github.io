<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Runner</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:white;
  text-align:center;
}

header{
  background:#1a1a2e;
  padding:15px;
}

canvas{
  background:#050814;
  border:3px solid #4c6fff;
  margin-top:15px;
  border-radius:10px;
}

button{
  margin:8px;
  padding:10px 15px;
  background:#4c6fff;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <h1>🏃 Rift Runner</h1>
  <p>Dodge the blocks and survive!</p>
</header>

<div>
  <div>Score: <span id="score">0</span></div>
  <canvas id="game" width="500" height="300"></canvas>

  <div>
    <button onclick="startGame()">Restart</button>
    <button onclick="window.location.href='index.html'">Back</button>
  </div>
</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player, obstacles, score, speed, gameLoop, frame;

function startGame(){

  player = {
    x: 50,
    y: 240,
    w: 30,
    h: 30,
    vy: 0,
    jumping:false
  };

  obstacles = [];
  score = 0;
  speed = 4;
  frame = 0;

  document.getElementById("score").innerText = score;

  clearInterval(gameLoop);
  gameLoop = setInterval(update, 20);
}

document.addEventListener("keydown", e=>{
  if(e.code === "Space"){
    if(!player.jumping){
      player.vy = -12;
      player.jumping = true;
    }
  }
});

function spawnObstacle(){
  obstacles.push({
    x: 500,
    y: 250,
    w: 20,
    h: 50
  });
}

function update(){

  frame++;

  ctx.clearRect(0,0,500,300);

  // ground
  ctx.fillStyle="#1a1a2e";
  ctx.fillRect(0,280,500,20);

  // player gravity
  player.vy += 0.6;
  player.y += player.vy;

  if(player.y >= 240){
    player.y = 240;
    player.vy = 0;
    player.jumping = false;
  }

  // draw player
  ctx.fillStyle="#4c6fff";
  ctx.fillRect(player.x,player.y,player.w,player.h);

  // spawn obstacles
  if(frame % 80 === 0){
    spawnObstacle();
  }

  // move obstacles
  for(let i=0;i<obstacles.length;i++){
    let o = obstacles[i];
    o.x -= speed;

    ctx.fillStyle="#ff2e63";
    ctx.fillRect(o.x,o.y,o.w,o.h);

    // collision
    if(
      player.x < o.x + o.w &&
      player.x + player.w > o.x &&
      player.y < o.y + o.h &&
      player.y + player.h > o.y
    ){
      clearInterval(gameLoop);
      alert("Game Over! Score: " + score);
    }
  }

  // remove off-screen obstacles
  obstacles = obstacles.filter(o => o.x > -50);

  // score
  score++;
  document.getElementById("score").innerText = score;

  // difficulty scaling
  if(score % 200 === 0){
    speed += 0.5;
  }
}

startGame();

</script>

</body>
</html>
