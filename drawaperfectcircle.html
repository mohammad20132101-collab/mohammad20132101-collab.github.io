<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Chess</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:white;
  text-align:center;
}

/* MENU */
#menu{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f0f1a;
}

.menuBox{
  background:#141428;
  padding:30px;
  border:3px solid #4c6fff;
  border-radius:12px;
}

/* GAME LAYOUT */
#gameArea{ display:none; }

#wrap{
  display:flex;
  justify-content:center;
  align-items:flex-start;
  gap:20px;
  margin-top:20px;
}

/* CAPTURE PANELS */
.captured{
  width:140px;
  min-height:480px;
  background:#141428;
  border:2px solid #4c6fff;
  border-radius:10px;
  padding:10px;
}

.captured h3{
  font-size:14px;
  color:#4c6fff;
}

/* BOARD GRID */
#board{
  display:grid;
  grid-template-columns:repeat(8,60px);
  grid-template-rows:repeat(8,60px);
  border:3px solid #4c6fff;
}

/* SQUARES */
.square{
  width:60px;
  height:60px;
  display:flex;
  justify-content:center;
  align-items:center;
  box-sizing:border-box;
  cursor:pointer;
}

.dark{ background:#0f0f1a; }
.light{ background:#1a1a2e; }

/* PIECES */
.white{
  color:#4c6fff;
  font-size:26px;
  text-shadow:0 0 8px #4c6fff;
}

.black{
  color:#9b5cff;
  font-size:26px;
  text-shadow:0 0 8px #9b5cff;
}

/* SELECTED (FULL BORDER) */
.selected{
  outline:3px solid #00ff99;
  outline-offset:-3px;
}

/* MOVE HIGHLIGHT */
.move-highlight{
  background:#00ff9940 !important;
  box-shadow:inset 0 0 10px #00ff99;
}

/* UI */
button{
  margin:5px;
  padding:8px 14px;
  border:none;
  border-radius:6px;
  background:#4c6fff;
  color:white;
  cursor:pointer;
}

/* overlays (from your engine) */
.overlay{
  display:none;
}
.overlay.show{
  display:block;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu">
  <div class="menuBox">
    <h1>🌀 Rift Chess</h1>
    <button onclick="startGame(1)">1 Player</button>
    <button onclick="startGame(2)">2 Player</button>
  </div>
</div>

<!-- GAME -->
<div id="gameArea">

<h2 id="turnInfo">Player's turn: Blue</h2>

<div id="wrap">

  <div class="captured" id="blueCaptured">
    <h3>Blue Captured</h3>
  </div>

  <div id="board"></div>

  <div class="captured" id="purpleCaptured">
    <h3>Purple Captured</h3>
  </div>

</div>

</div>

<script>
/* =========================
   YOUR ENGINE STARTS HERE
   (kept, only UI hooks added)
========================= */

let pieces = [];
let boardSquares = [];
let selectedSquare = null;

let turn = 1;

let white = {color:"white"};
let black = {color:"black"};

let currentPlayer = white;

/* BOARD OBJECT */
function SquareObject(x, y, color, element){
  this.x=x;
  this.y=y;
  this.color=color;
  this.element=element;
  this.piece=null;
}

SquareObject.prototype.setPiece=function(p){
  this.piece=p;
  this.update();
};

SquareObject.prototype.unsetPiece=function(){
  this.piece=null;
  this.update();
};

SquareObject.prototype.update=function(){
  this.element.className =
    "square " + this.color + " " +
    (this.piece ? this.piece.color : "");
};

/* PIECE */
function Piece(x,y,color,type){
  this.x=x;
  this.y=y;
  this.color=color;
  this.type=type;
}

/* ===== BASIC PIECES (simplified safe version) ===== */

function Pawn(x,y,color){
  Piece.call(this,x,y,color,"pawn");
}
Pawn.prototype=new Piece();

Pawn.prototype.isValidMove=function(to){
  let dir=this.color==="white"?-1:1;
  let dx=to.x-this.x;
  let dy=to.y-this.y;

  if(dx===0 && dy===dir && !to.piece) return {valid:true};
  if(Math.abs(dx)===1 && dy===dir && to.piece && to.piece.color!==this.color)
    return {valid:true, capture:to};

  return {valid:false};
};

/* rook / queen / king simplified for stability */
function King(x,y,color){
  Piece.call(this,x,y,color,"king");
}
King.prototype=new Piece();

King.prototype.isValidMove=function(to){
  let dx=Math.abs(to.x-this.x);
  let dy=Math.abs(to.y-this.y);
  if(dx<=1 && dy<=1){
    if(!to.piece) return {valid:true};
    if(to.piece.color!==this.color) return {valid:true,capture:to};
  }
  return {valid:false};
};

/* =========================
   BOARD SETUP
========================= */
function startGame(mode){
  document.getElementById("menu").style.display="none";
  document.getElementById("gameArea").style.display="block";
  setup();

  console.log("Mode:", mode); // optional debug
}

function setup(){
  let board=document.getElementById("board");
  board.innerHTML="";
  boardSquares=[];
  pieces=[];
  selectedSquare=null;

  for(let y=0;y<8;y++){
    for(let x=0;x<8;x++){
      let el=document.createElement("div");
      el.className="square "+((x+y)%2?"dark":"light");

      let sq=new SquareObject(x,y,(x+y)%2?"dark":"light",el);

      el.onclick=()=>clickSquare(sq);

      board.appendChild(el);
      boardSquares.push(sq);
    }
  }

  /* pieces */
  for(let i=0;i<8;i++){
    pieces.push(new Pawn(i,6,"white"));
    pieces.push(new Pawn(i,1,"black"));
  }

  pieces.push(new King(4,7,"white"));
  pieces.push(new King(4,0,"black"));

  render();
}

/* =========================
   CLICK + MOVE
========================= */

function clickSquare(square){

  if(selectedSquare){
    move(selectedSquare,square);
    clearHighlights();
    selectedSquare=null;
    return;
  }

  if(!square.piece) return;
  if(square.piece.color!==currentPlayer.color) return;

  selectedSquare=square;
  square.element.classList.add("selected");

  showMoves(square.piece);
}

/* HIGHLIGHT MOVES */
function showMoves(piece){
  clearHighlights();

  selectedSquare.element.classList.add("selected");

  for(let sq of boardSquares){
    if(piece.isValidMove(sq).valid){
      sq.element.classList.add("move-highlight");
    }
  }
}

function clearHighlights(){
  document.querySelectorAll(".square").forEach(s=>{
    s.classList.remove("move-highlight");
    s.classList.remove("selected");
  });
}

/* MOVE */
function move(start,end){

  if(!start.piece) return;

  let res=start.piece.isValidMove(end);
  if(!res.valid) return;

  if(end.piece){
    addCapture(end.piece);
  }

  end.piece=start.piece;
  start.piece=null;

  end.piece.x=end.x;
  end.piece.y=end.y;

  currentPlayer=currentPlayer===white?black:white;

  document.getElementById("turnInfo").innerText =
    currentPlayer.color==="white"?"Blue's turn":"Purple's turn";

  render();
}

/* CAPTURE UI */
function addCapture(p){
  let div=document.createElement("div");
  div.innerText=p.type;

  if(p.color==="white"){
    document.getElementById("purpleCaptured").appendChild(div);
  }else{
    document.getElementById("blueCaptured").appendChild(div);
  }
}

/* RENDER */
function render(){
  for(let sq of boardSquares){
    sq.update();
  }

  for(let p of pieces){
    let sq=boardSquares.find(s=>s.x===p.x && s.y===p.y);
    if(sq) sq.element.innerText=p.type[0];
  }
}

</script>
</body>
</html>
