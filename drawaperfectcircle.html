<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Perfect Draw</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:white;
  text-align:center;
}

h1{
  color:#4c6fff;
  text-shadow:0 0 12px #4c6fff;
  margin:10px;
}

#score{
  font-size:22px;
  color:#00ff99;
  text-shadow:0 0 10px #00ff99;
}

canvas{
  background:#141428;
  border:3px solid #4c6fff;
  border-radius:10px;
  box-shadow:0 0 25px #4c6fff33;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>🌀 Rift Perfect Draw</h1>
<div id="score">Hold mouse to draw</div>

<canvas id="c" width="500" height="500"></canvas>

<script>
let canvas = document.getElementById("c");
let ctx = canvas.getContext("2d");

let drawing = false;
let finished = false;

let points = [];
let mode = "circle";

let center = {x:250,y:250};
let score = 0;

/* RESET */
function reset(){
  ctx.clearRect(0,0,500,500);
  points = [];
  drawing = false;
  finished = false;
  score = 0;
  updateScore("Hold mouse to draw");
  drawCenter();
}

/* CENTER DOT */
function drawCenter(){
  ctx.fillStyle="#4c6fff";
  ctx.shadowBlur=12;
  ctx.shadowColor="#4c6fff";
  ctx.beginPath();
  ctx.arc(center.x,center.y,5,0,Math.PI*2);
  ctx.fill();
}
drawCenter();

/* START DRAW */
canvas.addEventListener("mousedown", (e)=>{

  if(finished){
    reset();
    drawCenter();
    return;
  }

  drawing = true;
});

/* STOP DRAW (finish attempt) */
canvas.addEventListener("mouseup", ()=>{
  if(!drawing) return;

  drawing = false;
  finished = true;

  updateScore("Final Score: " + score + "%");
});

/* DRAW LOOP */
canvas.addEventListener("mousemove", (e)=>{
  if(!drawing || finished) return;

  let rect = canvas.getBoundingClientRect();
  let x = e.clientX - rect.left;
  let y = e.clientY - rect.top;

  points.push({x,y});

  let s = pointScore(x,y);
  drawPoint(x,y,s);

  calculateScore();
});

/* LIVE POINT COLOUR */
function drawPoint(x,y,s){

  let col = "#ff8844";

  if(s > 80) col = "#00ff99";
  else if(s > 50) col = "#ffff66";

  ctx.fillStyle = col;
  ctx.shadowBlur = 6;
  ctx.shadowColor = col;

  ctx.beginPath();
  ctx.arc(x,y,2.5,0,Math.PI*2);
  ctx.fill();
}

/* POINT SCORE */
function pointScore(x,y){
  let r = 120;
  let d = Math.hypot(x-center.x,y-center.y);

  return Math.max(0, 100 - Math.abs(d-r)*1.2);
}

/* FINAL SCORE */
function calculateScore(){
  if(points.length < 10) return;

  let total = 0;
  let r = 120;

  for(let p of points){
    let d = Math.hypot(p.x-center.x,p.y-center.y);
    total += Math.abs(d-r);
  }

  score = Math.max(0, Math.min(100,
    Math.round(100 - total / points.length / 1.8)
  ));

  updateScore("Score: " + score + "%");
}

/* UI */
function updateScore(text){
  document.getElementById("score").innerText = text;
}
</script>

</body>
</html>
