<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Perfect Circle</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:white;
  text-align:center;
}

h1{
  margin:10px;
  color:#4c6fff;
  text-shadow:0 0 12px #4c6fff;
}

#score{
  font-size:22px;
  color:#00ff99;
  text-shadow:0 0 10px #00ff99;
}

canvas{
  background:#141428;
  border:3px solid #4c6fff;
  border-radius:10px;
  box-shadow:0 0 25px #4c6fff33;
}
</style>
</head>

<body>

<h1>🌀 Rift Perfect Circle</h1>
<div id="score">Hold mouse to draw</div>

<canvas id="c" width="500" height="500"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let drawing = false;
let finished = false;
let points = [];

const center = {x:250,y:250};
let lastScore = 0;

/* RESET */
function reset(){
  ctx.clearRect(0,0,500,500);
  points = [];
  drawing = false;
  finished = false;
  lastScore = 0;
  drawCenter();
  setText("Hold mouse to draw");
}

/* CENTER DOT */
function drawCenter(){
  ctx.fillStyle="#4c6fff";
  ctx.shadowBlur=10;
  ctx.shadowColor="#4c6fff";
  ctx.beginPath();
  ctx.arc(center.x,center.y,5,0,Math.PI*2);
  ctx.fill();
}
drawCenter();

/* START */
canvas.addEventListener("mousedown", ()=>{
  if(finished) reset();

  drawing = true;
  ctx.beginPath();
});

/* END */
canvas.addEventListener("mouseup", ()=>{
  if(!drawing) return;

  drawing = false;
  finished = true;

  setText("Final: " + lastScore.toFixed(1) + "%");
});

/* DRAW */
canvas.addEventListener("mousemove", (e)=>{
  if(!drawing || finished) return;

  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  points.push({x,y});

  let acc = pointAccuracy(x,y);
  drawStroke(x,y,acc);

  lastScore = computeScore();
  setText("Score: " + lastScore.toFixed(1) + "%");
});

/* 🎨 COLOURED REAL STROKE */
function drawStroke(x,y,acc){

  let col = "#ff4444";
  if(acc > 80) col = "#00ff99";
  else if(acc > 50) col = "#ffdd55";

  ctx.strokeStyle = col;
  ctx.shadowBlur = 6;
  ctx.shadowColor = col;
  ctx.lineWidth = 3;

  ctx.lineTo(x,y);
  ctx.stroke();
}

/* 🧠 BEST-FIT CIRCLE APPROX (REAL GAME METHOD) */
function computeScore(){

  if(points.length < 10) return 0;

  // Step 1: estimate center (average of points)
  let cx = 0, cy = 0;
  for(let p of points){
    cx += p.x;
    cy += p.y;
  }
  cx /= points.length;
  cy /= points.length;

  // Step 2: estimate radius
  let r = 0;
  for(let p of points){
    r += dist(p.x,p.y,cx,cy);
  }
  r /= points.length;

  // Step 3: error (variance from circle)
  let error = 0;
  let wobble = 0;

  for(let i=1;i<points.length;i++){
    let p = points[i];

    let d = dist(p.x,p.y,cx,cy);
    error += Math.abs(d - r);

    wobble += dist(points[i],points[i-1]);
  }

  let avgError = error / points.length;
  let avgWobble = wobble / points.length;

  // REALISTIC SCORING MODEL
  let score =
    100
    - (avgError / r) * 130
    - Math.abs(avgWobble - 5) * 1.5;

  return clamp(score,0,100);
}

/* LIVE POINT ACCURACY */
function pointAccuracy(x,y){

  let cx = averageX();
  let cy = averageY();
  let r = averageRadius(cx,cy);

  let d = dist(x,y,cx,cy);

  return Math.max(0, 100 - Math.abs(d - r) * 1.5);
}

/* helpers */
function averageX(){
  return points.reduce((a,p)=>a+p.x,0)/Math.max(points.length,1);
}
function averageY(){
  return points.reduce((a,p)=>a+p.y,0)/Math.max(points.length,1);
}
function averageRadius(cx,cy){
  let sum = 0;
  for(let p of points){
    sum += dist(p.x,p.y,cx,cy);
  }
  return sum / Math.max(points.length,1);
}

function dist(x1,y1,x2,y2){
  return Math.hypot(x1-x2,y1-y2);
}

function clamp(v,min,max){
  return Math.max(min,Math.min(max,v));
}

/* UI */
function setText(t){
  document.getElementById("score").innerText = t;
}
</script>

</body>
</html>
