<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Hub - Perfect Circle v2</title>

<style>
body{
  margin:0;
  background:#0f0f1a;
  font-family:Arial;
  color:white;
  overflow:hidden;
}

h1{
  text-align:center;
  color:#4c6fff;
  text-shadow:0 0 12px #4c6fff;
  margin:10px;
}

/* HUD */
#hud{
  display:flex;
  justify-content:center;
  gap:10px;
}

.panel{
  background:#141428;
  border:2px solid #4c6fff;
  border-radius:10px;
  padding:10px 20px;
  box-shadow:0 0 15px #4c6fff33;
  min-width:180px;
  text-align:center;
}

#score{
  color:#00ff99;
  font-size:20px;
  text-shadow:0 0 10px #00ff99;
}

#wrap{
  display:flex;
  justify-content:center;
  margin-top:15px;
}

canvas{
  background:#141428;
  border:3px solid #4c6fff;
  border-radius:10px;
  box-shadow:0 0 25px #4c6fff33;
  cursor:crosshair;
}
</style>
</head>

<body>

<h1>🌀 Rift Hub — Perfect Circle v2</h1>

<div id="hud">
  <div class="panel" id="score">Hold mouse to draw</div>
  <div class="panel">Mode: Circle</div>
</div>

<div id="wrap">
<canvas id="c" width="520" height="520"></canvas>
</div>

<script>
/* ===============================
   CORE ENGINE (EXPANDED VERSION)
================================ */

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let session = {
  drawing:false,
  finished:false,
  points:[],
  lastScore:0,
  lastRenderTime:0
};

/* ===============================
   INIT
================================ */
function init(){
  resetSession();
}

/* ===============================
   RESET SESSION
================================ */
function resetSession(){

  session.points = [];
  session.drawing = false;
  session.finished = false;
  session.lastScore = 0;

  clear();
  drawCenter();

  updateUI("Hold mouse to draw");
}

/* ===============================
   CLEAR CANVAS
================================ */
function clear(){
  ctx.clearRect(0,0,520,520);
}

/* ===============================
   CENTER MARKER
================================ */
function drawCenter(){
  const c = getCenter();

  ctx.save();
  ctx.fillStyle="#4c6fff";
  ctx.shadowBlur=14;
  ctx.shadowColor="#4c6fff";

  ctx.beginPath();
  ctx.arc(c.x,c.y,5,0,Math.PI*2);
  ctx.fill();

  ctx.restore();
}

/* ===============================
   INPUT SYSTEM
================================ */
canvas.addEventListener("mousedown", () => {

  if(session.finished){
    resetSession();
  }

  session.drawing = true;
  ctx.beginPath();
});

canvas.addEventListener("mouseup", () => {

  if(!session.drawing) return;

  session.drawing = false;
  session.finished = true;

  let final = computeScore();
  session.lastScore = final;

  updateUI("Final: " + final.toFixed(1) + "%");
});

canvas.addEventListener("mousemove", (e) => {

  if(!session.drawing || session.finished) return;

  const r = canvas.getBoundingClientRect();

  const x = e.clientX - r.left;
  const y = e.clientY - r.top;

  session.points.push({x,y});

  renderStroke(x,y);

  let live = computeScore();
  session.lastScore = live;

  updateUI("Score: " + live.toFixed(1) + "%");
});

/* ===============================
   STROKE RENDER ENGINE (SMOOTH)
================================ */
function renderStroke(x,y){

  const pts = session.points;

  if(pts.length < 2) return;

  const fit = fitCircle(pts);
  if(!fit.r || fit.r <= 0) return;

  const p = pts[pts.length-1];
  const d = dist(p.x,p.y,fit.x,fit.y);

  const acc = clamp(100 - (Math.abs(d-fit.r)/fit.r)*150,0,100);

  let col = "#ff4d4d";
  if(acc > 80) col = "#00ff99";
  else if(acc > 50) col = "#ffd24d";

  ctx.save();

  ctx.strokeStyle = col;
  ctx.lineWidth = 3;
  ctx.shadowBlur = 6;
  ctx.shadowColor = col;

  ctx.lineCap = "round";
  ctx.lineJoin = "round";

  ctx.lineTo(x,y);
  ctx.stroke();

  ctx.restore();
}

/* ===============================
   SCORING ENGINE (IMPROVED)
================================ */
function computeScore(){

  const pts = session.points;

  if(pts.length < 12) return 0;

  const fit = fitCircle(pts);

  if(!fit.r || fit.r <= 0) return 0;

  let error = 0;
  let wobble = 0;

  for(let i=0;i<pts.length;i++){

    const p = pts[i];
    const d = dist(p.x,p.y,fit.x,fit.y);

    error += Math.abs(d - fit.r);

    if(i > 0){
      wobble += dist(pts[i],pts[i-1]);
    }
  }

  const avgError = error / pts.length;
  const avgWobble = wobble / pts.length;

  let score =
    100
    - (avgError / fit.r) * 135
    - Math.abs(avgWobble - 4.8) * 1.1;

  /* closure penalty */
  const start = pts[0];
  const end = pts[pts.length-1];

  const closure = dist(start.x,start.y,end.x,end.y);

  score -= (closure / fit.r) * 12;

  return clamp(score,0,100);
}

/* ===============================
   BEST FIT CIRCLE (STABLE)
================================ */
function fitCircle(pts){

  let cx = 0, cy = 0;

  for(let p of pts){
    cx += p.x;
    cy += p.y;
  }

  cx /= pts.length;
  cy /= pts.length;

  let r = 0;

  for(let p of pts){
    r += dist(p.x,p.y,cx,cy);
  }

  r /= pts.length;

  return {x:cx,y:cy,r:r};
}

/* ===============================
   HELPERS
================================ */
function getCenter(){
  return {x:260,y:260};
}

function dist(x1,y1,x2,y2){
  return Math.hypot(x1-x2,y1-y2);
}

function clamp(v,min,max){
  return Math.max(min,Math.min(max,v));
}

function updateUI(t){
  document.getElementById("score").innerText = t;
}

/* INIT */
init();

</script>

</body>
</html>
