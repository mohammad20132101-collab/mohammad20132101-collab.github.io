<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Checkers</title>
<style>
@import url("https://fonts.googleapis.com/css?family=Lato:400,400i,700");

:root {
    --p1-color: #4c6fff;
    --p2-color: #9b5cff;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f1a;
    color: white;
    text-align: center;
    user-select: none;
    -webkit-user-select: none;
    transition: background 0.8s ease;
}
h1 { 
    color: white; 
    margin: 15px 0 5px 0; 
    text-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
}

/* MENU OVERLAY */
#menu {
    position: fixed;
    inset: 0;
    background: #0f0f1a;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
}
.menuBox {
    background: #141428;
    padding: 30px;
    border-radius: 15px;
    border: 3px solid #4c6fff;
    box-shadow: 0 0 25px rgba(76,108,255,0.35);
    text-align: center;
}
.menuBox h1 {
    color: #4c6fff;
    margin-bottom: 10px;
}

/* CONTROL PANEL */
.btn-row {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin: 10px 0;
}
button {
    background: linear-gradient(135deg, #4c6fff, #2f3cff);
    color: white;
    border: 1px solid rgba(76, 111, 255, 0.5);
    padding: 10px 18px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
    box-shadow: 0 0 10px rgba(76, 111, 255, 0.25);
}
button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 18px rgba(76, 111, 255, 0.45);
}

.controls {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: rgba(20, 20, 40, 0.85);
    padding: 15px;
    border-radius: 12px;
    max-width: 400px;
    margin: 10px auto;
    border: 1px solid rgba(255, 255, 255, 0.1);
}
.player {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    height: 40px;
}
.player span {
    color: #ffc;
    font: 18px Lato;
}
.player-num {
    width: 120px;
    text-align: left;
    outline: none;
    cursor: text;
    white-space: nowrap;
    overflow: hidden;
}
.score {
    font-weight: bold;
    width: 40px;
    text-align: right;
}
input[type="color"] {
    border: none;
    background: transparent;
    cursor: pointer;
    width: 40px;
    height: 30px;
}

/* PLAY AREA LAYOUT */
#gameContainer {
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    justify-content: center;
    gap: 20px;
    margin: 15px auto;
    flex-wrap: wrap;
}
#gameBoard {
    background: #141428;
    padding: 15px;
    border-radius: 15px;
    border: 3px solid #4c6fff;
    box-shadow: 0 0 20px rgba(76, 111, 255, 0.35);
}
.grid {
    display: grid;
    grid-template-columns: repeat(8, 55px);
    grid-template-rows: repeat(8, 55px);
    background: #141428;
}
.cell {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    box-sizing: border-box;
    cursor: pointer;
}
.cell.light { background: #1a1a2e; border: 1px solid #252545; }
.cell.dark { background: #111122; border: 1px solid #1c1c38; }

/* CAPTURED PIECES SIDE PANELS */
.captured-box {
    background: #141428;
    border: 2px solid #4c6fff;
    border-radius: 12px;
    padding: 10px;
    min-width: 90px;
    max-width: 120px;
    min-height: 300px;
    display: flex;
    flex-direction: column;
    align-items: center;
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
}
.captured-box h3 {
    font-size: 14px;
    margin: 0 0 10px 0;
    color: #ffc;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    width: 100%;
    padding-bottom: 5px;
}
.captured-fleet {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    justify-content: center;
}

/* PIECE DESIGN & HIGHLIGHTS */
.cell.selected {
    background: rgba(76, 111, 255, 0.25) !important;
    box-shadow: inset 0 0 10px #4c6fff;
}
.cell.valid-move::after {
    content: '';
    width: 16px;
    height: 16px;
    background: #23cc71;
    border-radius: 50%;
    opacity: 0.7;
    position: absolute;
    z-index: 5;
    box-shadow: 0 0 8px #23cc71;
}
.cell.valid-move.capture::after {
    width: 40px;
    height: 40px;
    border: 3px solid #ff2a2a;
    background: transparent;
    border-radius: 50%;
    box-shadow: 0 0 8px #ff2a2a;
}
.piece {
    font-size: 38px;
    z-index: 3;
    transition: transform 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
}
.piece.white, .captured-piece.white-piece {
    color: var(--p1-color);
    filter: drop-shadow(0 0 4px var(--p1-color));
}
.piece.black, .captured-piece.black-piece {
    color: var(--p2-color);
    filter: drop-shadow(0 0 4px var(--p2-color));
}
.captured-piece {
    font-size: 28px;
}

#statusBox {
    margin: 10px auto;
    background: #141428;
    border: 2px solid #4c6fff;
    padding: 8px 20px;
    border-radius: 10px;
    font-size: 16px;
    display: inline-block;
    min-width: 180px;
}
.win-text {
    color: #6bff6b;
    font-weight: bold;
    animation: pulse 1s infinite alternate;
}
@keyframes pulse {
    0% { text-shadow: 0 0 5px #6bff6b33; }
    100% { text-shadow: 0 0 15px #6bff6b88; }
}

@media (max-width: 700px) {
    #gameContainer { flex-direction: column; align-items: center; }
    .captured-box { min-height: auto; width: 80%; flex-direction: row; }
    .captured-box h3 { width: auto; border-bottom: none; margin-right: 10px; padding: 0;}
    .grid { grid-template-columns: repeat(8, 42px); grid-template-rows: repeat(8, 42px); }
    .piece { font-size: 28px; }
}
</style>
</head>
<body>

<div id="menu">
  <div class="menuBox">
    <h1>🌀 Rift Checkers</h1>
    <p>Select Game Mode</p>
    <button onclick="startGame(1)">1 Player (vs AI)</button>
    <button onclick="startGame(2)">2 Player</button>
  </div>
</div>

<h1>🌀 Rift Checkers</h1>

<div class="btn-row">
  <button onclick="initGame()">Reset</button>
  <button onclick="showMenu()">Menu</button>
  <button onclick="window.location.href='index.html'">Back</button>
</div>

<div class="controls">
  <div class="player">
    <span class="player-num" contenteditable="true" id="p1Name" onkeydown="if(event.key==='Enter')event.preventDefault()">Player 1</span>
    <input type="color" value="#4c6fff" id="p1Colour" />
    <span class="score" id="p1Score">12</span>
  </div>
  <div class="player">
    <span class="player-num" contenteditable="true" id="p2Name" onkeydown="if(event.key==='Enter')event.preventDefault()">Player 2</span>
    <input type="color" value="#9b5cff" id="p2Colour" />
    <span class="score" id="p2Score">12</span>
  </div>
</div>

<div id="statusBox"><span id="status">White's Turn</span></div>

<div id="gameContainer">
    <div class="captured-box">
        <h3>Lost White</h3>
        <div id="whiteCapturedFleet" class="captured-fleet"></div>
    </div>

    <div id="gameBoard">
        <div id="gridContainer" class="grid"></div>
    </div>

    <div class="captured-box">
        <h3>Lost Purple</h3>
        <div id="blackCapturedFleet" class="captured-fleet"></div>
    </div>
</div>

<script>
const PIECE_GLYPHS = {
    'p': '⛃', 'k': '⛁',
    'P': '⛃', 'K': '⛁'
};

let board = [];
let turn = 'W'; 
let selectedSquare = null;
let validMoves = [];
let gameOver = false;
let mode = 2; 

let capturedWhite = [];
let capturedBlack = [];

const gridContainer = document.getElementById('gridContainer');

function showMenu() {
    document.getElementById("menu").style.display = "flex";
}

function startGame(selectedMode) {
    mode = selectedMode;
    document.getElementById("menu").style.display = "none";
    
    if (mode === 1) {
        document.getElementById('p2Name').textContent = 'Rift AI';
        document.getElementById('p2Name').contentEditable = 'false';
    } else {
        document.getElementById('p2Name').textContent = 'Player 2';
        document.getElementById('p2Name').contentEditable = 'true';
    }
    initGame();
}

function initGame() {
    turn = 'W';
    selectedSquare = null;
    validMoves = [];
    gameOver = false;
    capturedWhite = [];
    capturedBlack = [];
    
    // Standard 8x8 Checkers setup (Pieces only go on dark fields)
    board = Array(8).fill(null).map(() => Array(8).fill(''));
    
    // Setup Black/Purple Pieces (Rows 0, 1, 2)
    for (let r = 0; r < 3; r++) {
        for (let c = 0; c < 8; c++) {
            if ((r + c) % 2 === 1) board[r][c] = 'p';
        }
    }
    
    // Setup White Pieces (Rows 5, 6, 7)
    for (let r = 5; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
            if ((r + c) % 2 === 1) board[r][c] = 'P';
        }
    }
    
    updateThemeColors();
    buildBoardUI();
    updateDashboard();
}

function updateThemeColors() {
    const p1Col = document.getElementById('p1Colour').value;
    const p2Col = document.getElementById('p2Colour').value;
    document.documentElement.style.setProperty('--p1-color', p1Col);
    document.documentElement.style.setProperty('--p2-color', p2Col);
    
    document.body.style.background = (turn === 'W') ? p1Col : p2Col;
}

function buildBoardUI() {
    gridContainer.innerHTML = '';
    for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
            const cell = document.createElement('div');
            cell.className = `cell ${(r + c) % 2 === 0 ? 'light' : 'dark'}`;
            
            const piece = board[r][c];
            if (piece !== '') {
                const pieceEl = document.createElement('div');
                pieceEl.className = `piece ${piece === piece.toUpperCase() ? 'white' : 'black'}`;
                pieceEl.textContent = PIECE_GLYPHS[piece];
                cell.appendChild(pieceEl);
            }
            
            cell.addEventListener('click', () => handleSquareClick(r, c));
            gridContainer.appendChild(cell);
        }
    }
}

function handleSquareClick(r, c) {
    if (gameOver || (mode === 1 && turn === 'B')) return;
    
    const piece = board[r][c];
    const isWhitePiece = piece !== '' && piece === piece.toUpperCase();
    const isBlackPiece = piece !== '' && piece === piece.toLowerCase();
    
    const moveIdx = validMoves.findIndex(m => m.r === r && m.c === c);
    if (moveIdx !== -1) {
        executeMove(selectedSquare.r, selectedSquare.c, r, c);
        return;
    }
    
    clearHighlights();
    
    if ((turn === 'W' && isWhitePiece) || (turn === 'B' && isBlackPiece)) {
        selectedSquare = { r, c };
        validMoves = calculateValidMoves(r, c);
        highlightSquares(r, c);
    } else {
        selectedSquare = null;
        validMoves = [];
    }
}

function calculateValidMoves(r, c) {
    const piece = board[r][c];
    if (piece === '') return [];
    
    const isWhite = piece === piece.toUpperCase();
    const isKing = piece.toLowerCase() === 'k';
    let moves = [];
    
    // Set directions based on piece standard tracking patterns
    let dirs = [];
    if (isKing) {
        dirs = [[-1, -1], [-1, 1], [1, -1], [1, 1]];
    } else {
        dirs = isWhite ? [[-1, -1], [-1, 1]] : [[1, -1], [1, 1]];
    }
    
    dirs.forEach(d => {
        let nr = r + d[0];
        let nc = c + d[1];
        
        if (nr >= 0 && nr < 8 && nc >= 0 && nc < 8) {
            const target = board[nr][nc];
            if (target === '') {
                moves.push({ r: nr, c: nc, capture: false });
            } else if ((target === target.toUpperCase()) !== isWhite) {
                // Check if jump landing space is free
                let jumpR = nr + d[0];
                let jumpC = nc + d[1];
                if (jumpR >= 0 && jumpR < 8 && jumpC >= 0 && jumpC < 8 && board[jumpR][jumpC] === '') {
                    moves.push({ r: jumpR, c: jumpC, capture: true, victim: { r: nr, c: nc } });
                }
            }
        }
    });
    
    return moves;
}

function executeMove(fromR, fromC, toR, toC) {
    let movingPiece = board[fromR][fromC];
    const moveDetails = validMoves.find(m => m.r === toR && m.c === toC);
    
    if (moveDetails && moveDetails.capture) {
        const vicR = moveDetails.victim.r;
        const vicC = moveDetails.victim.c;
        const victimPiece = board[vicR][vicC];
        
        if (victimPiece === victimPiece.toUpperCase()) {
            capturedWhite.push('P');
        } else {
            capturedBlack.push('p');
        }
        board[vicR][vicC] = '';
    }

    // King Promotion Rules Check
    if (movingPiece === 'P' && toR === 0) movingPiece = 'K';
    if (movingPiece === 'p' && toR === 7) movingPiece = 'k';

    board[toR][toC] = movingPiece;
    board[fromR][fromC] = '';
    
    turn = turn === 'W' ? 'B' : 'W';
    selectedSquare = null;
    validMoves = [];
    
    updateThemeColors();
    buildBoardUI();
    checkWinCondition();
    updateDashboard();

    if (mode === 1 && turn === 'B' && !gameOver) {
        setTimeout(executeAIMove, 600);
    }
}

/* TACTICAL PIECE SCANNER AI */
function executeAIMove() {
    let legalMoves = [];
    
    for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
            let piece = board[r][c];
            if (piece !== '' && piece === piece.toLowerCase()) {
                let moves = calculateValidMoves(r, c);
                moves.forEach(m => {
                    let weight = 0;
                    if (m.capture) {
                        weight += 100; // Prioritize jump logic paths
                    }
                    weight += r * 2; // Advance non-king pawns forward
                    weight += Math.random() * 5; 
                    legalMoves.push({ from: {r, c}, to: {r: m.r, c: m.c}, weight, parentMoves: moves });
                });
            }
        }
    }
    
    // Filter jumps explicitly if tactical match configurations apply
    let jumpMoves = legalMoves.filter(m => board[m.from.r][m.from.c] !== '' && m.weight >= 100);
    let finalSelectionList = jumpMoves.length > 0 ? jumpMoves : legalMoves;

    if (finalSelectionList.length > 0) {
        finalSelectionList.sort((a, b) => b.weight - a.weight);
        const bestChoice = finalSelectionList[0];
        
        // Pass simulated target validation directly into click tracking matrix
        validMoves = calculateValidMoves(bestChoice.from.r, bestChoice.from.c);
        selectedSquare = { r: bestChoice.from.r, c: bestChoice.from.c };
        executeMove(bestChoice.from.r, bestChoice.from.c, bestChoice.to.r, bestChoice.to.c);
    }
}

function checkWinCondition() {
    let whiteRemaining = 0;
    let blackRemaining = 0;
    
    for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
            if (board[r][c] !== '') {
                if (board[r][c] === board[r][c].toUpperCase()) whiteRemaining++;
                else blackRemaining++;
            }
        }
    }
    
    if (whiteRemaining === 0 || blackRemaining === 0) {
        gameOver = true;
        const winnerName = whiteRemaining > 0 
            ? document.getElementById('p1Name').textContent.trim() 
            : document.getElementById('p2Name').textContent.trim();
            
        document.getElementById('status').innerHTML = `<span class="win-text">${winnerName} Wins! 🏆</span>`;
    }
}

function highlightSquares(r, c) {
    gridContainer.children[r * 8 + c].classList.add('selected');
    validMoves.forEach(move => {
        const targetCell = gridContainer.children[move.r * 8 + move.c];
        targetCell.classList.add('valid-move');
        if (move.capture) targetCell.classList.add('capture');
    });
}

function clearHighlights() {
    for (let cell of gridContainer.children) {
        cell.classList.remove('selected', 'valid-move', 'capture');
    }
}

function updateDashboard() {
    if (gameOver) return;
    
    let totalWhiteLeft = 0;
    let totalBlackLeft = 0;
    for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
            if (board[r][c] !== '') {
                if (board[r][c] === board[r][c].toUpperCase()) totalWhiteLeft++;
                else totalBlackLeft++;
            }
        }
    }
    document.getElementById('p1Score').textContent = totalWhiteLeft;
    document.getElementById('p2Score').textContent = totalBlackLeft;

    const whiteFleet = document.getElementById('whiteCapturedFleet');
    const blackFleet = document.getElementById('blackCapturedFleet');
    whiteFleet.innerHTML = '';
    blackFleet.innerHTML = '';

    capturedWhite.forEach(p => {
        let span = document.createElement('span');
        span.className = 'captured-piece white-piece';
        span.textContent = PIECE_GLYPHS[p];
        whiteFleet.appendChild(span);
    });
    capturedBlack.forEach(p => {
        let span = document.createElement('span');
        span.className = 'captured-piece black-piece';
        span.textContent = PIECE_GLYPHS[p];
        blackFleet.appendChild(span);
    });

    const activeName = turn === 'W' ? document.getElementById('p1Name').textContent : document.getElementById('p2Name').textContent;
    document.getElementById('status').innerHTML = `Turn: <span style="font-weight:bold; color: var(--${turn === 'W' ? 'p1' : 'p2'}-color)">${activeName}</span>`;
}

document.getElementById('p1Colour').addEventListener('input', updateThemeColors);
document.getElementById('p2Colour').addEventListener('input', updateThemeColors);

showMenu();
</script>
</body>
</html>
