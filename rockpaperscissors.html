<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift RPS</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:white;
  text-align:center;
}

/* TITLE */
h1{
  margin:15px;
  color:#4c6fff;
  text-shadow:0 0 12px #4c6fff;
}

/* SCORE */
#scoreBoard{
  display:flex;
  justify-content:center;
  gap:20px;
  margin:10px;
}

.box{
  background:#141428;
  border:2px solid #4c6fff;
  padding:10px 20px;
  border-radius:10px;
  min-width:120px;
  box-shadow:0 0 15px #4c6fff33;
}

/* GAME AREA */
#arena{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:60px;
  margin-top:30px;
}

/* HANDS */
.hand{
  font-size:90px;
  filter: drop-shadow(0 0 10px #4c6fff);
  transition:0.3s;
}

.label{
  margin-top:10px;
  color:#aaa;
}

/* CENTER VS */
#vs{
  font-size:30px;
  color:#00ff99;
  text-shadow:0 0 10px #00ff99;
}

/* RESULT */
#result{
  font-size:22px;
  margin:20px;
  color:#00ff99;
  text-shadow:0 0 10px #00ff99;
}

/* BUTTONS */
button{
  background:#141428;
  border:2px solid #4c6fff;
  color:white;
  padding:12px 18px;
  margin:8px;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
  transition:0.2s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #4c6fff66;
}

/* BACK */
#back{
  background:#1a1a2e;
  border:2px solid #9b5cff;
  color:#9b5cff;
}

#back:hover{
  box-shadow:0 0 15px #9b5cff66;
}
</style>
</head>

<body>

<h1>🌀 Rift Rock Paper Scissors</h1>

<div id="scoreBoard">
  <div class="box">You: <span id="playerScore">0</span></div>
  <div class="box">AI: <span id="aiScore">0</span></div>
</div>

<div id="arena">

  <div>
    <div id="playerHand" class="hand">✊</div>
    <div class="label">YOU</div>
  </div>

  <div id="vs">VS</div>

  <div>
    <div id="aiHand" class="hand">✊</div>
    <div class="label">AI</div>
  </div>

</div>

<div id="result">Choose your move</div>

<div>
  <button onclick="play('rock')">✊ Rock</button>
  <button onclick="play('paper')">✋ Paper</button>
  <button onclick="play('scissors')">✌ Scissors</button>
</div>

<div>
  <button onclick="resetGame()">Reset</button>
  <button id="back" onclick="goBack()">⬅ Back</button>
</div>

<script>

let player = 0;
let ai = 0;

const playerHand = document.getElementById("playerHand");
const aiHand = document.getElementById("aiHand");

const resultText = document.getElementById("result");

const pScore = document.getElementById("playerScore");
const aScore = document.getElementById("aiScore");

/* MAP HANDS */
function getHand(x){
  if(x === "rock") return "✊";
  if(x === "paper") return "✋";
  return "✌";
}

/* PLAY */
function play(choice){

  const options = ["rock","paper","scissors"];
  const aiChoice = options[Math.floor(Math.random()*3)];

  /* ANIMATION RESET */
  playerHand.innerText = "✊";
  aiHand.innerText = "✊";
  resultText.innerText = "...";
  resultText.style.color = "#00ff99";

  setTimeout(()=>{

    playerHand.innerText = getHand(choice);
    aiHand.innerText = getHand(aiChoice);

    let result = "";

    if(choice === aiChoice){
      result = "Draw!";
      resultText.style.color = "#ffd24d";
    }
    else if(
      (choice==="rock" && aiChoice==="scissors") ||
      (choice==="paper" && aiChoice==="rock") ||
      (choice==="scissors" && aiChoice==="paper")
    ){
      result = "You Win!";
      player++;
      resultText.style.color = "#00ff99";
    }
    else{
      result = "AI Wins!";
      ai++;
      resultText.style.color = "#ff4d4d";
    }

    resultText.innerText = result;

    pScore.innerText = player;
    aScore.innerText = ai;

  },500);
}

/* RESET */
function resetGame(){
  player = 0;
  ai = 0;

  pScore.innerText = "0";
  aScore.innerText = "0";

  playerHand.innerText = "✊";
  aiHand.innerText = "✊";

  resultText.innerText = "Choose your move";
  resultText.style.color = "#00ff99";
}

/* BACK */
function goBack(){
  window.location.href = "index.html";
}

</script>

</body>
</html>
