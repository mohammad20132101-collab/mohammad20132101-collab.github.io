<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift RPS</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

/* OUTER GLOW BACKGROUND */
body::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:radial-gradient(circle at center,#1a1a3a,#0f0f1a);
  z-index:-2;
}

/* MAIN PANEL */
#panel{
  width:600px;
  padding:25px;
  background:#1b2a4a;
  border:3px solid #4c6fff;
  border-radius:14px;
  box-shadow:0 0 25px #4c6fff55;
  text-align:center;
  position:relative;
}

/* TITLE */
h1{
  margin:5px 0 15px 0;
  color:#4c6fff;
  text-shadow:0 0 12px #4c6fff;
}

/* SCORE */
#scoreBoard{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-bottom:15px;
}

.box{
  background:#141428;
  border:2px solid #4c6fff;
  padding:10px 18px;
  border-radius:10px;
  min-width:120px;
}

/* ARENA */
#arena{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:50px;
  margin:20px 0;
}

.hand{
  width:120px;
  height:120px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:50px;
  border-radius:20px;
  background:#141428;
  border:2px solid #4c6fff;
  box-shadow:0 0 15px #4c6fff33;
}

/* SHAKE */
@keyframes shake {
  0%{transform:translateY(0);}
  25%{transform:translateY(-6px);}
  50%{transform:translateY(6px);}
  75%{transform:translateY(-6px);}
  100%{transform:translateY(0);}
}
.shake{
  animation:shake 0.15s infinite;
}

/* RESULT */
#result{
  font-size:22px;
  margin:10px;
  color:#00ff99;
  text-shadow:0 0 10px #00ff99;
}

/* BUTTONS */
button{
  background:#141428;
  border:2px solid #4c6fff;
  color:white;
  padding:12px 18px;
  margin:6px;
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #4c6fff55;
}

#back{
  border-color:#9b5cff;
  color:#9b5cff;
}

/* RADIAL PULSE */
#pulse{
  position:fixed;
  top:50%;
  left:50%;
  width:20px;
  height:20px;
  transform:translate(-50%,-50%);
  border-radius:50%;
  pointer-events:none;
  opacity:0;
  z-index:999;
}

@keyframes pulseAnim{
  0%{
    transform:translate(-50%,-50%) scale(0.2);
    opacity:0.8;
  }
  100%{
    transform:translate(-50%,-50%) scale(14);
    opacity:0;
  }
}
</style>
</head>

<body>

<div id="pulse"></div>

<div id="panel">

<h1>🌀 Rift Rock Paper Scissors</h1>

<div id="scoreBoard">
  <div class="box">You: <span id="playerScore">0</span></div>
  <div class="box">AI: <span id="aiScore">0</span></div>
</div>

<div id="arena">
  <div class="hand" id="playerHand">✊</div>
  <div class="hand" id="aiHand">✊</div>
</div>

<div id="result">Choose your move</div>

<div>
  <button onclick="play('rock')">Rock</button>
  <button onclick="play('paper')">Paper</button>
  <button onclick="play('scissors')">Scissors</button>
</div>

<div>
  <button onclick="resetGame()">Reset</button>
  <button id="back" onclick="goBack()">⬅ Back</button>
</div>

</div>

<script>

let player = 0;
let ai = 0;
let locked = false;

const playerHand = document.getElementById("playerHand");
const aiHand = document.getElementById("aiHand");
const resultText = document.getElementById("result");

const pScore = document.getElementById("playerScore");
const aScore = document.getElementById("aiScore");

/* HANDS */
function getHand(x){
  if(x==="rock") return "✊";
  if(x==="paper") return "✋";
  return "✌️";
}

/* RADIAL PULSE */
function pulse(color){
  const p = document.getElementById("pulse");

  p.style.background = color;
  p.style.animation = "none";
  void p.offsetWidth;
  p.style.animation = "pulseAnim 0.45s ease-out";
}

/* PLAY */
function play(choice){

  if(locked) return;
  locked = true;

  const options = ["rock","paper","scissors"];
  const aiChoice = options[Math.floor(Math.random()*3)];

  playerHand.classList.add("shake");
  aiHand.classList.add("shake");

  resultText.innerText = "Rock...";
  setTimeout(()=> resultText.innerText = "Paper...", 400);
  setTimeout(()=> resultText.innerText = "Scissors...", 800);

  setTimeout(()=>{

    resultText.innerText = "SHOOT!";
    resultText.style.color = "#00ff99";

    playerHand.classList.remove("shake");
    aiHand.classList.remove("shake");

    playerHand.innerText = getHand(choice);
    aiHand.innerText = getHand(aiChoice);

    let result = "";

    if(choice === aiChoice){
      result = "Draw!";
      resultText.style.color = "#ffd24d";
      pulse("#ffd24d");
    }
    else if(
      (choice==="rock" && aiChoice==="scissors") ||
      (choice==="paper" && aiChoice==="rock") ||
      (choice==="scissors" && aiChoice==="paper")
    ){
      result = "You Win!";
      player++;
      resultText.style.color = "#00ff99";
      pulse("#00ff99");
    }
    else{
      result = "AI Wins!";
      ai++;
      resultText.style.color = "#ff4d4d";
      pulse("#ff4d4d");
    }

    resultText.innerText = result;

    pScore.innerText = player;
    aScore.innerText = ai;

    locked = false;

  },1200);
}

/* RESET */
function resetGame(){
  player = 0;
  ai = 0;

  pScore.innerText = "0";
  aScore.innerText = "0";

  playerHand.innerText = "✊";
  aiHand.innerText = "✊";

  resultText.innerText = "Choose your move";
  resultText.style.color = "#00ff99";
}

/* BACK */
function goBack(){
  window.location.href = "index.html";
}

</script>

</body>
</html>
