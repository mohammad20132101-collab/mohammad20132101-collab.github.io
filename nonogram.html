<title>Rift Nonograms</title>

<style>
@import url("https://fonts.googleapis.com/css?family=Lato:400,700");

body {
  margin: 0;
  font-family: 'Lato', sans-serif;
  background: #0f0f1a;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
  min-height: 100vh;
  box-sizing: border-box;
}

h1 {
  text-align: center;
  color: white;
  text-shadow: 0 0 10px rgba(76, 111, 255, 0.6);
  margin: 10px 0 20px 0;
}

.btn-row {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-bottom: 20px;
}

button {
  background: linear-gradient(135deg, #4c6fff, #2f3cff);
  color: white;
  border: 1px solid rgba(76, 111, 255, 0.5);
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  font-size: 14px;
  transition: transform 0.1s, box-shadow 0.2s;
  box-shadow: 0 0 10px rgba(76, 111, 255, 0.25);
}

button:hover {
  transform: scale(1.03);
  box-shadow: 0 0 18px rgba(76, 111, 255, 0.5);
}

.controls {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;
  margin-bottom: 25px;
  background: #141428;
  padding: 15px 30px;
  border-radius: 12px;
  border: 1px solid rgba(76, 111, 255, 0.2);
}

label {
  color: #ffc;
  font-size: 16px;
  font-weight: bold;
}

label input {
  margin-left: 10px;
  vertical-align: middle;
  cursor: pointer;
}

.status-panel {
  display: flex;
  gap: 40px;
  font-size: 18px;
  color: #fff;
  align-items: center;
}

.mode-toggle {
  background: #1c1c3a;
  border: 2px solid #4c6fff;
  border-radius: 8px;
  padding: 3px;
  display: flex;
  gap: 5px;
  margin-left: 10px;
}

.mode-btn {
  background: transparent;
  box-shadow: none;
  border: none;
  padding: 6px 12px;
  border-radius: 5px;
  color: white;
  cursor: pointer;
  font-weight: bold;
}

.mode-btn.active {
  background: #4c6fff;
  box-shadow: 0 0 8px rgba(76, 111, 255, 0.6);
}

.lives {
  color: #ff4d4d;
  font-size: 22px;
  letter-spacing: 2px;
}

/* PLAY AREA FRAME Layout */
.game-container {
  background: #141428;
  padding: 25px;
  border-radius: 15px;
  border: 3px solid #4c6fff;
  box-shadow: 0 0 30px rgba(76, 108, 255, 0.3);
  display: flex;
  justify-content: center;
  align-items: center;
  max-width: 95vw;
}

/* Clean, modern grid structure alignment */
.nonogram-grid-wrapper {
  display: grid;
  grid-template-columns: minmax(50px, auto) auto;
  grid-template-rows: minmax(50px, auto) auto;
}

.corner-gap {
  grid-column: 1;
  grid-row: 1;
}

.col-hints-container {
  grid-column: 2;
  grid-row: 1;
  display: flex;
  flex-direction: row;
}

.col-hint-stack {
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  align-items: center;
  color: #ffc;
  font-weight: bold;
  box-sizing: border-box;
  font-size: 14px;
}

.col-hint-stack span {
  margin-bottom: 4px;
}

.row-hints-container {
  grid-column: 1;
  grid-row: 2;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  padding-right: 15px;
}

.row-hint-line {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  color: #ffc;
  font-weight: bold;
  box-sizing: border-box;
  gap: 8px;
  font-size: 14px;
}

canvas {
  grid-column: 2;
  grid-row: 2;
  background-color: #1a1a3a;
  border-radius: 4px;
  display: block;
}

let gameOver = false;

function initGame() {
  gridSize = parseInt(document.getElementById('gridSize').value);
  document.getElementById('sizeVal').textContent = gridSize;
  document.getElementById('sizeVal2').textContent = gridSize;
  
  if (gridSize > 12) { cellSize = 26; } 
  else if (gridSize > 8) { cellSize = 32; } 
  else { cellSize = 42; }

  lives = 3;
  gameOver = false;
  updateLivesDisplay();
  
  canvas.width = gridSize * cellSize;
  canvas.height = gridSize * cellSize;
  
  generatePictureMatrix();
  calculateHints();
  buildHTMLHints();
  
  playerGrid = Array(gridSize).fill(null).map(() => Array(gridSize).fill(0));
  draw();
}

function calculateHints() {
  rowHints = []; colHints = [];
  
  for (let r = 0; r < gridSize; r++) {
    let hints = [], count = 0;
    for (let col = 0; col < gridSize; col++) {
      if (solutionGrid[r][col] === 1) { count++; } 
      else if (count > 0) { hints.push(count); count = 0; }
    }
    if (count > 0) hints.push(count);
    if (hints.length === 0) hints.push(0);
    rowHints.push(hints);
  }
  
  for (let col = 0; col < gridSize; col++) {
    let hints = [], count = 0;
    for (let r = 0; r < gridSize; r++) {
      if (solutionGrid[r][col] === 1) { count++; } 
      else if (count > 0) { hints.push(count); count = 0; }
    }
    if (count > 0) hints.push(count);
    if (hints.length === 0) hints.push(0);
    colHints.push(hints);
  }
}

function buildHTMLHints() {
  const colBox = document.getElementById('colHintsBox');
  const rowBox = document.getElementById('rowHintsBox');
  colBox.innerHTML = '';
  rowBox.innerHTML = '';
  
  for (let col = 0; col < gridSize; col++) {
    let stack = document.createElement('div');
    stack.className = 'col-hint-stack';
    stack.style.width = cellSize + 'px';
    
    colHints[col].forEach(num => {
      let span = document.createElement('span');
      span.textContent = num;
      stack.appendChild(span);
    });
    colBox.appendChild(stack);
  }
  
  for (let r = 0; r < gridSize; r++) {
    let line = document.createElement('div');
    line.className = 'row-hint-line';
    line.style.height = cellSize + 'px';
    
    rowHints[r].forEach(num => {
      let span = document.createElement('span');
      span.textContent = num;
      line.appendChild(span);
    });
    rowBox.appendChild(line);
  }
}

function draw() {
  c.clearRect(0, 0, canvas.width, canvas.height);
  
  for (let r = 0; r < gridSize; r++) {
    for (let col = 0; col < gridSize; col++) {
      let x = col * cellSize;
      let y = r * cellSize;
      
      c.strokeStyle = "rgba(76, 111, 255, 0.4)";
      c.lineWidth = 1;
      c.strokeRect(x, y, cellSize, cellSize);
      
      if (playerGrid[r][col] === 1) {
        c.fillStyle = "#4c6fff";
        c.fillRect(x + 2, y + 2, cellSize - 4, cellSize - 4);
      } else if (playerGrid[r][col] === 2) {
        c.strokeStyle = "#ff4d4d";
        c.lineWidth = gridSize > 11 ? 1.5 : 2;
        c.beginPath();
        let padding = cellSize * 0.25;
        c.moveTo(x + padding, y + padding);
        c.lineTo(x + cellSize - padding, y + cellSize - padding);
        c.moveTo(x + cellSize - padding, y + padding);
        c.lineTo(x + padding, y + cellSize - padding);
        c.stroke();
      }
    }
  }
}

canvas.addEventListener('mousedown', function(e) {
  if (gameOver) return;
  
  let rect = canvas.getBoundingClientRect();
  let mouseX = e.clientX - rect.left;
  let mouseY = e.clientY - rect.top;
  
  let col = Math.floor(mouseX / cellSize);
  let r = Math.floor(mouseY / cellSize);
  
  if (r >= 0 && r < gridSize && col >= 0 && col < gridSize && playerGrid[r][col] === 0) {
    processMove(r, col);
  }
});

function processMove(r, col) {
  let isCorrectFill = solutionGrid[r][col] === 1;
  
  if (currentMode === 'fill') {
    if (isCorrectFill) { playerGrid[r][col] = 1; } 
    else { playerGrid[r][col] = 2; loseLife(); }
  } else if (currentMode === 'cross') {
    if (!isCorrectFill) { playerGrid[r][col] = 2; } 
    else { playerGrid[r][col] = 1; loseLife(); }
  }
  
  draw();
  if (!gameOver) checkWinCondition();
}

function loseLife() {
  lives--;
  updateLivesDisplay();
  if (lives <= 0) {
    gameOver = true;
    setTimeout(() => {
      alert("❌ Game Over! Out of lives.");
      revealSolution();
    }, 50);
  }
}

function updateLivesDisplay() {
  let hearts = "";
  for (let i = 0; i < lives; i++) hearts += "❤️";
  document.getElementById('livesDisplay').textContent = hearts === "" ? "☠️" : hearts;
}

function checkWinCondition() {
  let won = true;
  for (let r = 0; r < gridSize; r++) {
    for (let col = 0; col < gridSize; col++) {
      if (solutionGrid[r][col] === 1 && playerGrid[r][col] !== 1) won = false;
    }
  }
  if (won) {
    gameOver = true;
    setTimeout(() => { alert("🎉 Puzzle Solved! Awesome job."); }, 50);
  }
}

function revealSolutionButton() {
  if(gameOver) return;
  gameOver = true;
  revealSolution();
}

function revealSolution() {
  for (let r = 0; r < gridSize; r++) {
    for (let col = 0; col < gridSize; col++) {
      playerGrid[r][col] = (solutionGrid[r][col] === 1) ? 1 : 2;
    }
  }
  draw();
}

function setMode(mode) {
  currentMode = mode;
  document.getElementById('btnFill').classList.remove('active');
  document.getElementById('btnCross').classList.remove('active');
  if (mode === 'fill') document.getElementById('btnFill').classList.add('active');
  if (mode === 'cross') document.getElementById('btnCross').classList.add('active');
}

document.getElementById('gridSize').addEventListener('change', initGame);

function resetGame() {
  initGame();
}

initGame();
