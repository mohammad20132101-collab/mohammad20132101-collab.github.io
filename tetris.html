<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tetris Fixed</title>

<style>
body{
    margin:0;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
    color:white;
}

.wrapper{
    display:flex;
    gap:20px;
}

canvas{
    background:#020617;
    border:3px solid #334155;
}

.panel{
    width:180px;
    background:#1e293b;
    padding:15px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="wrapper">
    <canvas id="game" width="300" height="600"></canvas>

    <div class="panel">
        <h2>Score</h2>
        <div id="score">0</div>
    </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const ROWS = 20;
const COLS = 10;
const SIZE = 30;

const COLORS = [
 null,
 "#00f0f0",
 "#0000f0",
 "#f0a000",
 "#f0f000",
 "#00f000",
 "#a000f0",
 "#f00000"
];

const SHAPES = [
 [],
 [[1,1,1,1]],
 [[2,0,0],[2,2,2]],
 [[0,0,3],[3,3,3]],
 [[4,4],[4,4]],
 [[0,5,5],[5,5,0]],
 [[0,6,0],[6,6,6]],
 [[7,7,0],[0,7,7]]
];

let board = Array.from({length:ROWS},()=>Array(COLS).fill(0));

let score = 0;

function draw(){
    ctx.fillStyle="#020617";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    for(let y=0;y<ROWS;y++){
        for(let x=0;x<COLS;x++){
            if(board[y][x]){
                ctx.fillStyle = COLORS[board[y][x]];
                ctx.fillRect(x*SIZE,y*SIZE,SIZE,SIZE);

                ctx.strokeStyle="#000";
                ctx.strokeRect(x*SIZE,y*SIZE,SIZE,SIZE);
            }
        }
    }

    drawPiece(player);
}

function drawPiece(p){
    p.shape.forEach((row,y)=>{
        row.forEach((val,x)=>{
            if(val){
                ctx.fillStyle = COLORS[val];
                ctx.fillRect(
                    (p.x + x)*SIZE,
                    (p.y + y)*SIZE,
                    SIZE,
                    SIZE
                );

                ctx.strokeStyle="#000";
                ctx.strokeRect(
                    (p.x + x)*SIZE,
                    (p.y + y)*SIZE,
                    SIZE,
                    SIZE
                );
            }
        });
    });
}

function collide(p){
    for(let y=0;y<p.shape.length;y++){
        for(let x=0;x<p.shape[y].length;x++){
            if(p.shape[y][x]){
                let newX = x + p.x;
                let newY = y + p.y;

                if(
                    newX < 0 ||
                    newX >= COLS ||
                    newY >= ROWS ||
                    (board[newY] && board[newY][newX])
                ){
                    return true;
                }
            }
        }
    }
    return false;
}

function merge(){
    player.shape.forEach((row,y)=>{
        row.forEach((val,x)=>{
            if(val){
                board[y+player.y][x+player.x] = val;
            }
        });
    });
}

function rotate(){
    const old = player.shape;
    player.shape = player.shape[0].map((_,i)=>
        player.shape.map(row=>row[i]).reverse()
    );

    if(collide(player)){
        player.shape = old;
    }
}

function move(dir){
    player.x += dir;
    if(collide(player)) player.x -= dir;
}

function drop(){
    player.y++;

    if(collide(player)){
        player.y--;
        merge();
        reset();
        clearLines();
    }
    dropCounter = 0;
}

function clearLines(){
    let lines = 0;

    for(let y=ROWS-1;y>=0;y--){
        if(board[y].every(v=>v!==0)){
            board.splice(y,1);
            board.unshift(Array(COLS).fill(0));
            lines++;
            y++;
        }
    }

    if(lines){
        score += lines * 100;
        document.getElementById("score").innerText = score;
    }
}

function randomPiece(){
    return SHAPES[Math.floor(Math.random()*7)+1];
}

function reset(){
    player.shape = randomPiece();
    player.x = 3;
    player.y = 0;

    if(collide(player)){
        board = Array.from({length:ROWS},()=>Array(COLS).fill(0));
        score = 0;
        document.getElementById("score").innerText = score;
    }
}

const player = {
    x:3,
    y:0,
    shape:randomPiece()
};

document.addEventListener("keydown",e=>{
    if(e.key==="ArrowLeft") move(-1);
    if(e.key==="ArrowRight") move(1);
    if(e.key==="ArrowDown") drop();
    if(e.key==="ArrowUp") rotate();
});

let dropCounter = 0;
let dropInterval = 600;
let lastTime = 0;

function update(time=0){
    let delta = time - lastTime;
    lastTime = time;

    dropCounter += delta;

    if(dropCounter > dropInterval){
        drop();
    }

    draw();
    requestAnimationFrame(update);
}

reset();
update();
</script>

</body>
</html>
