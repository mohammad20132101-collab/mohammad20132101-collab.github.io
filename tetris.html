<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Working Tetris</title>

<style>
body {
  margin: 0;
  background: #0b1020;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
  color: white;
}

.container {
  display: flex;
  gap: 20px;
}

canvas {
  background: #050814;
  border: 3px solid #2b3553;
}

.panel {
  width: 160px;
  background: #1b2238;
  padding: 15px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
  <canvas id="game" width="300" height="600"></canvas>

  <div class="panel">
    <h2>Score</h2>
    <div id="score">0</div>
  </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const COLS = 10;
const ROWS = 20;
const SIZE = 30;

const COLORS = [
 null,
 "#00f0f0",
 "#0000f0",
 "#f0a000",
 "#f0f000",
 "#00f000",
 "#a000f0",
 "#f00000"
];

// CLEAN SHAPES (NO ZERO BUGS)
const SHAPES = {
 I: [[1,1,1,1]],
 J: [[2,0,0],[2,2,2]],
 L: [[0,0,3],[3,3,3]],
 O: [[4,4],[4,4]],
 S: [[0,5,5],[5,5,0]],
 T: [[0,6,0],[6,6,6]],
 Z: [[7,7,0],[0,7,7]]
};

const PIECES = Object.values(SHAPES);

let board = Array.from({length:ROWS},()=>Array(COLS).fill(0));
let score = 0;

function drawBlock(x,y,val){
  ctx.fillStyle = COLORS[val];
  ctx.fillRect(x*SIZE,y*SIZE,SIZE,SIZE);
  ctx.strokeStyle = "#000";
  ctx.strokeRect(x*SIZE,y*SIZE,SIZE,SIZE);
}

function drawBoard(){
  ctx.fillStyle = "#050814";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  for(let y=0;y<ROWS;y++){
    for(let x=0;x<COLS;x++){
      if(board[y][x]){
        drawBlock(x,y,board[y][x]);
      }
    }
  }

  drawPiece();
}

function drawPiece(){
  player.shape.forEach((row,y)=>{
    row.forEach((val,x)=>{
      if(val){
        drawBlock(player.x + x, player.y + y, val);
      }
    });
  });
}

function collide(){
  for(let y=0;y<player.shape.length;y++){
    for(let x=0;x<player.shape[y].length;x++){
      if(player.shape[y][x]){
        let nx = player.x + x;
        let ny = player.y + y;

        if(
          nx < 0 ||
          nx >= COLS ||
          ny >= ROWS ||
          (board[ny] && board[ny][nx])
        ){
          return true;
        }
      }
    }
  }
  return false;
}

function merge(){
  player.shape.forEach((row,y)=>{
    row.forEach((val,x)=>{
      if(val){
        board[player.y + y][player.x + x] = val;
      }
    });
  });
}

function rotate(){
  const old = player.shape;
  player.shape = player.shape[0].map((_,i)=>
    player.shape.map(r=>r[i]).reverse()
  );

  if(collide()) player.shape = old;
}

function move(dir){
  player.x += dir;
  if(collide()) player.x -= dir;
}

function drop(){
  player.y++;

  if(collide()){
    player.y--;
    merge();
    clearLines();
    reset();
  }
}

function clearLines(){
  for(let y=ROWS-1;y>=0;y--){
    if(board[y].every(v=>v!==0)){
      board.splice(y,1);
      board.unshift(Array(COLS).fill(0));
      score += 100;
      document.getElementById("score").innerText = score;
      y++;
    }
  }
}

function randomPiece(){
  return PIECES[Math.floor(Math.random()*PIECES.length)];
}

function reset(){
  player.shape = randomPiece();
  player.x = 3;
  player.y = 0;

  if(collide()){
    board = Array.from({length:ROWS},()=>Array(COLS).fill(0));
    score = 0;
  }
}

const player = {
  x:3,
  y:0,
  shape:randomPiece()
};

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft") move(-1);
  if(e.key==="ArrowRight") move(1);
  if(e.key==="ArrowDown") drop();
  if(e.key==="ArrowUp") rotate();
});

let dropCounter = 0;
let dropInterval = 600;
let lastTime = 0;

function update(time=0){
  let delta = time - lastTime;
  lastTime = time;

  dropCounter += delta;

  if(dropCounter > dropInterval){
    drop();
    dropCounter = 0;
  }

  drawBoard();
  requestAnimationFrame(update);
}

reset();
update();
</script>

</body>
</html>
