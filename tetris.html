<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tetris Fixed Controls</title>

<style>
body{
  margin:0;
  background:#0b1020;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
  color:white;
}

.container{
  display:flex;
  gap:20px;
}

canvas{
  background:#050814;
  border:3px solid #2b3553;
}

.panel{
  width:200px;
  background:#1b2238;
  padding:15px;
  border-radius:10px;
}

h2{
  margin:10px 0;
}

.info{
  font-size:14px;
  line-height:1.8;
  opacity:0.9;
}

#score{
  font-size:22px;
}
</style>
</head>

<body>

<div class="container">

<canvas id="game" width="300" height="600"></canvas>

<div class="panel">
  <h2>Score</h2>
  <div id="score">0</div>

  <h2>Controls</h2>
  <div class="info">
    <p>⬅️ ➡️ Move left / right<br>
    ⬇️ Soft drop<br>
    ⬆️ Rotate<br>
    SPACE = Hard drop (instant)<br><br></p>

    💡 Tip: Clear lines to score points!
  </div>
</div>

</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const COLS = 10;
const ROWS = 20;
const SIZE = 30;

const COLORS = [
 null,
 "#00f0f0",
 "#0000f0",
 "#f0a000",
 "#f0f000",
 "#00f000",
 "#a000f0",
 "#f00000"
];

const PIECES = [
 [[1,1,1,1]],
 [[2,0,0],[2,2,2]],
 [[0,0,3],[3,3,3]],
 [[4,4],[4,4]],
 [[0,5,5],[5,5,0]],
 [[0,6,0],[6,6,6]],
 [[7,7,0],[0,7,7]]
];

let board = Array.from({length:ROWS},()=>Array(COLS).fill(0));
let score = 0;

function drawCell(x,y,v){
  ctx.fillStyle = COLORS[v];
  ctx.fillRect(x*SIZE,y*SIZE,SIZE,SIZE);
  ctx.strokeStyle="#000";
  ctx.strokeRect(x*SIZE,y*SIZE,SIZE,SIZE);
}

function draw(){
  ctx.fillStyle="#050814";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // GRID (new part)
  ctx.strokeStyle = "rgba(255,255,255,0.06)";
  ctx.lineWidth = 1;

  for(let x = 0; x <= COLS; x++){
    ctx.beginPath();
    ctx.moveTo(x * SIZE, 0);
    ctx.lineTo(x * SIZE, canvas.height);
    ctx.stroke();
  }

  for(let y = 0; y <= ROWS; y++){
    ctx.beginPath();
    ctx.moveTo(0, y * SIZE);
    ctx.lineTo(canvas.width, y * SIZE);
    ctx.stroke();
  }

  // EXISTING BLOCKS (unchanged)
  for(let y=0;y<ROWS;y++){
    for(let x=0;x<COLS;x++){
      if(board[y][x]) drawCell(x,y,board[y][x]);
    }
  }

  drawPiece();
}

function drawPiece(){
  player.shape.forEach((r,y)=>{
    r.forEach((v,x)=>{
      if(v){
        drawCell(player.x+x, player.y+y, v);
      }
    });
  });
}

function collide(){
  for(let y=0;y<player.shape.length;y++){
    for(let x=0;x<player.shape[y].length;x++){
      if(player.shape[y][x]){
        let nx = player.x + x;
        let ny = player.y + y;

        if(
          nx < 0 ||
          nx >= COLS ||
          ny >= ROWS ||
          (board[ny] && board[ny][nx])
        ){
          return true;
        }
      }
    }
  }
  return false;
}

function merge(){
  player.shape.forEach((r,y)=>{
    r.forEach((v,x)=>{
      if(v){
        board[player.y+y][player.x+x] = v;
      }
    });
  });
}

function rotate(){
  const old = player.shape;
  player.shape = player.shape[0].map((_,i)=>
    player.shape.map(r=>r[i]).reverse()
  );

  if(collide()) player.shape = old;
}

function move(dir){
  player.x += dir;
  if(collide()) player.x -= dir;
}

function drop(){
  player.y++;

  if(collide()){
    player.y--;
    merge();
    clearLines();
    reset();
  }
}

function hardDrop(){
  while(!collide()){
    player.y++;
  }
  player.y--;
  merge();
  clearLines();
  reset();
}

function clearLines(){
  for(let y=ROWS-1;y>=0;y--){
    if(board[y].every(v=>v!==0)){
      board.splice(y,1);
      board.unshift(Array(COLS).fill(0));
      score += 100;
      document.getElementById("score").innerText = score;
      y++;
    }
  }
}

function randomPiece(){
  return PIECES[Math.floor(Math.random()*PIECES.length)];
}

function reset(){
  player.shape = randomPiece();
  player.x = 3;
  player.y = 0;

  if(collide()){
    board = Array.from({length:ROWS},()=>Array(COLS).fill(0));
    score = 0;
    document.getElementById("score").innerText = score;
  }
}

const player = {
  x:3,
  y:0,
  shape:randomPiece()
};

document.addEventListener("keydown",e=>{
  if(e.key === "ArrowLeft") move(-1);
  if(e.key === "ArrowRight") move(1);
  if(e.key === "ArrowDown") drop();
  if(e.key === "ArrowUp") rotate();

  // FIXED SPACE (works everywhere)
  if(e.key === " " || e.code === "Space") hardDrop();
});

let dropCounter = 0;
let dropInterval = 600;
let lastTime = 0;

function update(time=0){
  let delta = time-lastTime;
  lastTime = time;

  dropCounter += delta;

  if(dropCounter > dropInterval){
    drop();
    dropCounter = 0;
  }

  draw();
  requestAnimationFrame(update);
}

reset();
update();

document.addEventListener("keydown", function(e) {
  if (
    ["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " "].includes(e.key)
  ) {
    e.preventDefault();
  }
});
</script>

</body>
</html>
