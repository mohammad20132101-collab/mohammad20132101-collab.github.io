<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Hangman</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f1a;
  color: white;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

header {
  padding: 20px;
  text-align: center;
  background: #1a1a2e;
}

.header-buttons {
  margin-top: 10px;
  display: flex;
  justify-content: center;
  gap: 10px;
}

.container {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.card {
  background: #1a1a2e;
  border-radius: 12px;
  padding: 30px;
  text-align: center;
  box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  max-width: 500px;
  width: 100%;
  box-sizing: border-box;
  position: relative;
}

button {
  padding: 10px 20px;
  border: none;
  background: #4c6fff;
  color: white;
  border-radius: 6px;
  cursor: pointer;
  margin: 5px;
  font-size: 16px;
  font-weight: bold;
  transition: opacity 0.2s;
}

button:hover {
  opacity: 0.9;
}

button:disabled {
  background: #2d3748;
  cursor: not-allowed;
  opacity: 0.6;
}

input {
  padding: 12px;
  width: 80%;
  max-width: 250px;
  margin: 15px 0;
  border-radius: 8px;
  border: 1px solid #4c6fff;
  background: #0f0f1a;
  color: white;
  font-size: 16px;
  text-align: center;
  text-transform: uppercase;
}

.hidden-word {
  font-size: 32px;
  letter-spacing: 8px;
  margin: 20px 0;
  font-family: 'Courier New', Courier, monospace;
  font-weight: bold;
  color: #4c6fff;
}

.wrong-letters {
  margin-top: 20px;
  font-size: 18px;
  color: #e53e3e;
  min-height: 24px;
}

canvas {
  background: #141424;
  border-radius: 8px;
  margin: 15px 0;
  border: 1px solid #2d3748;
}

.status-msg {
  font-size: 18px;
  margin: 15px 0;
  font-weight: bold;
}

.error-banner {
  background: #e53e3e;
  color: white;
  padding: 10px;
  border-radius: 6px;
  margin-bottom: 15px;
  font-weight: bold;
  display: none;
}

.back-btn {
  background: #4a5568;
}

.restart-btn {
  background: #e53e3e;
}
</style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7292845069394911"
     crossorigin="anonymous"></script>
</head>
<body>

<header>
  <h1>🌌 Rift Hangman 🌌</h1>
  <div class="header-buttons">
    <button class="back-btn" onclick="window.location.href='index.html'">Back to Hub</button>
    <button class="restart-btn" id="headerRestartBtn" onclick="resetGame()">Restart Game</button>
  </div>
</header>

<div class="container">
  <div id="startScreen" class="card">
    <h2>Choose Game Mode</h2>
    <div id="startError" class="error-banner" style="background: #4c6fff;">Fetching AI Word...</div>
    <p>Who should select the hidden word?</p>
    <button id="playerModeBtn" onclick="setupPlayerMode()">I will write the word</button>
    <button id="aiModeBtn" onclick="setupAIMode()">Let the AI choose</button>
  </div>

  <div id="inputScreen" class="card" style="display: none;">
    <h2>Enter Secret Word</h2>
    <div id="inputError" class="error-banner">Checking word...</div>
    <p>Type a word for the AI to guess (Letters only):</p>
    <input type="text" id="secretWordInput" maxlength="15" placeholder="SECRET WORD">
    <br>
    <button id="submitWordBtn" onclick="submitPlayerWord()">Start Game</button>
    <br>
    <button onclick="resetGame()" style="background: #4a5568;">Cancel</button>
  </div>

  <div id="gameScreen" class="card" style="display: none;">
    <h3 id="turnIndicator">Game Active</h3>
    
    <canvas id="hangmanCanvas" width="200" height="200"></canvas>
    
    <div class="hidden-word" id="wordDisplay">-----</div>
    
    <div id="playerGuessArea" style="display: none;">
      <input type="text" id="playerLetterInput" maxlength="1" placeholder="Letter">
      <br>
      <button onclick="playerGuess()">Guess</button>
    </div>

    <div id="aiControlArea" style="display: none;">
      <button id="aiGuessBtn" onclick="aiGuessStep()">Let AI Guess</button>
    </div>

    <div class="wrong-letters">Wrong: <span id="wrongDisplay"></span></div>
    <div class="status-msg" id="statusMessage"></div>
  </div>
</div>

<script>
const fallbackWords = ["MATRIX", "PORTAL", "CYBER", "GALAXY", "QUANTUM", "NEBULA", "SYSTEM", "FONTS", "PASTA"];

let gameState = {
  mode: "", 
  secretWord: "",
  guessedLetters: new Set(),
  wrongCount: 0,
  maxWrong: 6,
  aiLetterQueue: []
};

const canvas = document.getElementById("hangmanCanvas");
const ctx = canvas.getContext("2d");

document.getElementById("secretWordInput").addEventListener("keypress", function(e) {
  if (e.key === "Enter") submitPlayerWord();
});
document.getElementById("playerLetterInput").addEventListener("keypress", function(e) {
  if (e.key === "Enter") playerGuess();
});

function setupPlayerMode() {
  gameState.mode = "player";
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("inputScreen").style.display = "block";
  document.getElementById("inputError").style.display = "none";
  document.getElementById("secretWordInput").value = "";
  document.getElementById("secretWordInput").focus();
}

async function submitPlayerWord() {
  let word = document.getElementById("secretWordInput").value.trim().toUpperCase();
  const submitBtn = document.getElementById("submitWordBtn");
  
  if (!word || !/^[A-Z]+$/.test(word)) {
    showInputError("Please enter a valid single word using letters only!");
    return;
  }

  submitBtn.disabled = true;
  document.getElementById("inputError").style.background = "#4c6fff";
  showInputError("Validating word across global networks...");

  try {
    const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word.toLowerCase()}`);
    if (!response.ok) {
      document.getElementById("inputError").style.background = "#e53e3e";
      showInputError("Not a recognized real English word! Try another.");
      submitBtn.disabled = false;
      return;
    }

    document.getElementById("inputError").style.display = "none";
    submitBtn.disabled = false;
    gameState.secretWord = word;
    document.getElementById("inputScreen").style.display = "none";
    generateDynamicAIQueue();
    startGame();

  } catch (error) {
    document.getElementById("inputError").style.display = "none";
    submitBtn.disabled = false;
    gameState.secretWord = word;
    document.getElementById("inputScreen").style.display = "none";
    generateDynamicAIQueue();
    startGame();
  }
}

function showInputError(msg) {
  const errBanner = document.getElementById("inputError");
  errBanner.textContent = msg;
  errBanner.style.display = "block";
}

async function setupAIMode() {
  const startError = document.getElementById("startError");
  const aiModeBtn = document.getElementById("aiModeBtn");
  const playerModeBtn = document.getElementById("playerModeBtn");

  startError.style.background = "#4c6fff";
  startError.textContent = "Summoning random word from web api...";
  startError.style.display = "block";
  aiModeBtn.disabled = true;
  playerModeBtn.disabled = true;

  try {
    const response = await fetch("https://random-word-api.herokuapp.com/word?number=1");
    if (!response.ok) throw new Error("API status down");
    
    const data = await response.json();
    let cleanWord = data[0].toUpperCase();

    startError.style.display = "none";
    aiModeBtn.disabled = false;
    playerModeBtn.disabled = false;

    gameState.mode = "ai";
    gameState.secretWord = cleanWord;
    document.getElementById("startScreen").style.display = "none";
    startGame();

  } catch (err) {
    console.warn("Random API down. Fetching random local database variant.");
    startError.style.display = "none";
    aiModeBtn.disabled = false;
    playerModeBtn.disabled = false;

    gameState.mode = "ai";
    const randomIndex = Math.floor(Math.random() * fallbackWords.length);
    gameState.secretWord = fallbackWords[randomIndex];
    document.getElementById("startScreen").style.display = "none";
    startGame();
  }
}

/* AI Engine - Limited Neighboring Swap (Max 2 positions away) */
function generateDynamicAIQueue() {
  const standardFreq = "EARIOTNSLCUDPMHGBFYWKVXZJQ";
  let letterArray = standardFreq.split("");

  // Only swap with index within a range of 1 or 2 steps to avoid pushing trash letters to the top
  for (let i = 0; i < letterArray.length; i++) {
    if (Math.random() < 0.40) { // 40% chance to shift layout locally
      // Pick an offset of either -2, -1, 1, or 2 positions away
      let offset = (Math.random() < 0.5 ? 1 : 2) * (Math.random() < 0.5 ? 1 : -1);
      let targetIndex = i + offset;

      // Bound safety checker
      if (targetIndex >= 0 && targetIndex < letterArray.length) {
        let temp = letterArray[i];
        letterArray[i] = letterArray[targetIndex];
        letterArray[targetIndex] = temp;
      }
    }
  }

  gameState.aiLetterQueue = letterArray;
}

function startGame() {
  gameState.guessedLetters.clear();
  gameState.wrongCount = 0;
  
  document.getElementById("gameScreen").style.display = "block";
  document.getElementById("statusMessage").textContent = "";
  document.getElementById("wrongDisplay").textContent = "";
  
  if (gameState.mode === "ai") {
    document.getElementById("turnIndicator").textContent = "Your Turn to Guess!";
    document.getElementById("aiControlArea").style.display = "none";
    document.getElementById("playerGuessArea").style.display = "block";
    document.getElementById("playerLetterInput").value = "";
    document.getElementById("playerLetterInput").focus();
  } else {
    document.getElementById("turnIndicator").textContent = "AI is Guessing Your Word...";
    document.getElementById("playerGuessArea").style.display = "none";
    document.getElementById("aiControlArea").style.display = "block";
    document.getElementById("aiGuessBtn").disabled = false;
  }

  updateWordDisplay();
  clearCanvas();
}

function updateWordDisplay() {
  let displayStr = "";
  for (let char of gameState.secretWord) {
    if (gameState.guessedLetters.has(char)) {
      displayStr += char;
    } else {
      displayStr += "_";
    }
  }
  document.getElementById("wordDisplay").textContent = displayStr;
  checkGameEnd();
}

function processGuess(letter) {
  letter = letter.toUpperCase();
  if (gameState.guessedLetters.has(letter)) return;

  gameState.guessedLetters.add(letter);

  if (!gameState.secretWord.includes(letter)) {
    gameState.wrongCount++;
    let currentWrong = document.getElementById("wrongDisplay").textContent;
    document.getElementById("wrongDisplay").textContent = currentWrong + (currentWrong ? ", " : "") + letter;
    drawHangman(gameState.wrongCount);
  }

  updateWordDisplay();
}

function playerGuess() {
  const input = document.getElementById("playerLetterInput");
  const letter = input.value.trim().toUpperCase();
  input.value = "";
  input.focus();

  if (!letter || !/^[A-Z]$/.test(letter)) return;
  processGuess(letter);
}

function aiGuessStep() {
  if (gameState.wrongCount >= gameState.maxWrong || isWordComplete()) return;

  let nextGuess = "";
  for (let letter of gameState.aiLetterQueue) {
    if (!gameState.guessedLetters.has(letter)) {
      nextGuess = letter;
      break;
    }
  }

  if (nextGuess) {
    processGuess(nextGuess);
  }
}

function isWordComplete() {
  for (let char of gameState.secretWord) {
    if (!gameState.guessedLetters.has(char)) return false;
  }
  return true;
}

function checkGameEnd() {
  const win = isWordComplete();
  const lose = gameState.wrongCount >= gameState.maxWrong;

  if (win || lose) {
    document.getElementById("playerGuessArea").style.display = "none";
    document.getElementById("aiControlArea").style.display = "none";
    
    if (win) {
      document.getElementById("statusMessage").innerHTML = gameState.mode === "ai" 
        ? "🎉 <span style='color: #4c6fff'>You Win!</span> You cracked the code." 
        : "🤖 <span style='color: #4c6fff'>AI Wins!</span> It figured out your word.";
    } else {
      document.getElementById("statusMessage").innerHTML = gameState.mode === "ai"
        ? `❌ <span style='color: #e53e3e'>Game Over!</span> Word was: ${gameState.secretWord}`
        : `🎉 <span style='color: #4c6fff'>You Win!</span> You stumped the AI! Word was: ${gameState.secretWord}`;
    }
  }
}

function resetGame() {
  document.getElementById("gameScreen").style.display = "none";
  document.getElementById("inputScreen").style.display = "none";
  document.getElementById("startScreen").style.display = "block";
  document.getElementById("startError").style.display = "none";
}

function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = "#4c6fff";
  ctx.lineWidth = 3;
  
  ctx.beginPath();
  ctx.moveTo(20, 180);
  ctx.lineTo(180, 180);
  ctx.stroke();
}

function drawHangman(step) {
  ctx.strokeStyle = "white";
  ctx.lineWidth = 3;

  switch(step) {
    case 1:
      ctx.beginPath();
      ctx.moveTo(40, 180); 
      ctx.lineTo(40, 20);
      ctx.lineTo(120, 20);
      ctx.stroke();
      break;
    case 2:
      ctx.beginPath();
      ctx.moveTo(120, 20); 
      ctx.lineTo(120, 40);
      ctx.stroke();
      break;
    case 3:
      ctx.beginPath();
      ctx.arc(120, 55, 15, 0, Math.PI * 2);
      ctx.stroke();
      break;
    case 4:
      ctx.beginPath();
      ctx.moveTo(120, 70); 
      ctx.lineTo(120, 120);
      ctx.stroke();
      break;
    case 5:
      ctx.beginPath();
      ctx.moveTo(120, 85); ctx.lineTo(95, 100);
      ctx.moveTo(120, 85); ctx.lineTo(145, 100);
      ctx.stroke();
      break;
    case 6:
      ctx.beginPath();
      ctx.moveTo(120, 120); ctx.lineTo(100, 150);
      ctx.moveTo(120, 120); ctx.lineTo(140, 150);
      ctx.stroke();
      break;
  }
}
</script>

</body>
</html>
