<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Defence - Rift Hub</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f1a;
  color: white;
  text-align: center;
}

header {
  background: #1a1a2e;
  padding: 15px;
}

canvas {
  background: #111122;
  display: block;
  margin: 20px auto;
  border: 2px solid #6C5CE7;
}

button {
  background: #6C5CE7;
  border: none;
  padding: 10px 15px;
  color: white;
  cursor: pointer;
  border-radius: 6px;
  margin: 5px;
}

button:hover {
  background: #00D2FF;
}

#ui {
  margin-top: 10px;
}
</style>
</head>

<body>

<header>
  <h1>🌀 Rift Defence</h1>
  <p>Protect the Rift Core from incoming enemies</p>
</header>

<div id="ui">
  <button onclick="startGame()">Start Game</button>
  <button onclick="resetGame()">Reset</button>
  <p>Core Health: <span id="health">100</span></p>
  <p>Score: <span id="score">0</span></p>
</div>

<canvas id="game" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let enemies = [];
let bullets = [];
let running = false;

let core = {
  x: 750,
  y: 200,
  health: 100
};

let score = 0;

function drawCore() {
  ctx.fillStyle = "#6C5CE7";
  ctx.fillRect(core.x, core.y - 30, 20, 60);
}

function spawnEnemy() {
  enemies.push({
    x: 0,
    y: Math.random() * 350 + 25,
    speed: 1 + Math.random() * 1.5
  });
}

function drawEnemies() {
  ctx.fillStyle = "#FF2E88";

  enemies.forEach((e, i) => {
    e.x += e.speed;

    ctx.beginPath();
    ctx.arc(e.x, e.y, 10, 0, Math.PI * 2);
    ctx.fill();

    // hit core
    if (e.x > core.x) {
      core.health -= 5;
      enemies.splice(i, 1);
      updateUI();
    }
  });
}

function shoot() {
  bullets.push({
    x: core.x,
    y: core.y
  });
}

function drawBullets() {
  ctx.fillStyle = "#00D2FF";

  bullets.forEach((b, i) => {
    b.x -= 5;

    ctx.beginPath();
    ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
    ctx.fill();

    enemies.forEach((e, j) => {
      if (Math.abs(b.x - e.x) < 10 && Math.abs(b.y - e.y) < 10) {
        enemies.splice(j, 1);
        bullets.splice(i, 1);
        score += 10;
        updateUI();
      }
    });
  });
}

function updateUI() {
  document.getElementById("health").textContent = core.health;
  document.getElementById("score").textContent = score;

  if (core.health <= 0) {
    alert("Rift Destroyed! Game Over!");
    resetGame();
  }
}

function loop() {
  if (!running) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawCore();
  drawEnemies();
  drawBullets();

  requestAnimationFrame(loop);
}

setInterval(() => {
  if (running) spawnEnemy();
}, 1200);

setInterval(() => {
  if (running) shoot();
}, 700);

function startGame() {
  if (!running) {
    running = true;
    loop();
  }
}

function resetGame() {
  enemies = [];
  bullets = [];
  core.health = 100;
  score = 0;
  running = false;
  updateUI();

  ctx.clearRect(0, 0, canvas.width, canvas.height);
}
</script>

</body>
</html>
