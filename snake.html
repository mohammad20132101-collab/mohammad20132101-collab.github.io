<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Snake</title>

<style>
/* ============================================================
   DESIGN SYSTEM AS index.html (Rift Hub) — ONLY DARK MODE
   ============================================================ */

:root {
  --bg-main: #06070d;
  --bg-card: rgba(255, 255, 255, 0.06);
  --text-main: #ffffff;
  --text-muted: #94a3b8;
  --accent: #3b82f6;
  --accent-glow: rgba(59, 130, 246, 0.25);
  --card-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
  --card-border: rgba(255, 255, 255, 0.08);
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg-main);
  color: var(--text-main);
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  user-select: none;
  -webkit-user-select: none;
}

header {
  width: 100%;
  text-align: center;
  padding: 30px 15px 10px;
}

header h1 {
  font-weight: 700;
  font-size: 28px;
  margin: 0;
  letter-spacing: -0.02em;
}

/* GLASS CARD ARCHITECTURE */
.glass-card-inner {
  position: relative;
  border-radius: 24px;
  overflow: hidden;
  clip-path: inset(0 round 24px);
  transform: translateZ(0);
  -webkit-transform: translateZ(0);
  isolation: isolate;
}

.glass-layer {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 1;
  background: var(--bg-card);
  backdrop-filter: blur(30px) saturate(220%);
  -webkit-backdrop-filter: blur(30px) saturate(220%);
  pointer-events: none;
}

.glass-content {
  position: relative;
  z-index: 2;
}

/* Rim ring — brightest at top, tapers but never fully disappears */
.glass-card-inner::before {
  content: "";
  position: absolute;
  inset: 0;
  z-index: 1;
  border-radius: 24px;
  padding: 1.5px;
  background: linear-gradient(180deg, rgba(var(--mode-rgb, 59, 130, 246), 0.75) 0%, rgba(var(--mode-rgb, 59, 130, 246), 0.25) 45%, rgba(var(--mode-rgb, 59, 130, 246), 0.12) 100%);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
}

.glass-card-inner::after {
  content: "";
  position: absolute;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  background:
    linear-gradient(160deg, rgba(255, 255, 255, 0.14) 0%, rgba(255, 255, 255, 0) 40%),
    radial-gradient(90% 70% at 100% 100%, rgba(var(--mode-rgb, 59, 130, 246), 0.16) 0%, rgba(var(--mode-rgb, 59, 130, 246), 0) 60%);
  mix-blend-mode: overlay;
}

/* MENU OVERLAY */
#menu {
    position: fixed;
    inset: 0;
    background: rgba(6, 7, 13, 0.7);
    backdrop-filter: blur(4px);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.menuBox {
    box-shadow: var(--card-shadow);
    text-align: center;
}

.menuBox .glass-content {
  padding: 40px 45px;
}

.menuBox h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin: 0 0 6px 0;
    color: rgb(var(--mode-rgb, 59, 130, 246));
    transition: color 0.3s;
}

.menuBox p {
    color: var(--text-muted);
    margin: 0 0 25px 0;
}

/* GAME PANEL */
.game-panel {
  margin-top: 15px;
  box-shadow: var(--card-shadow);
}

.game-panel .glass-content {
  padding: 24px 28px 28px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.score-container {
  display: flex;
  gap: 24px;
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 14px;
  color: var(--text-muted);
}

.score-container span:first-child {
  color: var(--text-main);
}

.mode-tag {
  color: rgb(var(--mode-rgb, 59, 130, 246));
  font-weight: 700;
  transition: color 0.3s;
}

canvas {
  background: #050814;
  border-radius: 16px;
  box-shadow: 0 0 0 1px rgba(var(--mode-rgb, 59, 130, 246), 0.4), 0 0 24px rgba(var(--mode-rgb, 59, 130, 246), 0.25);
  transition: box-shadow 0.3s;
  display: block;
  max-width: 100%;
  height: auto;
}

/* BUTTONS */
button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 600;
    font-family: inherit;
    font-size: 14px;
    transition: all 0.2s ease;
    margin: 5px;
}

button:hover {
    transform: translateY(-1px);
    opacity: 0.95;
}

.mode-btn-classic { background: #3b82f6; }
.mode-btn-portal { background: #9b5cff; }

.btn-row {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 4px;
    margin: 18px 0 4px;
}
</style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7292845069394911"
     crossorigin="anonymous"></script>
</head>

<body>

<div id="menu">
  <div class="menuBox">
    <div class="glass-card-inner">
      <div class="glass-layer"></div>
      <div class="glass-content">
        <h1 id="menuTitle">🐍 Rift Snake</h1>
        <p>Select a game mode</p>
        <button class="mode-btn-classic" onclick="selectMode('classic')">Classic Mode</button>
        <button class="mode-btn-portal" onclick="selectMode('portal')">Portal Mode 🌀</button>
      </div>
    </div>
  </div>
</div>

<header>
  <h1>🐍 Rift Snake</h1>
</header>

<div class="game-panel">
  <div class="glass-card-inner">
    <div class="glass-layer"></div>
    <div class="glass-content">

      <div class="score-container">
        <div>Score: <span id="score">0</span></div>
        <div>Mode: <span id="modeDisplay" class="mode-tag">Classic</span></div>
      </div>

      <canvas id="game" width="400" height="400"></canvas>

      <div class="btn-row">
        <button onclick="window.location.href='index.html'" id="backBtn">🏠 Back</button>
        <button onclick="showMenu()" id="menuBtn">Menu</button>
        <button onclick="startGame()" id="restartBtn">Restart</button>
      </div>

    </div>
  </div>
</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const COLS = 20;
const ROWS = 20;
const SIZE = 20;

let snake, food, dx, dy, score, game, speed;
let currentMode = 'classic'; 

function showMenu() {
    clearInterval(game);
    document.getElementById("menu").style.display = "flex";
}

function selectMode(mode) {
    currentMode = mode;
    document.getElementById("menu").style.display = "none";
    
    const displayTag = document.getElementById("modeDisplay");
    const menuTitle = document.getElementById("menuTitle");

    const classicRgb = "59, 130, 246";
    const portalRgb = "155, 92, 255";

    if(mode === 'portal') {
        displayTag.textContent = "Portal 🌀";
        document.body.style.setProperty("--mode-rgb", portalRgb);
    } else {
        displayTag.textContent = "Classic";
        document.body.style.setProperty("--mode-rgb", classicRgb);
    }

    startGame();
}

function startGame(){
  snake = [
    {x:10,y:10}
  ];

  food = randomFood();

  dx = 1;
  dy = 0;

  score = 0;
  speed = 150;

  document.getElementById("score").textContent = score;

  clearInterval(game);
  game = setInterval(update, speed);
}

function randomFood(){
  let newFood;
  while(true) {
    newFood = {
      x: Math.floor(Math.random()*COLS),
      y: Math.floor(Math.random()*ROWS)
    };
    let onSnake = false;
    for(let i=0; i<snake.length; i++) {
      if(snake[i].x === newFood.x && snake[i].y === newFood.y) {
        onSnake = true;
        break;
      }
    }
    if(!onSnake) break;
  }
  return newFood;
}

function handleDirection(dir) {
  if(dir === "up" && dy === 0){
    dx = 0; dy = -1;
  }
  else if(dir === "down" && dy === 0){
    dx = 0; dy = 1;
  }
  else if(dir === "left" && dx === 0){
    dx = -1; dy = 0;
  }
  else if(dir === "right" && dx === 0){
    dx = 1; dy = 0;
  }
}

// KEYBOARD INPUT
document.addEventListener("keydown", e=>{
  if(e.key==="ArrowUp") handleDirection("up");
  else if(e.key==="ArrowDown") handleDirection("down");
  else if(e.key==="ArrowLeft") handleDirection("left");
  else if(e.key==="ArrowRight") handleDirection("right");
});

function update(){
  let head = {
    x: snake[0].x + dx,
    y: snake[0].y + dy
  };

  // HANDLE WALL INTERACTIONS
  if (currentMode === 'portal') {
    if (head.x < 0) head.x = COLS - 1;
    if (head.x >= COLS) head.x = 0;
    if (head.y < 0) head.y = ROWS - 1;
    if (head.y >= ROWS) head.y = 0;
  } else {
    if(
      head.x < 0 ||
      head.y < 0 ||
      head.x >= COLS ||
      head.y >= ROWS
    ){
      gameOver();
      return;
    }
  }

  // SELF COLLISION
  for(let i=0;i<snake.length;i++){
    if(head.x===snake[i].x && head.y===snake[i].y){
      gameOver();
      return;
    }
  }

  snake.unshift(head);

  // EAT FOOD
  if(head.x===food.x && head.y===food.y){
    score++;
    document.getElementById("score").textContent = score;
    food = randomFood();

    speed = Math.max(60, 150 - score*4);
    clearInterval(game);
    game = setInterval(update, speed);
  } else {
    snake.pop();
  }

  draw();
}

function draw(){
  ctx.fillStyle="#050814";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // GRID LAYER
  ctx.strokeStyle="rgba(255,255,255,0.06)";

  for(let x=0;x<=COLS;x++){
    ctx.beginPath();
    ctx.moveTo(x*SIZE,0);
    ctx.lineTo(x*SIZE,canvas.height);
    ctx.stroke();
  }

  for(let y=0;y<=ROWS;y++){
    ctx.beginPath();
    ctx.moveTo(0,y*SIZE);
    ctx.lineTo(canvas.width,y*SIZE);
    ctx.stroke();
  }

  ctx.fillStyle = currentMode === 'portal' ? "#9b5cff" : "#4c6fff";
  ctx.fillRect(food.x*SIZE, food.y*SIZE, SIZE, SIZE);

  for(let i=0;i<snake.length;i++){
    if (currentMode === 'portal') {
        ctx.fillStyle = i===0 ? "#4c6fff" : "#3554cc";
    } else {
        ctx.fillStyle = i===0 ? "#9b5cff" : "#7936dd";
    }
    ctx.fillRect(snake[i].x*SIZE, snake[i].y*SIZE, SIZE, SIZE);
  }
}

function gameOver(){
  clearInterval(game);
  alert("Game Over! Score: " + score);
  showMenu();
}

// Prevents arrow key page scrolling
document.addEventListener("keydown", function(e) {
  if (
    ["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " "].includes(e.key)
  ) {
    e.preventDefault();
  }
});

showMenu();

</script>

</body>
</html>
