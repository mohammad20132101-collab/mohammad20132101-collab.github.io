<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Snake</title>

<style>
@import url("https://fonts.googleapis.com/css?family=Lato:400,700");

body{
  margin:0;
  font-family: 'Lato', Arial, sans-serif;
  background:#0f0f1a;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  user-select: none;
  -webkit-user-select: none;
}

header{
  width:100%;
  text-align:center;
  padding:15px;
  background:#1a1a2e;
}

/* MENU OVERLAY */
#menu {
    position: fixed;
    inset: 0;
    background: #0f0f1a;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
}
.menuBox {
    background: #141428;
    padding: 40px;
    border-radius: 15px;
    border: 3px solid #4c6fff; /* Dynamic via JS */
    box-shadow: 0 0 25px rgba(76,108,255,0.35);
    text-align: center;
    transition: border-color 0.3s, box-shadow 0.3s;
}
.menuBox h1 {
    color: #4c6fff; /* Dynamic via JS */
    margin-bottom: 5px;
    transition: color 0.3s;
}
.menuBox p {
    color: rgba(255, 255, 255, 0.6);
    margin-bottom: 25px;
}

canvas{
  background:#050814;
  border:3px solid #4c6fff; /* Dynamic via JS */
  border-radius:12px;
  margin-top:15px;
  box-shadow: 0 0 20px rgba(76, 108, 255, 0.2);
  transition: border-color 0.3s, box-shadow 0.3s;
  max-width: 90vw;
  max-height: 90vw;
}

.score-container {
  display: flex;
  gap: 20px;
  font-size:22px;
  margin:10px;
}
.mode-tag {
  color: #4c6fff; /* Dynamic via JS */
  font-weight: bold;
  transition: color 0.3s;
}

/* BUTTONS */
button {
    background: linear-gradient(135deg, #141428, #222244);
    color: white;
    border: 2px solid rgba(255, 255, 255, 0.2);
    padding: 12px 24px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    font-size: 16px;
    transition: 0.2s;
    margin: 5px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

button:hover {
    transform: scale(1.05);
    border-color: white;
}

.btn-row {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin: 15px 0;
}

/* MOBILE CONTROLS D-PAD */
.mobile-controls {
    display: grid;
    grid-template-columns: repeat(3, 70px);
    grid-template-rows: repeat(3, 70px);
    gap: 10px;
    margin: 15px auto;
}

.mobile-controls button {
    margin: 0;
    padding: 0;
    font-size: 24px;
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 15px;
    touch-action: manipulation;
}

#pad-up { grid-column: 2; grid-row: 1; }
#pad-left { grid-column: 1; grid-row: 2; }
#pad-center { grid-column: 2; grid-row: 2; font-size: 18px; border-color: #4c6fff;}
#pad-right { grid-column: 3; grid-row: 2; }
#pad-down { grid-column: 2; grid-row: 3; }

/* Hide mobile layout on desktops */
@media (min-width: 768px) {
    .mobile-controls {
        display: none;
    }
}
</style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7292845069394911"
     crossorigin="anonymous"></script>
</head>

<body>

<div id="menu">
  <div class="menuBox" id="menuBox">
    <h1 id="menuTitle">🐍 Neon Snake</h1>
    <p>Select Your Game Mode</p>
    <button onclick="selectMode('classic')" style="border-color: #4c6fff;">Classic Mode</button>
    <button onclick="selectMode('portal')" style="border-color: #9b5cff;">Portal Mode 🌀</button>
  </div>
</div>

<header>
  <h1>🐍 Rift Snake</h1>
</header>

<div class="score-container">
  <div>Score: <span id="score">0</span></div>
  <div>Mode: <span id="modeDisplay" class="mode-tag">Classic</span></div>
</div>

<canvas id="game" width="400" height="400"></canvas>

<div class="mobile-controls">
  <button id="pad-up" onclick="handleDirection('up')">🔼</button>
  <button id="pad-left" onclick="handleDirection('left')">◀️</button>
  <button id="pad-center" onclick="showMenu()">⚙️</button>
  <button id="pad-right" onclick="handleDirection('right')">▶️</button>
  <button id="pad-down" onclick="handleDirection('down')">🔽</button>
</div>

<div class="btn-row">
  <button onclick="window.location.href='index.html'" id="backBtn">🏠 Back</button>
  <button onclick="showMenu()" id="menuBtn">Menu</button>
  <button onclick="startGame()" id="restartBtn">Restart</button>
</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const COLS = 20;
const ROWS = 20;
const SIZE = 20;

let snake, food, dx, dy, score, game, speed;
let currentMode = 'classic'; 

function showMenu() {
    clearInterval(game);
    document.getElementById("menu").style.display = "flex";
}

function selectMode(mode) {
    currentMode = mode;
    document.getElementById("menu").style.display = "none";
    
    // UI Elements to color shift dynamically
    const displayTag = document.getElementById("modeDisplay");
    const menuBox = document.getElementById("menuBox");
    const menuTitle = document.getElementById("menuTitle");
    const centerPad = document.getElementById("pad-center");
    
    const classicColor = "#4c6fff";
    const portalColor = "#9b5cff";
    
    if(mode === 'portal') {
        // Portal Mode UI is all Purple
        displayTag.textContent = "Portal 🌀";
        displayTag.style.color = portalColor;
        canvas.style.borderColor = portalColor;
        canvas.style.boxShadow = "0 0 20px rgba(155, 92, 255, 0.2)";
        
        menuBox.style.borderColor = portalColor;
        menuBox.style.boxShadow = "0 0 25px rgba(155,92,255,0.35)";
        menuTitle.style.color = portalColor;
        centerPad.style.borderColor = portalColor;
    } else {
        // Classic Mode UI is all Blue
        displayTag.textContent = "Classic";
        displayTag.style.color = classicColor;
        canvas.style.borderColor = classicColor;
        canvas.style.boxShadow = "0 0 20px rgba(76, 108, 255, 0.2)";
        
        menuBox.style.borderColor = classicColor;
        menuBox.style.boxShadow = "0 0 25px rgba(76,108,255,0.35)";
        menuTitle.style.color = classicColor;
        centerPad.style.borderColor = classicColor;
    }
    
    startGame();
}

function startGame(){
  snake = [
    {x:10,y:10}
  ];

  food = randomFood();

  dx = 1;
  dy = 0;

  score = 0;
  speed = 150;

  document.getElementById("score").textContent = score;

  clearInterval(game);
  game = setInterval(update, speed);
}

function randomFood(){
  let newFood;
  while(true) {
    newFood = {
      x: Math.floor(Math.random()*COLS),
      y: Math.floor(Math.random()*ROWS)
    };
    let onSnake = false;
    for(let i=0; i<snake.length; i++) {
      if(snake[i].x === newFood.x && snake[i].y === newFood.y) {
        onSnake = true;
        break;
      }
    }
    if(!onSnake) break;
  }
  return newFood;
}

// DIRECTION LOGIC ENGINES (Combined Keyboard + Touch)
function handleDirection(dir) {
  if(dir === "up" && dy === 0){
    dx = 0; dy = -1;
  }
  else if(dir === "down" && dy === 0){
    dx = 0; dy = 1;
  }
  else if(dir === "left" && dx === 0){
    dx = -1; dy = 0;
  }
  else if(dir === "right" && dx === 0){
    dx = 1; dy = 0;
  }
}

// KEYBOARD INPUT
document.addEventListener("keydown", e=>{
  if(e.key==="ArrowUp") handleDirection("up");
  else if(e.key==="ArrowDown") handleDirection("down");
  else if(e.key==="ArrowLeft") handleDirection("left");
  else if(e.key==="ArrowRight") handleDirection("right");
});

function update(){
  let head = {
    x: snake[0].x + dx,
    y: snake[0].y + dy
  };

  // HANDLE WALL INTERACTIONS
  if (currentMode === 'portal') {
    if (head.x < 0) head.x = COLS - 1;
    if (head.x >= COLS) head.x = 0;
    if (head.y < 0) head.y = ROWS - 1;
    if (head.y >= ROWS) head.y = 0;
  } else {
    if(
      head.x < 0 ||
      head.y < 0 ||
      head.x >= COLS ||
      head.y >= ROWS
    ){
      gameOver();
      return;
    }
  }

  // SELF COLLISION
  for(let i=0;i<snake.length;i++){
    if(head.x===snake[i].x && head.y===snake[i].y){
      gameOver();
      return;
    }
  }

  snake.unshift(head);

  // EAT FOOD
  if(head.x===food.x && head.y===food.y){
    score++;
    document.getElementById("score").textContent = score;
    food = randomFood();

    // Speed difficulty curve
    speed = Math.max(60, 150 - score*4);
    clearInterval(game);
    game = setInterval(update, speed);
  } else {
    snake.pop();
  }

  draw();
}

function draw(){
  ctx.fillStyle="#050814";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // GRID LAYER
  ctx.strokeStyle="rgba(255,255,255,0.06)";

  for(let x=0;x<=COLS;x++){
    ctx.beginPath();
    ctx.moveTo(x*SIZE,0);
    ctx.lineTo(x*SIZE,canvas.height);
    ctx.stroke();
  }

  for(let y=0;y<=ROWS;y++){
    ctx.beginPath();
    ctx.moveTo(0,y*SIZE);
    ctx.lineTo(canvas.width,y*SIZE);
    ctx.stroke();
  }

  // FOOD COLOR SCHEME (Inverted logic)
  ctx.fillStyle = currentMode === 'portal' ? "#9b5cff" : "#4c6fff";
  ctx.fillRect(food.x*SIZE, food.y*SIZE, SIZE, SIZE);

  // SNAKE DRAW ENGINE (Fully inverted color palette sets)
  for(let i=0;i<snake.length;i++){
    if (currentMode === 'portal') {
        // Portal Mode has a Blue Snake inside its Purple universe
        ctx.fillStyle = i===0 ? "#4c6fff" : "#3554cc";
    } else {
        // Classic Mode has a Purple Snake inside its Blue universe
        ctx.fillStyle = i===0 ? "#9b5cff" : "#7936dd";
    }
    ctx.fillRect(snake[i].x*SIZE, snake[i].y*SIZE, SIZE, SIZE);
  }
}

function gameOver(){
  clearInterval(game);
  alert("Game Over! Score: " + score);
  showMenu();
}

// Prevents scrolling and double-tap zoom gestures on mobile UI elements
document.addEventListener("keydown", function(e) {
  if (
    ["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " "].includes(e.key)
  ) {
    e.preventDefault();
  }
});

document.querySelectorAll('.mobile-controls button').forEach(button => {
    button.addEventListener('touchstart', function(e) {
        e.preventDefault(); 
        this.click();
    }, { passive: false });
});

// Start cleanly on overlay load initialization
showMenu();

</script>

</body>
</html>
