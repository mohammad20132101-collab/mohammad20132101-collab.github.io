<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Tic Tac Toe</title>
<style>
@import url("https://fonts.googleapis.com/css?family=Lato:400,400i,700");

body, label, div, span {
  display: flex;
  justify-content: center;
  align-items: center;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #4c6fff;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: background 0.8s ease;
  min-height: 100vh;
}

h1 {
  width: 100%;
  text-align: center;
  color: white;
  text-shadow: 0 0 10px rgba(255,255,255,0.4);
  margin: 10px 0;
}

/* MENU */
#menu {
  position: fixed;
  inset: 0;
  background: #0f0f1a;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.menuBox {
  background: #141428;
  padding: 30px;
  border-radius: 15px;
  border: 3px solid #4c6fff;
  box-shadow: 0 0 25px rgba(76,108,255,0.35);
  text-align: center;
  flex-direction: column;
}

.menuBox h1 { color: #4c6fff; }

.menuBox button {
  margin: 10px;
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  background: #4c6fff;
  color: white;
  cursor: pointer;
  font-weight: bold;
}

/* BUTTONS */
button {
  background: linear-gradient(135deg, #4c6fff, #2f3cff);
  color: white;
  border: 1px solid rgba(76,111,255,0.5);
  padding: 10px 18px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
  box-shadow: 0 0 10px rgba(76,111,255,0.25);
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 18px rgba(76,111,255,0.45);
}

.btn-row {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-top: 10px;
}

/* CONTROLS */
.controls {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 10px 0;
}

.player {
  position: relative;
  justify-content: space-between;
  width: 220px;
  height: 30px;
  margin-bottom: 20px;
}

.player span {
  color: #ffc;
  font: 18px Lato;
}

.player-num {
  width: 100px;
  justify-content: flex-start;
  outline: none;
  cursor: text;
}

.player-num:focus {
  border-bottom: 1px solid #ffc;
}

.score {
  justify-content: flex-end;
  width: 20px;
  color: #ffc;
  font: 18px Lato;
}

.player input {
  border: 0;
}

/* TURN INDICATOR */
.turn-dot {
  position: absolute;
  right: -40px;
  font-size: 24px;
  color: #ffc;
  transition: transform 0.4s ease, opacity 0.3s;
}

.turn-dot.spinning {
  animation: spin 0.4s ease;
}

@keyframes spin {
  0%   { transform: rotate(0deg) scale(1); }
  50%  { transform: rotate(180deg) scale(1.3); }
  100% { transform: rotate(360deg) scale(1); }
}

/* BOARD */
#board {
  display: grid;
  grid-template-columns: repeat(3, 100px);
  gap: 10px;
  margin: 20px 0;
}

.cell {
  width: 100px;
  height: 100px;
  background: rgba(255,255,255,0.15);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  font-weight: bold;
  cursor: pointer;
  border: 2px solid rgba(255,255,255,0.3);
  transition: background 0.2s, transform 0.15s;
  backdrop-filter: blur(4px);
}

.cell:hover {
  background: rgba(255,255,255,0.25);
  transform: scale(1.04);
}

.cell.win {
  background: rgba(255,255,255,0.35) !important;
  box-shadow: 0 0 20px rgba(255,255,255,0.5);
  transform: scale(1.08);
}

/* STATUS */
#status {
  font-size: 22px;
  font-weight: bold;
  color: white;
  text-shadow: 0 0 8px rgba(255,255,255,0.4);
  margin: 8px 0;
  min-height: 30px;
}
.player-num {
  width: 100px;
  justify-content: flex-start;
  outline: none;
  cursor: text;
  white-space: nowrap;
  overflow: hidden;
}
</style>
</head>
<body>

<!-- MENU -->
<div id="menu">
  <div class="menuBox">
    <h1>🌀 Rift Tic Tac Toe</h1>
    <p style="color:#aaa;flex-direction:column;">Select Mode</p>
    <button onclick="startGame(1)">1 Player</button>
    <button onclick="startGame(2)">2 Player</button>
  </div>
</div>

<h1>Rift Tic Tac Toe</h1>

<div class="btn-row">
  <button onclick="resetGame()">Reset</button>
  <button onclick="location.reload()">Menu</button>
  <button onclick="window.location.href='index.html'">Back</button>
</div>
<br>

<div class="controls">
  <div class="player">
  <span class="player-num" contenteditable="true" id="p1Name" 
  onkeydown="if(event.key==='Enter')event.preventDefault(); if(this.textContent.length>=9 && event.key.length===1)event.preventDefault()">Player 1</span>
    <input type="color" value="#4c6fff" id="p1Colour" oninput="onColourChange(1)" />
    <span class="score" id="p1Score">0</span>
    <div class="turn-dot" id="turnDot">●</div>
  </div>
  <div class="player">
  <span class="player-num" contenteditable="true" id="p2Name"  
  onkeydown="if(event.key==='Enter')event.preventDefault(); if(this.textContent.length>=9 && event.key.length===1)event.preventDefault()">Player 2</span>
    <input type="color" value="#9b5cff" id="p2Colour" oninput="onColourChange(2)" />
    <span class="score" id="p2Score">0</span>
  </div>
</div>

<div id="status">Player 1's turn</div>
<div id="board"></div>

<script>
let board = ["","","","","","","","",""];
let current = "X"; // X = p1, O = p2
let gameOver = false;
let mode = 2;
let scores = { p1: 0, p2: 0 };

function getColour(player) {
  return document.getElementById(player === 'p1' ? 'p1Colour' : 'p2Colour').value;
}

function getName(player) {
  return document.getElementById(player === 'p1' ? 'p1Name' : 'p2Name').textContent.trim();
}

function currentPlayer() {
  return current === 'X' ? 'p1' : 'p2';
}

function setBackground(player) {
  document.body.style.background = getColour(player);
}

function onColourChange(num) {
  const player = 'p' + num;
  if (currentPlayer() === player) setBackground(player);
}

function startGame(m) {
  mode = m;
  document.getElementById("menu").style.display = "none";
  if (m === 1) document.getElementById('p2Name').textContent = 'AI';
  else document.getElementById('p2Name').textContent = 'Player 2';
  setBackground('p1');
  draw();
  updateStatus();
  updateTurnDot();
}

function draw() {
  const b = document.getElementById("board");
  b.innerHTML = "";
  board.forEach((v, i) => {
    const cell = document.createElement("div");
    cell.className = "cell";
    if (v === "X") {
      cell.textContent = "✕";
      cell.style.color = "white";
      cell.style.textShadow = `0 0 12px ${getColour('p1')}, 0 0 2px white`;
    }
if (v === "O") {
      cell.textContent = "○";
      cell.style.color = "white";
      cell.style.textShadow = `0 0 12px ${getColour('p2')}, 0 0 2px white`;
    }
    cell.onclick = () => move(i);
    b.appendChild(cell);
  });
}

function move(i) {
  if (gameOver || board[i] !== "") return;
  board[i] = current;
  draw();

  if (checkWin(current)) {
    endWin(current);
    return;
  }
  if (checkDraw()) {
    endDraw();
    return;
  }

  current = current === "X" ? "O" : "X";
  setBackground(currentPlayer());
  updateStatus();
  updateTurnDot();

  if (mode === 1 && current === "O") {
    setTimeout(aiMove, 500);
  }
}

function updateTurnDot() {
  const dot = document.getElementById('turnDot');
  // p2-turn style: move dot down
  if (current === 'O') {
    dot.style.marginTop = '50px';
  } else {
    dot.style.marginTop = '0px';
  }
  dot.style.transition = 'margin-top 0.3s ease';

  // spin it
  dot.classList.remove('spinning');
  void dot.offsetWidth;
  dot.classList.add('spinning');
}

function updateStatus() {
  if (gameOver) return;
  const name = getName(currentPlayer());
  document.getElementById("status").textContent = `${name}'s turn`;
}

/* AI */
function aiMove() {
  if (gameOver) return;
  let empty = board.map((v,i) => v==="" ? i : null).filter(v => v !== null);

  function testMove(i, p) {
    board[i] = p;
    let win = checkWin(p);
    board[i] = "";
    return win;
  }

  for (let i of empty) { if (testMove(i,"O")) { board[i]="O"; draw(); endWin("O"); return; } }
  for (let i of empty) { if (testMove(i,"X")) { board[i]="O"; draw(); if(checkDraw()) return endDraw(); current="X"; setBackground('p1'); updateStatus(); updateTurnDot(); return; } }

  let priority = [4,0,2,6,8,1,3,5,7];
  for (let i of priority) {
    if (board[i]==="") {
      board[i]="O";
      draw();
      if (checkDraw()) return endDraw();
      current="X";
      setBackground('p1');
      updateStatus();
      updateTurnDot();
      return;
    }
  }
}

function checkWin(p) {
  const w = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  return w.some(c => c.every(i => board[i]===p));
}

function checkDraw() {
  return board.every(c => c !== "") && !gameOver;
}

function endWin(p) {
  gameOver = true;
  const player = p === "X" ? 'p1' : 'p2';
  scores[player]++;
  document.getElementById(`${player}Score`).textContent = scores[player];
  document.getElementById("status").textContent = `${getName(player)} wins! 🎉`;
  highlightWin(p);
}

function endDraw() {
  gameOver = true;
  document.getElementById("status").textContent = "It's a draw!";
}

function highlightWin(p) {
  const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  const cells = document.querySelectorAll(".cell");
  for (let combo of wins) {
    if (combo.every(i => board[i]===p)) {
      combo.forEach(i => cells[i].classList.add("win"));
      break;
    }
  }
}

function resetGame() {
  board = ["","","","","","","","",""];
  current = "X";
  gameOver = false;
  setBackground('p1');
  updateStatus();
  updateTurnDot();
  draw();
}

// init dot position
document.getElementById('turnDot').style.marginTop = '0px';
</script>
</body>
</html>
