<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Memory Match</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f0f1a;
    color:white;
    text-align:center;
}

header{
    background:#1a1a2e;
    padding:15px;
    border-bottom:2px solid #4c6fff;
}

.controls{
    margin:15px;
}

button{
    background:#4c6fff;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    opacity:0.85;
}

#moves{
    margin-left:15px;
    font-weight:bold;
}

#game{
    width:440px;
    margin:20px auto;
    display:grid;
    grid-template-columns:repeat(4,100px);
    gap:10px;
    justify-content:center;
}

.card{
    width:100px;
    height:100px;
    perspective:1000px;
    cursor:pointer;
}

.inner{
    width:100%;
    height:100%;
    position:relative;
    transition:transform 0.4s;
    transform-style:preserve-3d;
}

.card.flipped .inner{
    transform:rotateY(180deg);
}

.front,
.back{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    backface-visibility:hidden;
    border:2px solid black;
}

.front{
    background:#4c6fff;
}

.back{
    background:#1a1a2e;
    transform:rotateY(180deg);
}

.matched .back{
    box-shadow:0 0 15px rgba(76,108,255,0.8);
}
</style>
</head>
<body>

<header>
    <h1>🧠 Rift Memory Match</h1>
    <p>Match all the pairs!</p>
</header>

<div class="controls">
    <button onclick="startGame()">Restart</button>
    <button onclick="window.location.href='index.html'">Back</button>
    <span id="moves">Moves: 0</span>
</div>

<div id="game"></div>

<script>

const emojiPool = [
  "😀","😃","😄","😁","😆","😅","😂","🙂","😊","😇",
  "😍","🥰","😘","😋","😎","🤩","🥳","😤","😭","😡",

  "👍","👎","👏","🙏","💪","🤝","👌","✌️","🤞","🫶",

  "🔥","⭐","🌟","💥","⚡","💫","💯","💢","💤",

  "🎮","🎲","🕹️","🎯","🏆","🎪","🎨","🎵","🎧",

  "🚀","🛸","✈️","🚗","🚲","🏁","🌍","🌙","☀️",

  "🐶","🐱","🐭","🐹","🦊","🐻","🐼","🐸","🐵",

  "🍎","🍕","🍔","🍟","🍩","🍪","🍫","🍓","🍇"
];

let firstCard = null;
let secondCard = null;
let lockBoard = false;
let moves = 0;
let matches = 0;

function shuffle(array){
    for(let i=array.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [array[i],array[j]]=[array[j],array[i]];
    }
}

function startGame(){

    const game=document.getElementById("game");

    game.innerHTML="";

    firstCard=null;
    secondCard=null;
    lockBoard=false;
    moves=0;
    matches=0;

    document.getElementById("moves").textContent="Moves: 0";

    // pick 8 random emojis
    let chosen = emojiPool
        .sort(() => Math.random() - 0.5)
        .slice(0, 8);

    let cards = [...chosen, ...chosen]; // make pairs

    shuffle(cards);

    cards.forEach(symbol=>{

        const card=document.createElement("div");
        card.className="card";

        card.innerHTML=`
            <div class="inner">
                <div class="front">?</div>
                <div class="back">${symbol}</div>
            </div>
        `;

        card.dataset.symbol=symbol;

        card.addEventListener("click",()=>flipCard(card));

        game.appendChild(card);
    });
}

function flipCard(card){

    if(lockBoard) return;
    if(card===firstCard) return;
    if(card.classList.contains("matched")) return;

    card.classList.add("flipped");

    if(!firstCard){
        firstCard=card;
        return;
    }

    secondCard=card;
    moves++;

    document.getElementById("moves").textContent=
        "Moves: "+moves;

    checkMatch();
}

function checkMatch(){

    const match =
        firstCard.dataset.symbol ===
        secondCard.dataset.symbol;

    if(match){

        firstCard.classList.add("matched");
        secondCard.classList.add("matched");

        matches++;

        resetTurn();

        if(matches===8){
            setTimeout(()=>{
                alert(
                    "🎉 You won in "+
                    moves+
                    " moves!"
                );
            },300);
        }

    }else{

        lockBoard=true;

        setTimeout(()=>{

            firstCard.classList.remove("flipped");
            secondCard.classList.remove("flipped");

            resetTurn();

        },800);
    }
}

function resetTurn(){
    firstCard=null;
    secondCard=null;
    lockBoard=false;
}

startGame();

</script>

</body>
</html>
