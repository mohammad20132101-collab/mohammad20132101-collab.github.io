<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pac-Man Classic</title>

<style>
body {
  margin: 0;
  background: #000;
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
}

#ui {
  display: flex;
  justify-content: space-between;
  width: 600px;
  margin: 10px;
}

button {
  background: #222;
  color: white;
  border: 1px solid #444;
  padding: 6px 12px;
  cursor: pointer;
}

canvas {
  background: #000;
  border: 2px solid #222;
}
</style>
</head>

<body>

<div id="ui">
  <button onclick="restartGame()">Restart</button>
  <button onclick="goBack()">Back</button>
  <div id="info">Score: 0 | Lives: 3</div>
</div>

<canvas id="game" width="600" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const TILE = 30;
const ROWS = 20;
const COLS = 20;

let score, lives, gameOver;
let pellets = [];
let powerPellets = [];

let pacman;
let ghosts;

const DIRS = [
  {x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}
];

// ---------- SIMPLE CLASSIC MAZE ----------
let map = [
"####################",
"#........##........#",
"#.####...##...####.#",
"#..................#",
"#.####.######.####.#",
"#..................#",
"#.####.######.####.#",
"#..................#",
"#........##........#",
"#........##........#",
"#.####.######.####.#",
"#..................#",
"#.####.######.####.#",
"#..................#",
"#.####...##...####.#",
"#........##........#",
"#..................#",
"#.####.######.####.#",
"#..................#",
"####################"
];

// ---------- INIT ----------
function reset() {
  score = 0;
  lives = 3;
  gameOver = false;

  pacman = { x: 10, y: 15, dx: 0, dy: 0 };

  ghosts = [
    {x:9,y:9,color:"red",mode:"chase"},      // Blinky
    {x:10,y:9,color:"pink",mode:"random"},   // Pinky
    {x:9,y:10,color:"cyan",mode:"random"},    // Inky
    {x:10,y:10,color:"orange",mode:"random"}  // Clyde
  ];

  pellets = [];
  powerPellets = [];

  for (let y=0;y<ROWS;y++){
    for (let x=0;x<COLS;x++){
      if (map[y][x] === ".") pellets.push({x,y});
      if (map[y][x] === "." && Math.random()<0.03)
        powerPellets.push({x,y});
    }
  }

  updateUI();
}

// ---------- DRAW ----------
function drawMaze(){
  for (let y=0;y<ROWS;y++){
    for (let x=0;x<COLS;x++){
      if (map[y][x] === "#"){
        ctx.fillStyle = "#111827";
        ctx.fillRect(x*TILE,y*TILE,TILE,TILE);
      }
    }
  }
}

function drawPellets(){
  ctx.fillStyle = "#bbb";
  pellets.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x*TILE+15,p.y*TILE+15,3,0,Math.PI*2);
    ctx.fill();
  });
}

function drawPower(){
  ctx.fillStyle = "#fff";
  powerPellets.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x*TILE+15,p.y*TILE+15,7,0,Math.PI*2);
    ctx.fill();
  });
}

function drawPacman(){
  ctx.fillStyle = "yellow";
  ctx.beginPath();
  ctx.arc(
    pacman.x*TILE+15,
    pacman.y*TILE+15,
    12,
    0.25*Math.PI,
    1.75*Math.PI
  );
  ctx.lineTo(pacman.x*TILE+15,pacman.y*TILE+15);
  ctx.fill();
}

function drawGhosts(){
  ghosts.forEach(g=>{
    ctx.fillStyle = g.frightened ? "#3b82f6" : g.color;
    ctx.beginPath();
    ctx.arc(g.x*TILE+15,g.y*TILE+15,12,Math.PI,0);
    ctx.lineTo(g.x*TILE+27,g.y*TILE+27);
    ctx.lineTo(g.x*TILE+3,g.y*TILE+27);
    ctx.closePath();
    ctx.fill();
  });
}

// ---------- MOVEMENT ----------
function canMove(x,y){
  return map[y] && map[y][x] !== "#";
}

function movePacman(){
  const nx = pacman.x + pacman.dx;
  const ny = pacman.y + pacman.dy;

  if (canMove(nx,ny)){
    pacman.x = nx;
    pacman.y = ny;
  }

  // pellets
  pellets = pellets.filter(p=>{
    if (p.x===pacman.x && p.y===pacman.y){
      score += 10;
      return false;
    }
    return true;
  });

  // power pellets
  powerPellets = powerPellets.filter(p=>{
    if (p.x===pacman.x && p.y===pacman.y){
      score += 50;
      ghosts.forEach(g=>g.frightened=true);
      setTimeout(()=>ghosts.forEach(g=>g.frightened=false),6000);
      return false;
    }
    return true;
  });
}

function moveGhosts(){
  ghosts.forEach(g=>{
    let options = DIRS.filter(d=>canMove(g.x+d.x,g.y+d.y));
    let move = options[Math.floor(Math.random()*options.length)];

    g.x += move.x;
    g.y += move.y;
  });
}

// ---------- COLLISION ----------
function check(){
  ghosts.forEach(g=>{
    if (g.x===pacman.x && g.y===pacman.y){
      if (g.frightened){
        g.x = 9; g.y = 9;
        score += 200;
      } else {
        lives--;
        pacman.x=10; pacman.y=15;
        if (lives<=0){
          gameOver=true;
          alert("Game Over! Score: "+score);
        }
      }
    }
  });
}

// ---------- INPUT ----------
document.addEventListener("keydown",e=>{
  if (e.key==="ArrowRight"){pacman.dx=1;pacman.dy=0;}
  if (e.key==="ArrowLeft"){pacman.dx=-1;pacman.dy=0;}
  if (e.key==="ArrowUp"){pacman.dx=0;pacman.dy=-1;}
  if (e.key==="ArrowDown"){pacman.dx=0;pacman.dy=1;}
});

// ---------- UI ----------
function updateUI(){
  document.getElementById("info").innerText =
    `Score: ${score} | Lives: ${lives}`;
}

// ---------- LOOP (SLOW TICK STYLE) ----------
let tick = 0;

function loop(){
  if (gameOver) return;

  ctx.clearRect(0,0,600,600);

  drawMaze();
  drawPellets();
  drawPower();
  drawPacman();
  drawGhosts();

  if (tick % 10 === 0){
    movePacman();
    moveGhosts();
    check();
    updateUI();
  }

  tick++;
  requestAnimationFrame(loop);
}

// ---------- BUTTONS ----------
function restartGame(){
  reset();
  loop();
}

function goBack(){
  window.history.back();
}

// start
reset();
loop();

</script>

</body>
</html>
