<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Hub - Pac-Man</title>

<style>
body {
  margin: 0;
  background: #0f0f1a;
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
}

header {
  width: 100%;
  background: #1a1a2e;
  padding: 12px;
  text-align: center;
}

button {
  background: #4c6fff;
  color: white;
  border: none;
  padding: 8px 12px;
  margin: 5px;
  border-radius: 6px;
  cursor: pointer;
}

canvas {
  margin-top: 15px;
  border: 3px solid #2a3a8f; /* darker arcade blue */
  background: black;
}

#ui {
  margin-top: 10px;
  text-align: center;
}
</style>
</head>

<body>

<header>
  <h2>🎮 Rift Hub - Pac-Man</h2>
  <button onclick="goBack()">🔙 Back</button>
  <button onclick="restart()">🔄 Restart</button>
</header>

<div id="ui">
  <div id="score">Score: 0</div>
  <div id="lives">Lives: 3</div>
</div>

<canvas id="game" width="600" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const tile = 30;
const rows = 20;
const cols = 20;

let map, pacman, ghosts, pellets;
let score, lives;
let tick = 0;

/* ---------------- MAP (structured maze) ---------------- */
function generateMap() {
  const m = Array(rows).fill().map(() => Array(cols).fill(0));

  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      if (x === 0 || y === 0 || x === cols - 1 || y === rows - 1) {
        m[y][x] = 1;
      }
      else if (x % 2 === 0 && y % 2 === 0) {
        m[y][x] = 1;
      }
      else if (Math.random() < 0.08) {
        m[y][x] = 1;
      }
    }
  }

  m[1][1] = 0;
  return m;
}

/* ---------------- INIT ---------------- */
function init() {
  map = generateMap();

  score = 0;
  lives = 3;

  pacman = { x: 1, y: 1, dx: 1, dy: 0 };

  ghosts = [
    { x: cols-2, y: 1, dx: -1, dy: 0 },
    { x: cols-2, y: rows-2, dx: 0, dy: -1 },
    { x: 1, y: rows-2, dx: 1, dy: 0 },
    { x: Math.floor(cols/2), y: Math.floor(rows/2), dx: 0, dy: 1 }
  ];

  pellets = [];
  for (let y = 1; y < rows-1; y++) {
    for (let x = 1; x < cols-1; x++) {
      if (map[y][x] === 0) pellets.push({x,y});
    }
  }

  updateUI();
}

/* ---------------- DRAW ---------------- */
function drawMap() {
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      if (map[y][x] === 1) {
        ctx.fillStyle = "#001a66"; // darker pacman blue
        ctx.fillRect(x*tile, y*tile, tile, tile);
      }
    }
  }
}

function drawPellets() {
  ctx.fillStyle = "white";
  pellets.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x*tile+tile/2, p.y*tile+tile/2, 3, 0, Math.PI*2);
    ctx.fill();
  });
}

function drawPacman() {
  const cx = pacman.x*tile + tile/2;
  const cy = pacman.y*tile + tile/2;

  ctx.fillStyle = "yellow";
  ctx.beginPath();
  ctx.arc(cx, cy, tile/2-2, 0.2, Math.PI*1.8);
  ctx.lineTo(cx, cy);
  ctx.fill();
}

function drawGhosts() {
  ghosts.forEach((g,i) => {
    const colors = ["red","pink","cyan","orange"];
    ctx.fillStyle = colors[i];

    ctx.beginPath();
    ctx.arc(g.x*tile+tile/2, g.y*tile+tile/2, tile/2-3, 0, Math.PI*2);
    ctx.fill();
  });
}

/* ---------------- MOVEMENT ---------------- */
function movePacman() {
  const nx = pacman.x + pacman.dx;
  const ny = pacman.y + pacman.dy;

  if (map[ny]?.[nx] !== 1) {
    pacman.x = nx;
    pacman.y = ny;
  }

  pellets = pellets.filter(p => {
    if (p.x === pacman.x && p.y === pacman.y) {
      score++;
      return false;
    }
    return true;
  });
}

function moveGhosts() {
  ghosts.forEach(g => {
    const dirs = [
      [1,0],[-1,0],[0,1],[0,-1]
    ];

    const [dx,dy] = dirs[Math.floor(Math.random()*dirs.length)];

    const nx = g.x + dx;
    const ny = g.y + dy;

    if (map[ny]?.[nx] !== 1) {
      g.x = nx;
      g.y = ny;
    }
  });
}

/* ---------------- COLLISION ---------------- */
function check() {
  ghosts.forEach(g => {
    if (g.x === pacman.x && g.y === pacman.y) {
      lives--;
      updateUI();

      pacman.x = 1;
      pacman.y = 1;

      if (lives <= 0) {
        alert("Game Over! Score: " + score);
        init();
      }
    }
  });

  if (pellets.length === 0) {
    alert("You Win! Score: " + score);
    init();
  }
}

/* ---------------- UI ---------------- */
function updateUI() {
  document.getElementById("score").innerText = "Score: " + score;
  document.getElementById("lives").innerText = "Lives: " + lives;
}

/* ---------------- INPUT ---------------- */
document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") { pacman.dx = 1; pacman.dy = 0; }
  if (e.key === "ArrowLeft") { pacman.dx = -1; pacman.dy = 0; }
  if (e.key === "ArrowUp") { pacman.dx = 0; pacman.dy = -1; }
  if (e.key === "ArrowDown") { pacman.dx = 0; pacman.dy = 1; }
});

/* ---------------- LOOP (SLOWER PAC-MAN) ---------------- */
function loop() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawMap();
  drawPellets();
  drawPacman();
  drawGhosts();

  movePacman();

  tick++;
  if (tick % 12 === 0) {   // SLOW movement like real Pac-Man
    moveGhosts();
  }

  check();

  requestAnimationFrame(loop);
}

/* ---------------- BUTTONS ---------------- */
function restart() {
  init();
}

function goBack() {
  window.location.href = "index.html";
}

/* START */
init();
loop();
</script>

</body>
</html>
