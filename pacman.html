<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rift Hub - Pac-Man</title>

<style>
body {
  margin: 0;
  background: #0f0f1a;
  color: white;
  font-family: Arial;
  display: flex;
  flex-direction: column;
  align-items: center;
}

#ui {
  width: 600px;
  display: flex;
  justify-content: space-between;
  padding: 10px;
}

button {
  background: #1a1a2e;
  color: white;
  border: 1px solid #333;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
}

canvas {
  background: #000;
  border: 2px solid #1a1a2e;
}
</style>
</head>

<body>

<div id="ui">
  <button onclick="restart()">Restart</button>
  <button onclick="history.back()">Back</button>
  <div id="stats">Score: 0 | Lives: 3</div>
</div>

<canvas id="c" width="600" height="600"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

const TILE = 30;
const ROWS = 20;
const COLS = 20;

let score, lives;
let pac, ghosts, pellets, power;
let fearTimer = 0;

// ---------- MAP (WITH GHOST HOUSE) ----------
const map = [
"####################",
"#........##........#",
"#.####...##...####.#",
"#..................#",
"#.####.######.####.#",
"#..................#",
"#.####.##GG##.####.#",
"#......##DD##......#",
"#......##..##......#",
"#......##..##......#",
"#......##..##......#",
"#......##..##......#",
"#.####.##..##.####.#",
"#..................#",
"#.####...##...####.#",
"#..................#",
"#..................#",
"#.####.######.####.#",
"#..................#",
"####################"
];

// G = ghost house
// D = door

// ---------- INIT ----------
function reset(){
  score = 0;
  lives = 3;
  fearTimer = 0;

  pac = {x:10,y:15,dx:0,dy:0};

  ghosts = [
    {x:9,y:8,color:"#ff3b3b",home:{x:9,y:8},out:true},
    {x:10,y:8,color:"#ff77ff",home:{x:10,y:8},out:false},
    {x:9,y:9,color:"#4de1ff",home:{x:9,y:9},out:false},
    {x:10,y:9,color:"#ffb347",home:{x:10,y:9},out:false}
  ];

  pellets = [];
  power = [];

  for(let y=0;y<ROWS;y++){
    for(let x=0;x<COLS;x++){

      if(map[y][x]===".") pellets.push({x,y});

      // 4 classic power corners
      if((x===1 && y===1) ||
         (x===18 && y===1) ||
         (x===1 && y===18) ||
         (x===18 && y===18)){
        power.push({x,y});
      }
    }
  }
}

// ---------- HELPERS ----------
function wall(x,y){
  return map[y] && map[y][x]==="#";
}

function isDoor(x,y){
  return map[y] && map[y][x]==="D";
}

// ---------- DRAW ----------
function draw(){
  ctx.clearRect(0,0,600,600);

  for(let y=0;y<ROWS;y++){
    for(let x=0;x<COLS;x++){

      if(map[y][x]==="#"){
        ctx.fillStyle="#111827";
        ctx.fillRect(x*TILE,y*TILE,TILE,TILE);
      }

      if(map[y][x]==="G"){
        ctx.fillStyle="#222";
        ctx.fillRect(x*TILE,y*TILE,TILE,TILE);
      }

      if(map[y][x]==="D"){
        ctx.fillStyle="#444";
        ctx.fillRect(x*TILE,y*TILE,TILE,TILE/3);
      }
    }
  }

  // pellets
  ctx.fillStyle="#bbb";
  pellets.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x*TILE+15,p.y*TILE+15,3,0,Math.PI*2);
    ctx.fill();
  });

  // power pellets
  ctx.fillStyle="#fff";
  power.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x*TILE+15,p.y*TILE+15,7,0,Math.PI*2);
    ctx.fill();
  });

  // pacman
  ctx.fillStyle="yellow";
  ctx.beginPath();
  ctx.arc(pac.x*TILE+15,pac.y*TILE+15,12,0.25*Math.PI,1.75*Math.PI);
  ctx.lineTo(pac.x*TILE+15,pac.y*TILE+15);
  ctx.fill();

  // ghosts
  ghosts.forEach(g=>{
    ctx.fillStyle = fearTimer>0 ? "#3b82f6" : g.color;

    ctx.beginPath();
    ctx.arc(g.x*TILE+15,g.y*TILE+15,12,Math.PI,0);
    ctx.lineTo(g.x*TILE+27,g.y*TILE+27);
    ctx.lineTo(g.x*TILE+3,g.y*TILE+27);
    ctx.closePath();
    ctx.fill();
  });
}

// ---------- MOVE ----------
function canMove(x,y){
  if(wall(x,y)) return false;
  return true;
}

// ---------- PAC ----------
function movePac(){
  let nx = pac.x + pac.dx;
  let ny = pac.y + pac.dy;

  if(canMove(nx,ny)){
    pac.x = nx;
    pac.y = ny;
  }

  pellets = pellets.filter(p=>{
    if(p.x===pac.x && p.y===pac.y){
      score+=10;
      return false;
    }
    return true;
  });

  power = power.filter(p=>{
    if(p.x===pac.x && p.y===pac.y){
      score+=50;
      fearTimer = 300; // FIXED FEAR MODE
      return false;
    }
    return true;
  });
}

// ---------- GHOST AI ----------
function moveGhost(g){

  // leave house one by one
  if(!g.out){
    if(Math.random()<0.01) g.out=true;
    return;
  }

  let dirs = [
    {x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}
  ].filter(d=>canMove(g.x+d.x,g.y+d.y));

  if(dirs.length===0) return;

  let move;

  if(fearTimer>0){
    // RUN AWAY (simple)
    move = dirs[Math.floor(Math.random()*dirs.length)];
  } else {
    // chase pacman
    dirs.sort((a,b)=>
      Math.abs((g.x+a.x)-pac.x)+Math.abs((g.y+a.y)-pac.y) -
      Math.abs((g.x+b.x)-pac.x)-Math.abs((g.y+b.y)-pac.y)
    );
    move = dirs[0];
  }

  g.x += move.x;
  g.y += move.y;
}

// ---------- COLLISION ----------
function check(){
  ghosts.forEach(g=>{
    if(g.x===pac.x && g.y===pac.y){

      if(fearTimer>0){
        g.x=g.home.x;
        g.y=g.home.y;
        g.out=false;
        score+=200;
      } else {
        lives--;
        pac.x=10; pac.y=15;

        if(lives<=0){
          alert("Game Over: "+score);
          restart();
        }
      }
    }
  });
}

// ---------- INPUT ----------
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight"){pac.dx=1;pac.dy=0;}
  if(e.key==="ArrowLeft"){pac.dx=-1;pac.dy=0;}
  if(e.key==="ArrowUp"){pac.dx=0;pac.dy=-1;}
  if(e.key==="ArrowDown"){pac.dx=0;pac.dy=1;}
});

// ---------- LOOP ----------
let tick=0;

function loop(){

  if(fearTimer>0) fearTimer--;

  draw();

  if(tick%7===0){
    movePac();
    ghosts.forEach(moveGhost);
    check();
  }

  tick++;
  requestAnimationFrame(loop);
}

// ---------- UI ----------
function restart(){
  reset();
  loop();
}

reset();
loop();

</script>
</body>
</html>
