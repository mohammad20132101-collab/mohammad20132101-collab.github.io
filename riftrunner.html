<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Runner</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:white;
}
header{
  background:#1a1a2e;
  padding:15px;
  text-align:center;
  border-bottom:2px solid #4c6fff;
}
.wrapper{
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}
.panel{
  display:flex;
  gap:15px;
  align-items:center;
  margin:10px;
  flex-wrap:wrap;
  justify-content:center;
}
canvas{
  background:#050814;
  border:3px solid #4c6fff;
  border-radius:12px;
}
button{
  background:#4c6fff;
  border:none;
  color:white;
  padding:10px 15px;
  border-radius:8px;
  cursor:pointer;
}
button:hover{ opacity:0.85; }
.score{
  background:#1a1a2e;
  padding:8px 12px;
  border-radius:8px;
  border:1px solid #4c6fff;
}
</style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7292845069394911"
     crossorigin="anonymous"></script>
</head>
<body>
<header>
  <h1>🏃 Rift Runner</h1>
  <p>Space / ↑ to jump   Double jump to clear tall obstacles!</p>
</header>
<div class="wrapper">
  <div class="panel">
    <div class="score">Score: <span id="score">0</span></div>
    <button onclick="startGame()">Restart</button>
    <button onclick="window.location.href='index.html'">Back</button>
    <label>
      Cube Color:
      <input type="color" id="colorPicker" value="#4c6fff"
        onfocus="paused = true"
        onblur="paused = false">
    </label>
  </div>
  <canvas id="game" width="500" height="300"></canvas>
</div>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const groundHeight = 30;
const groundY = canvas.height - groundHeight - 30;
const NORMAL_H = 30;

let player, obstacles, score, speed, frame, loop, paused = false;
let trail = [];

document.addEventListener("keydown", e => {
  if(e.code === "Space" || e.code === "ArrowUp") {
    if(player.jumpsLeft > 0) {
      // Increased jump power slightly from -10 to -12 for a higher normal jump
      player.vy = -12;
      player.jumping = true;
      player.jumpsLeft--;
    }
  }
});

function startGame(){
  player = {
    x: 60,
    y: groundY,
    w: NORMAL_H,
    h: NORMAL_H,
    vy: 0,
    jumping: false,
    jumpsLeft: 2
  };
  obstacles = [];
  trail = [];
  score = 0;
  speed = 4;
  frame = 0;
  paused = false;
  document.getElementById("score").innerText = score;
  clearInterval(loop);
  loop = setInterval(update, 20);
}

function spawn(){
  const type = Math.random();
  if(type < 0.7){
    // short obstacle — 70% chance, clearable with single jump
    obstacles.push({
      x: canvas.width,
      y: canvas.height - groundHeight - 40,
      w: 20,
      h: 40,
      tall: false
    });
  } else {
    // tall obstacle — 30% chance, strictly requires double jump
    obstacles.push({
      x: canvas.width,
      y: canvas.height - groundHeight - 110,
      w: 20,
      h: 110,
      tall: true
    });
  }
}

function update(){
  if(paused) return;
  frame++;

  // background
  ctx.fillStyle="#050814";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // grid
  ctx.strokeStyle="rgba(255,255,255,0.05)";
  for(let x=0;x<=20;x++){
    ctx.beginPath();
    ctx.moveTo(x*25,0);
    ctx.lineTo(x*25,canvas.height);
    ctx.stroke();
  }
  for(let y=0;y<=12;y++){
    ctx.beginPath();
    ctx.moveTo(0,y*25);
    ctx.lineTo(canvas.width,y*25);
    ctx.stroke();
  }

  // ground
  ctx.fillStyle="#1a1a2e";
  ctx.fillRect(0,canvas.height - groundHeight,canvas.width,groundHeight);
  // ground glow line
  ctx.strokeStyle="rgba(76,111,255,0.5)";
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(0, canvas.height - groundHeight);
  ctx.lineTo(canvas.width, canvas.height - groundHeight);
  ctx.stroke();
  ctx.lineWidth=1;

  // physics
  player.vy += 0.6;
  player.y += player.vy;
  const floor = canvas.height - groundHeight - player.h;
  if(player.y >= floor){
    player.y = floor;
    player.vy = 0;
    player.jumping = false;
    player.jumpsLeft = 2;
  }

  const color = document.getElementById("colorPicker").value;

  // trail
  trail.push({x: player.x, y: player.y, w: player.w, h: player.h});
  if(trail.length > 8) trail.shift();

  for(let i=0; i<trail.length; i++){
    const alpha = (i / trail.length) * 0.35;
    ctx.fillStyle = color;
    ctx.globalAlpha = alpha;
    ctx.fillRect(trail[i].x, trail[i].y, trail[i].w, trail[i].h);
  }
  ctx.globalAlpha = 1;

  // player
  ctx.fillStyle = color;
  ctx.fillRect(player.x, player.y, player.w, player.h);

  // spawn
  if(frame % 80 === 0) spawn();

  // obstacles
  for(let i=0; i<obstacles.length; i++){
    let o = obstacles[i];
    o.x -= speed;

    ctx.fillStyle = o.tall ? "#ff2e63" : "#c0392b";
    ctx.fillRect(o.x, o.y, o.w, o.h);

    if(o.tall){
      ctx.strokeStyle="rgba(255,46,99,0.4)";
      ctx.lineWidth=3;
      ctx.strokeRect(o.x, o.y, o.w, o.h);
      ctx.lineWidth=1;
    }

    // collision
    if(
      player.x < o.x + o.w &&
      player.x + player.w > o.x &&
      player.y < o.y + o.h &&
      player.y + player.h > o.y
    ) {
      clearInterval(loop);
      setTimeout(()=>alert("Game Over! Score: " + score), 100);
      return;
    }
  }
  obstacles = obstacles.filter(o => o.x > -50);

  // score
  score++;
  document.getElementById("score").innerText = score;

  // difficulty
  if(score % 200 === 0) speed += 0.5;
}

startGame();
</script>
</body>
</html>
