
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift 2048</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:white;
  text-align:center;
}

header{
  background:#1a1a2e;
  padding:15px;
  border-bottom:2px solid #4c6fff;
}

#game{
  margin:20px auto;
  width:420px;
  height:420px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  grid-gap:10px;
  padding:10px;
  background:#111122;
  border:3px solid #4c6fff;
  border-radius:12px;
}

.tile{
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:24px;
  font-weight:bold;
  border-radius:8px;
  background:#1a1a2e;
  border:2px solid black;
}

.controls{
  margin:10px;
}

button{
  background:#4c6fff;
  border:none;
  padding:10px 15px;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

button:hover{
  opacity:0.85;
}
</style>
</head>

<body>

<header>
  <h1>🧩 Rift 2048</h1>
  <p>Combine tiles • Reach 2048</p>
</header>

<div class="controls">
  <button onclick="restart()">Restart</button>
</div>

<div id="game"></div>

<script>

let board;

function init(){
  board = Array(4).fill().map(()=>Array(4).fill(0));
  addTile();
  addTile();
  draw();
}

function addTile(){
  let empty = [];

  for(let r=0;r<4;r++){
    for(let c=0;c<4;c++){
      if(board[r][c]===0) empty.push({r,c});
    }
  }

  if(empty.length===0) return;

  let spot = empty[Math.floor(Math.random()*empty.length)];
  board[spot.r][spot.c] = Math.random()<0.9 ? 2 : 4;
}

function draw(){
  const game = document.getElementById("game");
  game.innerHTML = "";

  for(let r=0;r<4;r++){
    for(let c=0;c<4;c++){

      let val = board[r][c];

      let tile = document.createElement("div");
      tile.className = "tile";
      tile.textContent = val ? val : "";

      // Rift-style colors
      let colors = {
        2:"#1a1a2e",
        4:"#222244",
        8:"#2c2c66",
        16:"#3a3a88",
        32:"#4c4cff",
        64:"#6666ff",
        128:"#8888ff",
        256:"#a0a0ff",
        512:"#c0c0ff",
        1024:"#d0d0ff",
        2048:"#ffffff"
      };

      tile.style.background = colors[val] || "#1a1a2e";

      game.appendChild(tile);
    }
  }
}

// ================= MOVEMENT =================

function slide(row){
  row = row.filter(x=>x!==0);

  for(let i=0;i<row.length-1;i++){
    if(row[i]===row[i+1]){
      row[i]*=2;
      row[i+1]=0;
    }
  }

  row = row.filter(x=>x!==0);

  while(row.length<4){
    row.push(0);
  }

  return row;
}

function moveLeft(){
  for(let r=0;r<4;r++){
    board[r] = slide(board[r]);
  }
}

function moveRight(){
  for(let r=0;r<4;r++){
    board[r] = slide(board[r].reverse()).reverse();
  }
}

function moveUp(){
  for(let c=0;c<4;c++){
    let col = [];
    for(let r=0;r<4;r++) col.push(board[r][c]);

    col = slide(col);

    for(let r=0;r<4;r++) board[r][c]=col[r];
  }
}

function moveDown(){
  for(let c=0;c<4;c++){
    let col = [];
    for(let r=0;r<4;r++) col.push(board[r][c]);

    col = slide(col.reverse()).reverse();

    for(let r=0;r<4;r++) board[r][c]=col[r];
  }
}

function move(dir){
  let before = JSON.stringify(board);

  if(dir==="left") moveLeft();
  if(dir==="right") moveRight();
  if(dir==="up") moveUp();
  if(dir==="down") moveDown();

  if(before !== JSON.stringify(board)){
    addTile();
    draw();
  }
}

// ================= INPUT =================

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft") move("left");
  if(e.key==="ArrowRight") move("right");
  if(e.key==="ArrowUp") move("up");
  if(e.key==="ArrowDown") move("down");
});

// ================= RESTART =================

function restart(){
  init();
}

// start
init();

</script>

</body>
</html>
