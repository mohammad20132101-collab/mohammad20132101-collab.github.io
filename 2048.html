<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift 2048</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:white;
  text-align:center;
}

header{
  background:#1a1a2e;
  padding:15px;
  border-bottom:2px solid #4c6fff;
}

#game{
  margin:20px auto;
  width:420px;
  height:420px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:10px;
  background:#111122;
  border:3px solid #4c6fff;
  border-radius:12px;
}

.tile{
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
  border-radius:10px;
  border:2px solid black;
  transition: transform 0.12s ease, background 0.2s ease;
  font-size:22px;
}

.tile.merge{
  animation: pop 0.18s ease;
}

@keyframes pop{
  0%{transform:scale(0.7);}
  60%{transform:scale(1.25);}
  100%{transform:scale(1);}
}

button{
  background:#4c6fff;
  border:none;
  padding:10px 15px;
  border-radius:8px;
  color:white;
  cursor:pointer;
  margin:5px;
}
</style>
</head>

<body>

<header>
  <h1>🧩 Rift 2048</h1>
  <p>Combine tiles • Reach 2048</p>
</header>

<button onclick="restart()">Restart</button>
<button onclick="window.location.href='index.html'">Back</button>

<div id="game"></div>

<script>

let board;
let won = false;

// ================= INIT =================
function init(){
  board = Array(4).fill().map(()=>Array(4).fill(0));
  addTile();
  addTile();
  draw();
}

// ================= TILE SPAWN =================
function addTile(){
  let empty = [];

  for(let r=0;r<4;r++){
    for(let c=0;c<4;c++){
      if(board[r][c]===0) empty.push({r,c});
    }
  }

  if(!empty.length) return;

  let spot = empty[Math.floor(Math.random()*empty.length)];
  board[spot.r][spot.c] = Math.random()<0.9 ? 2 : 4;
}

// ================= COLORS =================
function color(val){
  const map = {
    2:"#1b1b2f",
    4:"#222244",
    8:"#2d2d66",
    16:"#3a3a88",
    32:"#4c4cff",
    64:"#5a5aff",
    128:"#7070ff",
    256:"#8a8aff",
    512:"#a0a0ff",
    1024:"#c0c0ff",
    2048:"#ffffff"
  };
  return map[val] || "#1a1a2e";
}

// ================= DRAW =================
function draw(){

  const game = document.getElementById("game");
  game.innerHTML = "";

  for(let r=0;r<4;r++){
    for(let c=0;c<4;c++){

      let val = board[r][c];

      let tile = document.createElement("div");
      tile.className = "tile";
      tile.textContent = val ? val : "";

      tile.style.background = color(val);
      tile.style.color = val >= 128 ? "#000" : "#fff";

      if(val >= 512){
        tile.style.boxShadow = "0 0 12px rgba(76,108,255,0.6)";
      }

      game.appendChild(tile);
    }
  }
}

// ================= SLIDE =================
function slide(row){

  row = row.filter(x=>x!==0);

  for(let i=0;i<row.length-1;i++){
    if(row[i]===row[i+1]){
      row[i]*=2;
      row[i+1]=0;
    }
  }

  row = row.filter(x=>x!==0);

  while(row.length<4) row.push(0);

  return row;
}

// ================= MOVES =================
function moveLeft(){
  for(let r=0;r<4;r++){
    board[r] = slide(board[r]);
  }
}

function moveRight(){
  for(let r=0;r<4;r++){
    board[r] = slide(board[r].reverse()).reverse();
  }
}

function moveUp(){
  for(let c=0;c<4;c++){
    let col=[];
    for(let r=0;r<4;r++) col.push(board[r][c]);

    col = slide(col);

    for(let r=0;r<4;r++) board[r][c]=col[r];
  }
}

function moveDown(){
  for(let c=0;c<4;c++){
    let col=[];
    for(let r=0;r<4;r++) col.push(board[r][c]);

    col = slide(col.reverse()).reverse();

    for(let r=0;r<4;r++) board[r][c]=col[r];
  }
}

// ================= WIN CHECK =================
function checkWin(){
  if(won) return;

  for(let r=0;r<4;r++){
    for(let c=0;c<4;c++){
      if(board[r][c] === 2048){
        won = true;
        setTimeout(()=>{
          alert("🏆 You Win! You reached 2048!");
        },100);
        return;
      }
    }
  }
}

// ================= MOVE POSSIBLE CHECK =================
function canMove(){

  for(let r=0;r<4;r++){
    for(let c=0;c<4;c++){
      if(board[r][c] === 0) return true;
    }
  }

  for(let r=0;r<4;r++){
    for(let c=0;c<3;c++){
      if(board[r][c] === board[r][c+1]) return true;
    }
  }

  for(let r=0;r<3;r++){
    for(let c=0;c<4;c++){
      if(board[r][c] === board[r+1][c]) return true;
    }
  }

  return false;
}

// ================= LOSE CHECK =================
function checkLose(){
  if(!canMove()){
    setTimeout(()=>{
      alert("💀 Game Over! No moves left.");
    },100);
  }
}

// ================= INPUT =================
document.addEventListener("keydown",e=>{

  let before = JSON.stringify(board);

  if(e.key==="ArrowLeft") moveLeft();
  if(e.key==="ArrowRight") moveRight();
  if(e.key==="ArrowUp") moveUp();
  if(e.key==="ArrowDown") moveDown();

  if(before !== JSON.stringify(board)){
    addTile();
    draw();
    triggerFX();

    checkWin();
    checkLose();
  }
});

// ================= MERGE FX =================
function triggerFX(){
  const tiles = document.querySelectorAll(".tile");

  tiles.forEach(t=>{
    if(t.textContent !== "" && parseInt(t.textContent) >= 32){
      t.classList.add("merge");

      setTimeout(()=>{
        t.classList.remove("merge");
      },200);
    }
  });
}

// ================= RESTART =================
function restart(){
  won = false;
  init();
}

init();

</script>

</body>
</html>
