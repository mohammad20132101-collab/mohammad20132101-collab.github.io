<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Dots & Boxes</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:white;
  text-align:center;
}

/* MENU */
#menu{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f0f1a;
}

.menuBox{
  background:#141428;
  padding:30px;
  border-radius:15px;
  border:3px solid #4c6fff;
  box-shadow:0 0 25px #4c6fff55;
}

.menuBox h1{ color:#4c6fff; }

.menuBox button{
  margin:10px;
  padding:10px 20px;
  border:none;
  background:#4c6fff;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

/* GAME */
#gameArea{ display:none; }

#score{
  margin:10px;
  font-weight:bold;
}

canvas{
  background:#050814;
  border:3px solid #4c6fff;

  /* 🔥 FIX: full width, fixed height ratio */
  width:95vw;
  max-width:800px;
  height:95vw;
  max-height:800px;

  border-radius:12px;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu">
  <div class="menuBox">
    <h1>🟦🟪 Rift Dots & Boxes</h1>
    <p>Select Mode</p>
    <button onclick="startGame(1)">1 Player</button>
    <button onclick="startGame(2)">2 Player</button>
  </div>
</div>

<!-- GAME -->
<div id="gameArea">

<h1 style="color:#4c6fff">Rift Dots & Boxes</h1>
<div id="score"></div>

<canvas id="c"></canvas>

<div>
  <button onclick="reset()">Restart</button>
  <button onclick="location.reload()">Menu</button>
</div>

</div>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const GRID = 5;

/* ======================

   ====================== */

function resize(){
  const size = Math.min(window.innerWidth*0.95, 800);

  canvas.width = size;
  canvas.height = size;

  CELL = canvas.width / GRID;
}

window.addEventListener("resize", resize);
resize();

/* ======================
   START
   ====================== */

function startGame(m){
  mode = m;
  document.getElementById("menu").style.display="none";
  document.getElementById("gameArea").style.display="block";

  init();
  draw();
}

/* ======================
   INIT (clean state)
   ====================== */

function init(){

  h = Array(GRID+1).fill().map(()=>Array(GRID).fill(false));
  v = Array(GRID).fill().map(()=>Array(GRID+1).fill(false));
  b = Array(GRID).fill().map(()=>Array(GRID).fill(-1));

  turn = 0;
  blue = 0;
  purple = 0;

  update();
}

   CLICK (FIXED SNAP LOGIC)
   ====================== */

  const gy = Math.round(y);

  const dy = Math.abs(y - gy);

  if(Math.max(dx,dy) > 0.35) return;

      h[gy][gx] = true;
      scored = checkBoxes();
    }
  }

  else if(dx <= dy && gx <= GRID && gy < GRID){
    if(!v[gy][gx]){
      v[gy][gx] = true;
      scored = checkBoxes();
    }
