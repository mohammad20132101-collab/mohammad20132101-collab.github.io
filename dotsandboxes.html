<style>
@import url("https://fonts.googleapis.com/css?family=Lato:400,400i,700");

body, label, div, span {

}

}

}

}

/* PLAYER CONTROLLERS */

.player {
	position: relative;

.play-area {

}

  color:#4c6fff;

}

  margin:10px;

  width: 100px;

<body>
<!-- MENU -->
<div id="menu">
  <div class="menuBox">
    <h1>🟦 Rift Dots & Boxes</h1>
    <p>Select Mode</p>

    <button onclick="startGame(1)">1 Player</button>
    <button onclick="startGame(2)">2 Player</button>
  </div>
</div>
<h1 align=center>Rift Dots & Boxes</h1>

<div class="btn-row">
  <button onclick="reset()">Reset</button>
  <button onclick="location.reload()">Menu</button>
  <button onclick="window.location.href='index.html'">Back</button>
</div>
<br>
<div class="controls">
  <label>Grid Size
    <input type="range" min="5", max="10" value="7" id="gridSize" />
  </label>

  <div class="player">
<span class="player-num" contenteditable="true" id="p1Name" 
  onkeydown="if(event.key==='Enter')event.preventDefault(); if(this.textContent.length>=9 && event.key.length===1)event.preventDefault()">Player 1</span>
    <input type="color" value="#4c6fff" id="p1Colour" />
    <span class="score" id="p1Score">0</span>
    <div class="turn" id="turn">&#9679;</div>
  </div>

  <div class="player">
   <span class="player-num" contenteditable="true" id="p2Name" 
  onkeydown="if(event.key==='Enter')event.preventDefault(); if(this.textContent.length>=12 && event.key.length===1)event.preventDefault()">Player 2</span>
    <input type="color" value="#9b5cff" id="p2Colour" />
    <span class="score" id="p2Score">0</span>
  </div>
</div>

<div class="play-area">
  <canvas>Canvas not supported by browser</canvas>
</div>
<script>
// INIT VARS

var DOT_RADIUS = 6;
var DOT_DIAMETER = DOT_RADIUS * 2;
var DOT_SPACING = 45;
var GRID_PADDING = DOT_SPACING / 2;
var MOUSE_DISTANCE = 15;

// GLOBAL VARS

let dotArray = [];
let squaresArray = [];
let linksArray = [];
let lastLink = null;
let origin = null;
let dotCount = 0;
let colours = { p1: null, p2: null };
let turn = 'p1';
let scores = { p1: 0, p2: 0 };

// CLASSES

function Dot(x, y, radius, gx, gy) {
  this.x = x;
  this.y = y;
  this.radius = radius;
  this.gx = gx;
  this.gy = gy;

  this.draw = function() {
    c.beginPath();
    c.arc(this.x, this.y, this.radius, Math.PI * 2, false);
    c.fillStyle = '#0f0f1a';
    c.fill();
  }

  this.update = function() {
    // expand on hover
    if ((mouse.x - this.x < MOUSE_DISTANCE && mouse.x - this.x > -MOUSE_DISTANCE &&
        mouse.y - this.y < MOUSE_DISTANCE && mouse.y - this.y > -MOUSE_DISTANCE) ||
        origin === this) {
      this.radius = DOT_RADIUS * 1.5;
    } else {
      this.radius = DOT_RADIUS;
    }

    // handle click
    if (click.x < this.x + this.radius && click.x > this.x - this.radius &&
        click.y < this.y + this.radius && click.y > this.y - this.radius) {
      if (origin) {
        if (checkValidMove(this)) {
          createLink(this);
        } else {
          origin = null;
        }
      } else {
        origin = this;
      }

      click.x = undefined;
      click.y = undefined;
    }

    this.draw();
  }
}

function Link(start, end) {
	// always record links left-right or top-bottom
	if (start.gy === end.gy) { // if horizontal move
		if (start.gx < end.gx) {
			this.start = start;
			this.end = end;
		} else {
			this.start = end;
			this.end = start;
		}
	} else { // if vertical move
		if (start.gy < end.gy) {
			this.start = start;
			this.end = end;
		} else {
			this.start = end;
			this.end = start;
		}
	}

this.draw = function() {
    c.beginPath();
    c.lineWidth = 5;
    c.moveTo(this.start.x, this.start.y);
    c.lineTo(this.end.x, this.end.y);
    c.strokeStyle = (this === lastLink) ? colours[this.owner] : '#aaa';
    c.stroke();
}
}

function Square(startX, startY, endX, endY, colour) {
	this.sX = startX;
	this.sY = startY;
	this.eX = endX;
	this.eY = endY;
	this.colour = colour;

	updateScores();

	this.draw = function() {
		c.fillStyle = this.colour;
		c.fillRect(this.sX, this.sY, this.eX, this.eY);
	}
}

// LINK HANDLING

function renderActiveLink() {
  c.beginPath();
  c.lineWidth = 5;
  c.shadowBlur = 0;
  c.moveTo(origin.x, origin.y);
  c.lineTo(mouse.x, mouse.y);
  c.strokeStyle = '#aaa';
  c.stroke();
}

function checkValidMove(target) {
	// check this move hasn't already been made
	if (linksArray.find(link =>
		(origin.gx === link.start.gx && origin.gy === link.start.gy
		&& target.gx === link.end.gx && target.gy === link.end.gy) ||
		(origin.gx === link.end.gx && origin.gy === link.end.gy
		&& target.gx === link.start.gx && target.gy === link.start.gy)
	)) return false;

	// only allow moves to adjacent, non-diagonal points
	if (((origin.gx === target.gx - 1 || origin.gx === target.gx + 1) && origin.gy === target.gy) || // x-move
		  ((origin.gy === target.gy - 1 || origin.gy === target.gy + 1) && origin.gx === target.gx)) { // y-move
		return true;
	}

	return false;
}

function createLink(target) {
    var newLink = new Link(origin, target);
    newLink.owner = turn;
    linksArray.push(newLink);
    lastLink = newLink;
	
    let squareCount = squaresArray.length;
    checkForSquare(newLink);
    origin = null;

    if (squareCount === squaresArray.length) {
        // No box made → switch turns
        turn = turn === 'p1' ? 'p2' : 'p1';
        document.querySelector('#turn').classList.toggle('p2-turn');
        document.body.style.background = colours[turn];

        // AI's turn?
        if (mode === 1 && turn === "p2") {
            setTimeout(aiMove, 600);
        }
    } else {
        // Box made → check if that was the last box before continuing
        if (!checkGameOver()) {
            // Game isn't over yet → same player goes again
            if (mode === 1 && turn === "p2") {
                setTimeout(aiMove, 600);
            }
        }
    }
}

// END GAME HANDLING
function checkGameOver() {
    let totalBoxesPossible = (dotCount - 1) * (dotCount - 1);
    
    if (squaresArray.length === totalBoxesPossible) {
        let p1Name = document.getElementById('p1Name').textContent;
        let p2Name = document.getElementById('p2Name').textContent;
        
        // Slight delay so the player can actually see the final box fill up
        setTimeout(() => {
            if (scores.p1 > scores.p2) {
                alert(`🎉 Game Over! ${p1Name} wins with ${scores.p1} boxes!`);
            } else if (scores.p2 > scores.p1) {
                alert(`🎉 Game Over! ${p2Name} wins with ${scores.p2} boxes!`);
            } else {
                alert(`🤝 It's a Draw! Both players ended with ${scores.p1} boxes.`);
            }
        }, 300);
        
        return true; 
    }
    return false;
}

// SQUARE HANDLING

function checkForSquare(link) {
	// horizontal move
	if (link.start.gy === link.end.gy) {
		// check for square above
		if (link.start.gy !== 0) {
			const upperLeft = linksArray.find(l => l.start.gy === link.start.gy - 1 && l.end.gy === link.start.gy && l.start.gx === link.start.gx);
			const upperTop = linksArray.find(l => l.start.gx === link.start.gx && l.end.gx === link.end.gx && l.start.gy === link.start.gy - 1);
			const upperRight = linksArray.find(l => l.start.gy === link.start.gy - 1 && l.end.gy === link.start.gy && l.start.gx === link.end.gx);

			if (upperLeft && upperTop && upperRight) {
				squaresArray.push(new Square(upperTop.start.x, upperTop.start.y, DOT_SPACING, DOT_SPACING, colours[turn]));
			}
		}

		// check for square below
		if (link.start.gy !== dotCount - 1) {
			const lowerLeft = linksArray.find(l => l.start.gy === link.start.gy && l.end.gy === link.start.gy + 1 && l.start.gx === link.start.gx);
			const lowerBottom = linksArray.find(l => l.start.gx === link.start.gx && l.end.gx === link.end.gx && l.start.gy === link.start.gy + 1);
			const lowerRight = linksArray.find(l => l.start.gy === link.end.gy && l.end.gy === link.end.gy + 1 && l.start.gx === link.end.gx);

			if (lowerLeft && lowerBottom && lowerRight) {
				squaresArray.push(new Square(lowerLeft.start.x, lowerLeft.start.y, DOT_SPACING, DOT_SPACING, colours[turn]));
			}
		}
	}
	// vertical move
	// vertical move
else {
    // check for square to left
    if (link.start.gx !== 0) {
        const leftTop = linksArray.find(l => l.start.gx === link.start.gx - 1 && l.end.gx === link.start.gx && l.start.gy === link.start.gy);
        const leftLeft = linksArray.find(l => l.start.gy === link.start.gy && l.end.gy === link.end.gy && l.start.gx === link.start.gx - 1);
        const leftBottom = linksArray.find(l => l.start.gx === link.start.gx - 1 && l.end.gx === link.start.gx && l.start.gy === link.end.gy);

        if (leftTop && leftLeft && leftBottom) {
            squaresArray.push(new Square(leftLeft.start.x, leftLeft.start.y, DOT_SPACING, DOT_SPACING, colours[turn]));
        }
    }

    // check for square to right
    if (link.start.gx !== dotCount - 1) {
        const rightTop = linksArray.find(l => l.start.gx === link.start.gx && l.end.gx === link.start.gx + 1 && l.start.gy === link.start.gy);
        const rightRight = linksArray.find(l => l.start.gy === link.start.gy && l.end.gy === link.end.gy && l.start.gx === link.start.gx + 1);
        const rightBottom = linksArray.find(l => l.start.gx === link.start.gx && l.end.gx === link.start.gx + 1 && l.start.gy === link.end.gy);

        if (rightTop && rightRight && rightBottom) {
            squaresArray.push(new Square(rightTop.start.x, rightTop.start.y, DOT_SPACING, DOT_SPACING, colours[turn]));
        }
    }
}
}

// TRACK MOUSE

var mouse = {
  x: undefined,
  y: undefined
};

window.addEventListener('mousemove', function(e) {
  var rect = canvas.getBoundingClientRect();

  mouse.x = e.x - rect.left;
  mouse.y = e.y - rect.top;
});

// TRACK CLICKS

var click = {
  x: undefined,
  y: undefined
};

window.addEventListener('mousedown', function(e) {
  var rect = canvas.getBoundingClientRect();

  click.x = e.x - rect.left;
  click.y = e.y - rect.top;
});

// INITIALISE CANVAS

var canvas = document.querySelector('canvas');
var c = canvas.getContext('2d');
let mode = 2; // default multiplayer


function init() {
  dotCount = document.querySelector('#gridSize').value;
	colours.p1 = document.querySelector('#p1Colour').value;
	colours.p2 = document.querySelector('#p2Colour').value;

  var size = GRID_PADDING * 2 // grid padding
    + ((DOT_RADIUS * 2) * dotCount) // dot size
    + ((DOT_SPACING - DOT_DIAMETER) * (dotCount - 1)); // dot spacing

  canvas.width = size;
  canvas.height = size;

	squaresArray = [];
	linksArray = [];
	dotArray = [];
  drawDots(dotCount);

  animate();
}

function drawDots(dotCount) {
  for (var i = 0; i < dotCount; i++) {
    for (var j = 0; j < dotCount; j++) {
      dotArray.push(new Dot(
				i * DOT_SPACING + (GRID_PADDING + DOT_RADIUS),
        j * DOT_SPACING + (GRID_PADDING + DOT_RADIUS),
        DOT_RADIUS, i, j)
			);
    }
  }
}

// UPDATE CANVAS

function animate() {
  requestAnimationFrame(animate);
  c.clearRect(0, 0, innerWidth, innerHeight);

	for (var i = 0; i < squaresArray.length; i++) {
		squaresArray[i].draw();
	}

	for (var i = 0; i < linksArray.length; i++) {
		linksArray[i].draw();
	}

	if (origin) {
		renderActiveLink();
	}

	for (var i = 0; i < dotArray.length; i++) {
    dotArray[i].update();
  }

}

function changeSquareColour(e, player) {
	const oldColour = colours[`p${player}`];
	const newColour = e.target.value;

	playerSquares = squaresArray.filter(square => square.colour === oldColour);
	playerSquares.forEach(square => square.colour = newColour);

	colours[`p${player}`] = newColour;
}

function updateScores() {
	scores[turn] = scores[turn] + 1;
	document.querySelector(`#${turn}Score`).innerHTML = scores[turn];
}

// EVENT LISTENERS

document.querySelector('#gridSize').addEventListener('change', function() {
  init();
});

document.querySelector('#p1Colour').addEventListener('change', function(e) {
	changeSquareColour(e, 1);
	if (turn === 'p1') document.body.style.background = colours.p1;
});

document.querySelector('#p2Colour').addEventListener('change', function(e) {
	changeSquareColour(e, 2);
	if (turn === 'p2') document.body.style.background = colours.p2;
});
function reset() {
  // clear game state
  dotArray = [];
  squaresArray = [];
  linksArray = [];
  origin = null;

  turn = 'p1';
  scores = { p1: 0, p2: 0 };

  // reset UI scores
  document.querySelector('#p1Score').innerHTML = 0;
  document.querySelector('#p2Score').innerHTML = 0;

  // re-read settings
  dotCount = document.querySelector('#gridSize').value;
  colours.p1 = document.querySelector('#p1Colour').value;
  colours.p2 = document.querySelector('#p2Colour').value;

  // rebuild canvas
  var size =
    GRID_PADDING * 2 +
    ((DOT_RADIUS * 2) * dotCount) +
    ((DOT_SPACING - DOT_DIAMETER) * (dotCount - 1));

  canvas.width = size;
  canvas.height = size;

  drawDots(dotCount);
document.body.style.background = colours.p1;
}
function startGame(m){
  mode = m;
  document.getElementById("menu").style.display = "none";
  if (m === 1) {
  document.getElementById('p2Name').textContent = 'AI';
  document.getElementById('p2Name').contentEditable = 'false';
} else {
  document.getElementById('p2Name').textContent = 'Player 2';
  document.getElementById('p2Name').contentEditable = 'true';
}
  init();
  document.body.style.background = colours.p1;
}
function aiMove() {
  let moves = [];

  // 1. Loop through every single potential link on the grid
  for (let y = 0; y < dotCount; y++) {
    for (let x = 0; x < dotCount; x++) {
      let startDot = dotArray.find(d => d.gx === x && d.gy === y);
      if (!startDot) continue;

      // Only check Right and Down movements to prevent duplicating link evaluations
      let directions = [{ dx: 1, dy: 0 }, { dx: 0, dy: 1 }];

      for (let d of directions) {
        let nx = x + d.dx;
        let ny = y + d.dy;

        let endDot = dotArray.find(p => p.gx === nx && p.gy === ny);
        if (!endDot) continue;

        origin = startDot;

        // Verify the line hasn't been drawn yet and is valid
        if (checkValidMove(endDot)) {
          let score = 0;

          // Look at the two potential boxes sharing this specific link line
          let boxStats = getBoxesAffected(startDot, endDot);
          
          let boxesCompleted = 0;
          let createsThirdLine = false;

          for (let linesCount of boxStats) {
            if (linesCount === 3) {
              boxesCompleted++; 
            } else if (linesCount === 2) {
              createsThirdLine = true; // Giving a 3rd line means opponent captures next turn
            }
          }

          // ==========================================
          // 🔥 STRATEGY WEIGHTS (The Brain Logic)
          // ==========================================
          if (boxesCompleted > 0) {
            // Priority 1: Capture box! Huge bonus if it completes a double box setup (2000)
            score += boxesCompleted * 1000; 
          } else if (createsThirdLine) {
            // Priority 3: Severe penalty for setting up a free box for the opponent
            score -= 500; 
          } else {
            // Priority 2: Safe opening move. Prefer central territories early on
            let center = dotCount / 2;
            let distanceToCenter = Math.abs(x - center) + Math.abs(y - center);
            score += (dotCount - distanceToCenter) * 2;
          }

          // Add a tiny random fraction so the AI remains unpredictable across matching scores
          score += Math.random() * 5;

          moves.push({ from: startDot, to: endDot, score: score });
        }
        origin = null;
      }
    }
  }

  if (moves.length === 0) return;

  // Execute highest scoring move
  moves.sort((a, b) => b.score - a.score);
  let choice = moves[0];

  origin = choice.from;
  createLink(choice.to);
}

/**
 * Counts how many existing boundary lines are inside the boxes adjacent to a target link line
 */
function getBoxesAffected(p1, p2) {
  let boxLineCounts = [];

  // Helper to check if a specific structural line exists in our master link array
  let hasLine = (gx1, gy1, gx2, gy2) => {
    return linksArray.some(l => 
      (l.start.gx === gx1 && l.start.gy === gy1 && l.end.gx === gx2 && l.end.gy === gy2) ||
      (l.start.gx === gx2 && l.start.gy === gy2 && l.end.gx === gx1 && l.end.gy === gy1)
    );
  };

  if (p1.gy === p2.gy) { // Evaluating Horizontal Link Line
    let leftX = Math.min(p1.gx, p2.gx);
    let y = p1.gy;

    // Check box above link line
    if (y > 0) {
      let lines = 0;
      if (hasLine(leftX, y, leftX, y - 1)) lines++;       // Left post
      if (hasLine(leftX + 1, y, leftX + 1, y - 1)) lines++; // Right post
      if (hasLine(leftX, y - 1, leftX + 1, y - 1)) lines++; // Top line
      boxLineCounts.push(lines);
    }
    // Check box below link line
    if (y < dotCount - 1) {
      let lines = 0;
      if (hasLine(leftX, y, leftX, y + 1)) lines++;       // Left post
      if (hasLine(leftX + 1, y, leftX + 1, y + 1)) lines++; // Right post
      if (hasLine(leftX, y + 1, leftX + 1, y + 1)) lines++; // Bottom line
      boxLineCounts.push(lines);
    }
  } else { // Evaluating Vertical Link Line
    let topY = Math.min(p1.gy, p2.gy);
    let x = p1.gx;

    // Check box to the left of link line
    if (x > 0) {
      let lines = 0;
      if (hasLine(x, topY, x - 1, topY)) lines++;       // Top line
      if (hasLine(x, topY + 1, x - 1, topY + 1)) lines++; // Bottom line
      if (hasLine(x - 1, topY, x - 1, topY + 1)) lines++; // Far left line
      boxLineCounts.push(lines);
    }
    // Check box to the right of link line
    if (x < dotCount - 1) {
      let lines = 0;
      if (hasLine(x, topY, x + 1, topY)) lines++;       // Top line
      if (hasLine(x, topY + 1, x + 1, topY + 1)) lines++; // Bottom line
      if (hasLine(x + 1, topY, x + 1, topY + 1)) lines++; // Far right line
      boxLineCounts.push(lines);
    }
  }

  return boxLineCounts;
}
</script>
