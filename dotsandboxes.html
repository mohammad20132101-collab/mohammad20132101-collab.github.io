<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Dots & Boxes</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#0f0f1a;
  color:white;
  text-align:center;
}

/* MENU */
#menu{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0f0f1a;
}

.menuBox{
  background:#141428;
  padding:30px;
  border-radius:15px;
  border:3px solid #4c6fff;
  box-shadow:0 0 25px #4c6fff55;
}

.menuBox h1{
  color:#4c6fff;
}

.menuBox button{
  margin:10px;
  padding:10px 20px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#4c6fff;
  color:white;
}

/* GAME AREA */
#gameArea{ display:none; }

header{
  background:#1a1a2e;
  padding:15px;
  border-bottom:2px solid #4c6fff;
}

/* SCORE */
#score{
  margin:10px;
  font-weight:bold;
}

/* =========================
   🔥 SOLID GRID ENGINE
   ========================= */

#game{
  display:grid;
  justify-content:center;
  margin:20px auto;

  /* FIXED BOARD SIZE */
  grid-template-columns:repeat(7, 60px);
  grid-template-rows:repeat(7, 60px);

  gap:0;
}

/* EVERY CELL IS EXACT UNIT */
.cell{
  width:60px;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  box-sizing:border-box;
}

/* DOTS */
.dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:white;
  box-shadow:0 0 10px white;
  margin:auto;
}

/* HORIZONTAL LINE */
.hLine{
  height:6px;
  width:60px;
  background:#2a2a40;
  cursor:pointer;
  transition:0.15s;
}

.hLine:hover{
  background:#4c6fff;
  box-shadow:0 0 10px #4c6fff;
}

/* VERTICAL LINE */
.vLine{
  width:6px;
  height:60px;
  background:#2a2a40;
  cursor:pointer;
  transition:0.15s;
}

.vLine:hover{
  background:#4c6fff;
  box-shadow:0 0 10px #4c6fff;
}

/* BOX */
.box{
  background:transparent;
  font-weight:bold;
  font-size:20px;
}

.box.blue{
  background:rgba(76,108,255,0.25);
  box-shadow:0 0 15px rgba(76,108,255,0.4);
  color:#4c6fff;
}

.box.purple{
  background:rgba(160,70,255,0.25);
  box-shadow:0 0 15px rgba(160,70,255,0.4);
  color:#a046ff;
}

/* BUTTONS */
button{
  margin:5px;
  padding:8px 15px;
  border:none;
  background:#4c6fff;
  color:white;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu">
  <div class="menuBox">
    <h1>🟦🟪 Rift Dots & Boxes</h1>
    <p>Select Mode</p>
    <button onclick="startGame(1)">1 Player</button>
    <button onclick="startGame(2)">2 Player</button>
  </div>
</div>

<!-- GAME -->
<div id="gameArea">

<header>
  <h1>Rift Dots & Boxes</h1>
</header>

<div id="score"></div>

<div id="game"></div>

<button onclick="reset()">Restart</button>
 <button onclick="window.location.href='index.html'">Back</button>
<button onclick="location.reload()">Menu</button>

</div>

<script>

let mode = 2;
let current = "blue";
let blue = 0;
let purple = 0;

const size = 3; // 3x3 boxes

function startGame(m){
  mode = m;
  document.getElementById("menu").style.display="none";
  document.getElementById("gameArea").style.display="block";
  build();
}

/* =========================
   BUILD SOLID GRID
   ========================= */

function build(){

  const g = document.getElementById("game");
  g.innerHTML="";

  current="blue";
  blue=0;
  purple=0;

  update();

  // 7x7 for 3x3 boxes:
  // D L D L D L D
  // L B L B L B L
  // D L D L D L D
  // ...

  for(let y=0;y<7;y++){
    for(let x=0;x<7;x++){

      const cell=document.createElement("div");
      cell.classList.add("cell");

      const isDot = x%2===0 && y%2===0;
      const isBox = x%2===1 && y%2===1;
      const isH = y%2===0 && x%2===1;
      const isV = x%2===1 && y%2===0;

      if(isDot){
        const d=document.createElement("div");
        d.className="dot";
        cell.appendChild(d);
      }

      if(isH){
        cell.classList.add("hLine");
        cell.onclick=()=>claim(cell);
      }

      if(isV){
        cell.classList.add("vLine");
        cell.onclick=()=>claim(cell);
      }

      if(isBox){
        cell.classList.add("box");
        cell.dataset.x=x;
        cell.dataset.y=y;
      }

      g.appendChild(cell);
    }
  }
}

/* =========================
   CLAIM LINE
   ========================= */

function claim(el){
  if(el.classList.contains("claimed")) return;

  el.classList.add("claimed");
  el.style.background = current==="blue" ? "#4c6fff" : "#a046ff";

  checkBoxes();

  current = current==="blue" ? "purple" : "blue";
  update();
}

/* =========================
   BOX CHECK (clean)
   ========================= */

function checkBoxes(){

  const boxes = document.querySelectorAll(".box");

  boxes.forEach(b=>{

    if(b.classList.contains("done")) return;

    const x = parseInt(b.dataset.x);
    const y = parseInt(b.dataset.y);

    const top = document.querySelector(`[style*="grid-area"]`);
    const cells = document.querySelectorAll(".cell");

    const index = Array.from(cells).indexOf(b);

    const gridX = x;
    const gridY = y;

    const get = (dx,dy)=>{
      return document.querySelector(
        `.cell:nth-child(${(y+dy)*7 + (x+dx) + 1})`
      );
    };

    const up = cells[index-7];
    const down = cells[index+7];
    const left = cells[index-1];
    const right = cells[index+1];

    if(up?.classList.contains("claimed") &&
       down?.classList.contains("claimed") &&
       left?.classList.contains("claimed") &&
       right?.classList.contains("claimed")){

      b.classList.add("done");

      if(current==="blue"){
        b.classList.add("blue");
        b.textContent="B";
        blue++;
      }else{
        b.classList.add("purple");
        b.textContent="P";
        purple++;
      }
    }
  });
}

/* =========================
   SCORE
   ========================= */

function update(){
  document.getElementById("score").textContent =
  `Blue: ${blue} | Purple: ${purple} | Turn: ${current.toUpperCase()}`;
}

/* =========================
   RESET
   ========================= */

function reset(){
  build();
}

</script>

</body>
</html>
