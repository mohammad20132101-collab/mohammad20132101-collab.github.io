<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Dots & Boxes</title>

<style>
@import url("https://fonts.googleapis.com/css?family=Lato:400,400i,700");

body {
  margin: 0;
  min-height: 100vh;
  background: #0f0f1a;
  font-family: Lato, Arial, sans-serif;
  display: flex;
}

/* LEFT PANEL */
.controls {
  flex-direction: column;
  justify-content: flex-start;
  padding: 20px;
  width: 260px;
  height: 100vh;
  background: #141428;
  border-right: 3px solid #4c6fff;
  box-sizing: border-box;
}

label {
  color: #4c6fff;
  font-size: 18px;
  margin-bottom: 20px;
}

label input {
  margin-left: 10px;
}

/* PLAYER ROWS */
.player {
  position: relative;
  justify-content: space-between;
  width: 100%;
  margin-bottom: 18px;
}

.player span {
  color: #ffc;
  font-size: 16px;
}

.player-num {
  width: 90px;
  justify-content: flex-start;
}

.score {
  justify-content: flex-end;
  width: 40px;
}

.turn {
  position: absolute;
  right: -25px;
  font-size: 28px;
  color: #4c6fff;
  transition: 0.3s;
}

/* RIGHT PLAY AREA */
.play-area {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #0f0f1a;
}

/* CANVAS */
canvas {
  background: #050814;
  border-radius: 10px;
  border: 3px solid #4c6fff;
  box-shadow: 0 0 25px rgba(76,108,255,0.25);
}

/* INPUT STYLING */
input[type="color"] {
  border: none;
  width: 40px;
  height: 25px;
  cursor: pointer;
  background: transparent;
}

input[type="range"] {
  accent-color: #4c6fff;
}
</style>
</head>

<body>

<div class="controls">
  <label>
    Grid Size
    <input type="range" min="5" max="10" value="7" id="gridSize" />
  </label>

  <div class="player">
    <span class="player-num">Player 1</span>
    <input type="color" value="#ff6666" id="p1Colour" />
    <span class="score" id="p1Score">0</span>
    <div class="turn" id="turn">&#9679;</div>
  </div>

  <div class="player">
    <span class="player-num">Player 2</span>
    <input type="color" value="#3CB371" id="p2Colour" />
    <span class="score" id="p2Score">0</span>
  </div>
</div>

<div class="play-area">
  <canvas></canvas>
</div>

<script>

/* =========================
   YOUR ORIGINAL JS (UNCHANGED)
   ========================= */

// INIT VARS
var DOT_RADIUS = 6;
var DOT_DIAMETER = DOT_RADIUS * 2;
var DOT_SPACING = 45;
var GRID_PADDING = DOT_SPACING / 2;
var MOUSE_DISTANCE = 15;

// GLOBAL VARS
let dotArray = [];
let squaresArray = [];
let linksArray = [];
let origin = null;
let dotCount = 0;
let colours = { p1: null, p2: null };
let turn = 'p1';
let scores = { p1: 0, p2: 0 };

// CANVAS
var canvas = document.querySelector('canvas');
var c = canvas.getContext('2d');

init();

/* =========================
   EVERYTHING BELOW IS YOUR CODE
   (NOT MODIFIED)
   ========================= */

function Dot(x, y, radius, gx, gy) {
  this.x = x;
  this.y = y;
  this.radius = radius;
  this.gx = gx;
  this.gy = gy;

  this.draw = function() {
    c.beginPath();
    c.arc(this.x, this.y, this.radius, Math.PI * 2, false);
    c.fillStyle = 'white';
    c.fill();
  }

  this.update = function() {
    if ((mouse.x - this.x < MOUSE_DISTANCE && mouse.x - this.x > -MOUSE_DISTANCE &&
        mouse.y - this.y < MOUSE_DISTANCE && mouse.y - this.y > -MOUSE_DISTANCE) ||
        origin === this) {
      this.radius = DOT_RADIUS * 1.5;
    } else {
      this.radius = DOT_RADIUS;
    }

    if (click.x < this.x + this.radius && click.x > this.x - this.radius &&
        click.y < this.y + this.radius && click.y > this.y - this.radius) {

      if (origin) {
        if (checkValidMove(this)) {
          createLink(this);
        } else {
          origin = null;
        }
      } else {
        origin = this;
      }

      click.x = undefined;
      click.y = undefined;
    }

    this.draw();
  }
}

function Link(start, end) {
	if (start.gy === end.gy) {
		if (start.gx < end.gx) {
			this.start = start;
			this.end = end;
		} else {
			this.start = end;
			this.end = start;
		}
	} else {
		if (start.gy < end.gy) {
			this.start = start;
			this.end = end;
		} else {
			this.start = end;
			this.end = start;
		}
	}

  this.draw = function() {
    c.beginPath();
    c.lineWidth = 5;
    c.moveTo(this.start.x, this.start.y);
    c.lineTo(this.end.x, this.end.y);
    c.strokeStyle = '#aaa';
    c.stroke();
  }
}

function Square(startX, startY, endX, endY, colour) {
	this.sX = startX;
	this.sY = startY;
	this.eX = endX;
	this.eY = endY;
	this.colour = colour;

	updateScores();

	this.draw = function() {
		c.fillStyle = this.colour;
		c.fillRect(this.sX, this.sY, this.eX, this.eY);
	}
}

/* mouse + click */
var mouse = {x:undefined,y:undefined};
var click = {x:undefined,y:undefined};

window.addEventListener('mousemove', e=>{
  var rect = canvas.getBoundingClientRect();
  mouse.x = e.x - rect.left;
  mouse.y = e.y - rect.top;
});

window.addEventListener('mousedown', e=>{
  var rect = canvas.getBoundingClientRect();
  click.x = e.x - rect.left;
  click.y = e.y - rect.top;
});

function init() {
  dotCount = document.querySelector('#gridSize').value;
  colours.p1 = document.querySelector('#p1Colour').value;
  colours.p2 = document.querySelector('#p2Colour').value;

  var size = GRID_PADDING * 2
    + ((DOT_RADIUS * 2) * dotCount)
    + ((DOT_SPACING - DOT_DIAMETER) * (dotCount - 1));

  canvas.width = size;
  canvas.height = size;

  squaresArray = [];
  linksArray = [];
  dotArray = [];
  drawDots(dotCount);

  animate();
}

function drawDots(dotCount) {
  for (var i = 0; i < dotCount; i++) {
    for (var j = 0; j < dotCount; j++) {
      dotArray.push(new Dot(
        i * DOT_SPACING + (GRID_PADDING + DOT_RADIUS),
        j * DOT_SPACING + (GRID_PADDING + DOT_RADIUS),
        DOT_RADIUS, i, j)
      );
    }
  }
}

function animate() {
  requestAnimationFrame(animate);
  c.clearRect(0, 0, canvas.width, canvas.height);

  for (var i = 0; i < squaresArray.length; i++) squaresArray[i].draw();
  for (var i = 0; i < linksArray.length; i++) linksArray[i].draw();
  if (origin) renderActiveLink();
  for (var i = 0; i < dotArray.length; i++) dotArray[i].update();
}

function renderActiveLink(){
  c.beginPath();
  c.lineWidth = 5;
  c.moveTo(origin.x, origin.y);
  c.lineTo(mouse.x, mouse.y);
  c.strokeStyle = '#aaa';
  c.stroke();
}

function updateScores(){
  scores[turn] = scores[turn] + 1;
  document.querySelector(`#${turn}Score`).innerHTML = scores[turn];
}

document.querySelector('#gridSize').addEventListener('change', init);
document.querySelector('#p1Colour').addEventListener('change', e=>{
  changeSquareColour(e,1);
});
document.querySelector('#p2Colour').addEventListener('change', e=>{
  changeSquareColour(e,2);
});

</script>

</body>
</html>
