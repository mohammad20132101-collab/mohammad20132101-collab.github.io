<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Dots & Boxes</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* HEADER */
header{
  width:100%;
  text-align:center;
  padding:15px;
  background:#1a1a2e;
  border-bottom:2px solid #4c6fff;
}

/* MENU */
#menu{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f0f1a;
}

.menuBox{
  background:#141428;
  padding:30px;
  border-radius:15px;
  border:3px solid #4c6fff;
  box-shadow:0 0 25px #4c6fff55;
  text-align:center;
}

.menuBox h1{
  color:#4c6fff;
}

.menuBox button{
  margin:10px;
  padding:10px 20px;
  border:none;
  background:#4c6fff;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

/* GAME */
#gameArea{ display:none; }

#score{
  font-size:18px;
  margin:10px;
}

/* CANVAS STYLE BOARD */
canvas{
  background:#050814;
  border:3px solid #4c6fff;
  border-radius:12px;
  margin-top:10px;
}

/* BUTTONS */
button{
  margin:5px;
  padding:10px 15px;
  border:none;
  background:#4c6fff;
  color:white;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu">
  <div class="menuBox">
    <h1>🟦🟪 Rift Dots & Boxes</h1>
    <p>Select Mode</p>
    <button onclick="startGame(1)">1 Player</button>
    <button onclick="startGame(2)">2 Player</button>
  </div>
</div>

<!-- GAME -->
<div id="gameArea">

<header>
  <h1>Rift Dots & Boxes</h1>
</header>

<div id="score">Blue: 0 | Purple: 0 | Turn: Blue</div>

<canvas id="board" width="420" height="420"></canvas>

<div>
  <button onclick="reset()">Restart</button>
  <button onclick="location.reload()">Menu</button>
</div>

</div>

<script>

/* =========================
   GRID ENGINE (Snake-style)
   ========================= */

const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");

const GRID = 7;          // FIXED GRID SIZE
const CELL = 60;

let mode = 2;
let current = 0; // 0 blue, 1 purple
let blue = 0;
let purple = 0;

let h = []; // horizontal lines
let v = []; // vertical lines
let box = [];

function startGame(m){
  mode = m;
  document.getElementById("menu").style.display="none";
  document.getElementById("gameArea").style.display="block";

  init();
  draw();
}

/* =========================
   INIT GRID (fixed system)
   ========================= */

function init(){

  h = Array(GRID).fill().map(()=>Array(GRID).fill(false));
  v = Array(GRID).fill().map(()=>Array(GRID).fill(false));
  box = Array(GRID).fill().map(()=>Array(GRID).fill(-1));

  current = 0;
  blue = 0;
  purple = 0;

  updateScore();
}

/* =========================
   INPUT (CLICK GRID)
   ========================= */

canvas.addEventListener("click", e=>{

  const rect = canvas.getBoundingClientRect();

  const x = Math.floor((e.clientX - rect.left) / CELL);
  const y = Math.floor((e.clientY - rect.top) / CELL);

  // detect closest line type
  handleClick(x,y);

});

/* =========================
   GAME LOGIC
   ========================= */

function handleClick(x,y){

  if(x<0||y<0||x>=GRID||y>=GRID) return;

  let scored = false;

  // horizontal line (top edge of cell)
  if(y < GRID-1 && !h[y][x]){
    h[y][x] = true;
    scored = checkBoxes();
  }

  // vertical line
  else if(x < GRID-1 && !v[y][x]){
    v[y][x] = true;
    scored = checkBoxes();
  }

  if(!scored){
    current = 1 - current;
  }

  if(mode===1 && current===1){
    setTimeout(aiMove,200);
  }

  updateScore();
  draw();
}

/* =========================
   AI (basic random)
   ========================= */

function aiMove(){

  let moves=[];

  for(let y=0;y<GRID;y++){
    for(let x=0;x<GRID;x++){
      if(y<GRID-1 && !h[y][x]) moves.push(["h",x,y]);
      if(x<GRID-1 && !v[y][x]) moves.push(["v",x,y]);
    }
  }

  if(moves.length===0) return;

  let m = moves[Math.floor(Math.random()*moves.length)];

  if(m[0]==="h") h[m[2]][m[1]]=true;
  else v[m[2]][m[1]]=true;

  checkBoxes();

  current=0;
  updateScore();
  draw();
}

/* =========================
   BOX CHECK
   ========================= */

function checkBoxes(){

  let scored=false;

  for(let y=0;y<GRID-1;y++){
    for(let x=0;x<GRID-1;x++){

      if(box[y][x]!==-1) continue;

      if(h[y][x] && h[y+1][x] && v[y][x] && v[y][x+1]){

        box[y][x] = current;

        if(current===0) blue++;
        else purple++;

        scored=true;
      }
    }
  }

  return scored;
}

/* =========================
   DRAW (CLEAN GRID ENGINE)
   ========================= */

function draw(){

  ctx.fillStyle="#050814";
  ctx.fillRect(0,0,420,420);

  // GRID DOTS
  for(let y=0;y<GRID;y++){
    for(let x=0;x<GRID;x++){

      ctx.fillStyle="white";
      ctx.beginPath();
      ctx.arc(x*CELL,y*CELL,4,0,Math.PI*2);
      ctx.fill();
    }
  }

  // H LINES
  for(let y=0;y<GRID;y++){
    for(let x=0;x<GRID;x++){

      if(h[y][x]){
        ctx.strokeStyle="#4c6fff";
        ctx.beginPath();
        ctx.moveTo(x*CELL,y*CELL);
        ctx.lineTo((x+1)*CELL,y*CELL);
        ctx.stroke();
      }
    }
  }

  // V LINES
  for(let y=0;y<GRID;y++){
    for(let x=0;x<GRID;x++){

      if(v[y][x]){
        ctx.strokeStyle="#a046ff";
        ctx.beginPath();
        ctx.moveTo(x*CELL,y*CELL);
        ctx.lineTo(x*CELL,(y+1)*CELL);
        ctx.stroke();
      }
    }
  }

  // BOXES
  for(let y=0;y<GRID-1;y++){
    for(let x=0;x<GRID-1;x++){

      if(box[y][x]===0){
        ctx.fillStyle="rgba(76,108,255,0.25)";
        ctx.fillRect(x*CELL,y*CELL,CELL,CELL);
      }

      if(box[y][x]===1){
        ctx.fillStyle="rgba(160,70,255,0.25)";
        ctx.fillRect(x*CELL,y*CELL,CELL,CELL);
      }
    }
  }
}

/* =========================
   SCORE
   ========================= */

function updateScore(){
  document.getElementById("score").textContent =
  `Blue: ${blue} | Purple: ${purple} | Turn: ${current===0?"Blue":"Purple"}`;
}

/* =========================
   RESET
   ========================= */

function reset(){
  init();
  draw();
}

</script>

</body>
</html>
