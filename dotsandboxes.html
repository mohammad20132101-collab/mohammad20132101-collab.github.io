<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Dots & Boxes</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:white;
  text-align:center;
}

/* MENU */
#menu{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f0f1a;
}

.menuBox{
  background:#141428;
  padding:30px;
  border-radius:15px;
  border:3px solid #4c6fff;
}

.menuBox h1{ color:#4c6fff; }

.menuBox button{
  margin:10px;
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:#4c6fff;
  color:white;
}

/* GAME */
#gameArea{ display:none; }

h1{ color:#4c6fff; }

#score{ margin:10px; }

/* CANVAS */
canvas{
  background:#050814;
  border:3px solid #4c6fff;
  border-radius:12px;
  width:95vw;
  height:95vw;
  max-width:650px;
  max-height:650px;
}
</style>
</head>

<body>

<div id="menu">
  <div class="menuBox">
    <h1>🟦🟪 Rift Dots & Boxes</h1>
    <button onclick="startGame(1)">1 Player</button>
    <button onclick="startGame(2)">2 Player</button>
  </div>
</div>

<div id="gameArea">

<h1>Rift Dots & Boxes</h1>
<div id="score"></div>

<canvas id="c"></canvas>

<div>
  <button onclick="reset()">Restart</button>
  <button onclick="location.reload()">Menu</button>
</div>

</div>

<script>

const c = document.getElementById("c");
const ctx = c.getContext("2d");

const GRID = 5;

let size, pad, cell;

let mode = 2;
let turn = 0; // 0 blue, 1 purple
let blue = 0;
let purple = 0;

let h, v, b;

/* ---------------- RESIZE ---------------- */

function resize(){
  size = Math.min(window.innerWidth*0.9, 650);
  c.width = size;
  c.height = size;

  pad = size * 0.12;
  cell = (size - pad*2) / GRID;
}
window.addEventListener("resize", resize);
resize();

/* ---------------- START ---------------- */

function startGame(m){
  mode = m;
  document.getElementById("menu").style.display="none";
  document.getElementById("gameArea").style.display="block";

  init();
  draw();
}

/* ---------------- INIT ---------------- */

function init(){
  h = Array(GRID+1).fill().map(()=>Array(GRID).fill(false));
  v = Array(GRID).fill().map(()=>Array(GRID+1).fill(false));
  b = Array(GRID).fill().map(()=>Array(GRID).fill(-1));

  turn = 0;
  blue = 0;
  purple = 0;

  update();
}

/* ---------------- CLICK FIX (REAL SNAP SYSTEM) ---------------- */

c.addEventListener("click", e=>{

  const rect = c.getBoundingClientRect();

  let x = (e.clientX - rect.left - pad) / cell;
  let y = (e.clientY - rect.top - pad) / cell;

  let gx = Math.round(x);
  let gy = Math.round(y);

  let dx = Math.abs(x - gx);
  let dy = Math.abs(y - gy);

  // must be close to a grid line
  if(Math.max(dx,dy) > 0.4) return;

  let moved = false;

  /* PRIORITY FIX:
     choose closest valid edge, not guess */

  if(dy < dx){
    if(gy >= 0 && gy <= GRID && gx < GRID && !h[gy][gx]){
      h[gy][gx] = true;
      moved = true;
    }
  } else {
    if(gx >= 0 && gx <= GRID && gy < GRID && !v[gy][gx]){
      v[gy][gx] = true;
      moved = true;
    }
  }

  if(moved){
    handleMove();
  }
});

/* ---------------- MOVE FLOW (ONLY PLACE WHERE TURN CHANGES) ---------------- */

function handleMove(){

  let scored = checkBoxes();

  if(!scored){
    turn = 1 - turn;
  }

  update();
  draw();

  if(mode===1 && turn===1){
    setTimeout(ai,150);
  }
}

/* ---------------- AI (NO TURN BUGS) ---------------- */

function ai(){

  let moves=[];

  for(let y=0;y<=GRID;y++){
    for(let x=0;x<GRID;x++){
      if(!h[y][x]) moves.push(["h",x,y]);
    }
  }

  for(let y=0;y<GRID;y++){
    for(let x=0;x<=GRID;x++){
      if(!v[y][x]) moves.push(["v",x,y]);
    }
  }

  let m = moves[Math.floor(Math.random()*moves.length)];

  if(m[0]==="h") h[m[2]][m[1]]=true;
  else v[m[2]][m[1]]=true;

  handleMove(); // IMPORTANT: same pipeline, no extra turn flips
}

/* ---------------- BOX CHECK ---------------- */

function checkBoxes(){

  let scored=false;

  for(let y=0;y<GRID;y++){
    for(let x=0;x<GRID;x++){

      if(b[y][x]!==-1) continue;

      if(
        h[y][x] &&
        h[y+1][x] &&
        v[y][x] &&
        v[y][x+1]
      ){
        b[y][x]=turn;

        if(turn===0) blue++;
        else purple++;

        scored=true;
      }
    }
  }

  return scored;
}

/* ---------------- DRAW ---------------- */

function draw(){

  ctx.fillStyle="#050814";
  ctx.fillRect(0,0,size,size);

  /* faint grid */
  ctx.strokeStyle="rgba(255,255,255,0.05)";
  for(let i=0;i<=GRID;i++){
    ctx.beginPath();
    ctx.moveTo(pad + i*cell, pad);
    ctx.lineTo(pad + i*cell, size-pad);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(pad, pad + i*cell);
    ctx.lineTo(size-pad, pad + i*cell);
    ctx.stroke();
  }

  /* dots */
  for(let y=0;y<=GRID;y++){
    for(let x=0;x<=GRID;x++){
      ctx.fillStyle="white";
      ctx.beginPath();
      ctx.arc(pad + x*cell, pad + y*cell, 3.5,0,Math.PI*2);
      ctx.fill();
    }
  }

  /* h lines */
  for(let y=0;y<=GRID;y++){
    for(let x=0;x<GRID;x++){
      if(h[y][x]){
        ctx.strokeStyle="#4c6fff";
        ctx.lineWidth=3;
        ctx.beginPath();
        ctx.moveTo(pad + x*cell, pad + y*cell);
        ctx.lineTo(pad + (x+1)*cell, pad + y*cell);
        ctx.stroke();
      }
    }
  }

  /* v lines */
  for(let y=0;y<GRID;y++){
    for(let x=0;x<=GRID;x++){
      if(v[y][x]){
        ctx.strokeStyle="#a046ff";
        ctx.lineWidth=3;
        ctx.beginPath();
        ctx.moveTo(pad + x*cell, pad + y*cell);
        ctx.lineTo(pad + x*cell, pad + (y+1)*cell);
        ctx.stroke();
      }
    }
  }

  /* boxes */
  for(let y=0;y<GRID;y++){
    for(let x=0;x<GRID;x++){

      if(b[y][x]===0){
        ctx.fillStyle="rgba(76,108,255,0.25)";
        ctx.fillRect(pad + x*cell, pad + y*cell, cell, cell);
      }

      if(b[y][x]===1){
        ctx.fillStyle="rgba(160,70,255,0.25)";
        ctx.fillRect(pad + x*cell, pad + y*cell, cell, cell);
      }
    }
  }
}

/* ---------------- UI ---------------- */

function update(){
  document.getElementById("score").textContent =
  `Blue: ${blue} | Purple: ${purple} | Turn: ${turn===0?"Blue":"Purple"}`;
}

function reset(){
  init();
  draw();
}

</script>

</body>
</html>
