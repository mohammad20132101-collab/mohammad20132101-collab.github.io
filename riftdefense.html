<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Defence</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f1a;
  color: white;
  text-align: center;
}

header {
  background: #1a1a2e;
  padding: 10px;
}

canvas {
  background: #111122;
  display: block;
  margin: 10px auto;
  border: 2px solid #6C5CE7;
}

/* TOP BUTTON BAR (ALL TOGETHER) */
#uiBar {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 10px;
  flex-wrap: wrap;
}

button {
  background: #6C5CE7;
  border: none;
  padding: 10px 14px;
  color: white;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
}

button:hover {
  background: #00D2FF;
}

/* SHOP */
#shop {
  display: none;
  background: #1a1a2e;
  padding: 15px;
  width: 320px;
  margin: auto;
  border-radius: 10px;
}
</style>
</head>

<body>

<header>
<h1>🌀 Rift Defence</h1>
<p>Clean rebuild • Stable gameplay • Real rules</p>
</header>

<div id="uiBar">
  <button onclick="goBack()">⬅ Rift Hub</button>
  <button onclick="startGame()">Start</button>
  <button onclick="toggleShop()">Upgrades</button>
</div>

<p>
💰 Coins: <span id="coins">0</span> |
🌊 Wave: <span id="wave">1</span> |
💥 Damage: <span id="damage">1</span> |
❤️ Base Damage: <span id="base">0</span>
</p>

<canvas id="game" width="800" height="400"></canvas>

<div id="shop">
  <h2>🛒 Upgrades</h2>
  <button onclick="buyDamage()">+ Damage (10 coins)</button>
  <button onclick="buyFireRate()">+ Fire Rate (15 coins)</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// STATE
let coins = 0;
let wave = 1;
let damage = 1;

let baseDamage = 0;

let turretY = 200;

let enemies = [];
let bullets = [];

let running = false;
let lastTime = 0;

// timers
let enemyTimer = 0;
let shootTimer = 0;
let waveTimer = 0;

let fireRate = 400;

// GRID
function drawGrid() {
  ctx.strokeStyle = "#1f1f3a";

  for (let x = 0; x < 800; x += 20) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, 400);
    ctx.stroke();
  }

  for (let y = 0; y < 400; y += 20) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(800, y);
    ctx.stroke();
  }
}

// TURRET
function drawTurret() {
  ctx.fillStyle = "#6C5CE7";
  ctx.fillRect(40, turretY - 20, 35, 40);
}

// ENEMY
function spawnEnemy() {
  enemies.push({
    x: 800,
    y: Math.floor(Math.random() * 20) * 20,
    hp: 3 + wave,
    size: 20
  });
}

// SHOOT
function shoot() {
  bullets.push({
    x: 80,
    y: turretY
  });
}

// BACK
function goBack() {
  window.location.href = "rifthub.html";
}

// SHOP
function toggleShop() {
  const shop = document.getElementById("shop");
  shop.style.display = shop.style.display === "block" ? "none" : "block";
}

function buyDamage() {
  if (coins >= 10) {
    coins -= 10;
    damage++;
  }
}

function buyFireRate() {
  if (coins >= 15 && fireRate > 120) {
    coins -= 15;
    fireRate -= 40;
  }
}

// START
function startGame() {
  if (!running) {
    running = true;
    lastTime = performance.now();
    loop(lastTime);
  }
}

// COLLISION FIXED (CENTER-BASED)
function hit(b, e) {
  let bx = b.x;
  let by = b.y;

  return (
    bx > e.x &&
    bx < e.x + e.size &&
    by > e.y &&
    by < e.y + e.size
  );
}

// MAIN LOOP
function loop(timestamp) {
  if (!running) return;

  let delta = timestamp - lastTime;
  lastTime = timestamp;

  ctx.clearRect(0, 0, 800, 400);
  drawGrid();
  drawTurret();

  // ENEMY SPAWN
  enemyTimer += delta;
  if (enemyTimer > 900) {
    spawnEnemy();
    enemyTimer = 0;
  }

  // SHOOT
  shootTimer += delta;
  if (shootTimer > fireRate) {
    shoot();
    shootTimer = 0;
  }

  // WAVE SYSTEM + REWARD
  waveTimer += delta;
  if (waveTimer > 8000) {
    wave++;
    coins += 10;
    waveTimer = 0;
  }

  // ENEMIES
  ctx.fillStyle = "#FF2E88";

  for (let i = enemies.length - 1; i >= 0; i--) {
    let e = enemies[i];

    e.x -= 2 + wave * 0.15;

    ctx.fillRect(e.x, e.y, e.size, e.size);

    // 💥 END DAMAGE FIX (true base)
    if (e.x <= 0) {
      baseDamage += 2;
      enemies.splice(i, 1);

      if (baseDamage >= 100) {
        alert("💀 You lost! Base destroyed.");
        location.reload();
      }
    }
  }

  // BULLETS
  ctx.fillStyle = "#00D2FF";

  for (let bi = bullets.length - 1; bi >= 0; bi--) {
    let b = bullets[bi];

    b.x += 6;

    ctx.beginPath();
    ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
    ctx.fill();

    for (let ei = enemies.length - 1; ei >= 0; ei--) {
      let e = enemies[ei];

      if (hit(b, e)) {
        e.hp -= damage;
        bullets.splice(bi, 1);

        if (e.hp <= 0) {
          enemies.splice(ei, 1);
          coins += 2;
        }
        break;
      }
    }
  }

  // UI
  document.getElementById("coins").textContent = coins;
  document.getElementById("wave").textContent = wave;
  document.getElementById("damage").textContent = damage;
  document.getElementById("base").textContent = baseDamage;

  requestAnimationFrame(loop);
}
</script>

</body>
</html>
