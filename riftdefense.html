<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Defence</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f1a;
  color: white;
  text-align: center;
}

header {
  background: #1a1a2e;
  padding: 10px;
}

canvas {
  background: #111122;
  display: block;
  margin: 10px auto;
  border: 2px solid #6C5CE7;
}

button {
  background: #6C5CE7;
  border: none;
  padding: 8px 12px;
  color: white;
  margin: 5px;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #00D2FF;
}

#shop {
  display: none;
  background: #1a1a2e;
  padding: 15px;
}
</style>
</head>

<body>

<header>
<h1>🌀 Rift Defence</h1>
<p>Move turret • Survive waves • Upgrade</p>
</header>

<div>
  <button onclick="startGame()">Start</button>
  <button onclick="toggleShop()">Upgrades</button>
</div>

<p>
💰 Coins: <span id="coins">0</span> |
🌊 Wave: <span id="wave">1</span>
</p>

<canvas id="game" width="800" height="400"></canvas>

<!-- SHOP -->
<div id="shop">
  <h2>🛒 Upgrades</h2>
  <button onclick="upgradeFire()">Increase Fire Rate (10 coins)</button>
  <button onclick="upgradeDamage()">Increase Damage (15 coins)</button>
  <p>Click Upgrades again to close</p>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let coins = 0;
let wave = 1;

let turretY = 200;

let fireRate = 600;
let damage = 1;

let enemies = [];
let bullets = [];
let running = false;

// GRID BACKGROUND
function drawGrid() {
  ctx.strokeStyle = "#1f1f3a";

  for (let x = 0; x < 800; x += 40) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, 400);
    ctx.stroke();
  }

  for (let y = 0; y < 400; y += 40) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(800, y);
    ctx.stroke();
  }
}

// TURRET
function drawTurret() {
  ctx.fillStyle = "#6C5CE7";
  ctx.fillRect(50, turretY - 15, 20, 30);
}

// ENEMIES
function spawnEnemy() {
  enemies.push({
    x: 800,
    y: Math.random() * 380 + 10,
    hp: 3 + wave
  });
}

// BULLETS
function shoot() {
  bullets.push({
    x: 70,
    y: turretY
  });
}

// GAME LOGIC
function update() {
  if (!running) return;

  ctx.clearRect(0, 0, 800, 400);
  drawGrid();

  // turret
  drawTurret();

  // enemies
  ctx.fillStyle = "#FF2E88";
  enemies.forEach((e, i) => {
    e.x -= 1 + wave * 0.2;

    ctx.beginPath();
    ctx.arc(e.x, e.y, 10, 0, Math.PI * 2);
    ctx.fill();

    if (e.x < 80) {
      enemies.splice(i, 1);
    }
  });

  // bullets
  ctx.fillStyle = "#00D2FF";
  bullets.forEach((b, i) => {
    b.x += 5;

    ctx.beginPath();
    ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
    ctx.fill();

    enemies.forEach((e, j) => {
      if (Math.abs(b.x - e.x) < 10 && Math.abs(b.y - e.y) < 10) {
        e.hp -= damage;
        bullets.splice(i, 1);

        if (e.hp <= 0) {
          enemies.splice(j, 1);
          coins += 2;
        }
      }
    });
  });

  document.getElementById("coins").textContent = coins;
  document.getElementById("wave").textContent = wave;

  requestAnimationFrame(update);
}

// CONTROLS
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowUp") turretY -= 10;
  if (e.key === "ArrowDown") turretY += 10;
});

// SHOOT LOOP
setInterval(() => {
  if (running) shoot();
}, 600);

// ENEMY LOOP
setInterval(() => {
  if (running) spawnEnemy();
}, 1000);

// WAVE LOOP
setInterval(() => {
  if (running) wave++;
}, 8000);

// START
function startGame() {
  if (!running) {
    running = true;
    update();
  }
}

// SHOP
function toggleShop() {
  const shop = document.getElementById("shop");
  shop.style.display = shop.style.display === "block" ? "none" : "block";
}

function upgradeFire() {
  if (coins >= 10) {
    coins -= 10;
    fireRate = Math.max(100, fireRate - 100);
  }
}

function upgradeDamage() {
  if (coins >= 15) {
    coins -= 15;
    damage++;
  }
}
</script>

</body>
</html>
