<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Hex</title>
<style>
@import url("https://fonts.googleapis.com/css?family=Lato:400,400i,700");

body, label, div, span {
  display: flex;
  justify-content: center;
  align-items: center;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #4c6fff;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: background 0.8s ease;
  min-height: 100vh;
  padding: 20px 0;
  box-sizing: border-box;
}

h1 {
  width: 100%;
  text-align: center;
  color: white;
  text-shadow: 0 0 10px rgba(255,255,255,0.4);
  margin: 10px 0;
}

/* MENU */
#menu {
  position: fixed;
  inset: 0;
  background: #0f0f1a;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.menuBox {
  background: #141428;
  padding: 30px;
  border-radius: 15px;
  border: 3px solid #4c6fff;
  box-shadow: 0 0 25px rgba(76,108,255,0.35);
  text-align: center;
  flex-direction: column;
}

.menuBox h1 { color: #4c6fff; margin-bottom: 10px; }

.menuBox button {
  margin: 10px;
  padding: 12px 20px;
  border: none;
  border-radius: 8px;
  background: #4c6fff;
  color: white;
  cursor: pointer;
  font-weight: bold;
  min-width: 180px; 
}

/* BUTTONS */
button {
  background: linear-gradient(135deg, #4c6fff, #2f3cff);
  color: white;
  border: 1px solid rgba(76,111,255,0.5);
  padding: 10px 18px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
  box-shadow: 0 0 10px rgba(76,111,255,0.25);
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 18px rgba(76,111,255,0.45);
}

.btn-row {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-top: 10px;
}

/* CONTROLS */
.controls {
  display: flex;
  flex-direction: column;
  align-items: center;
}

label, .player {
  height: 30px;
  margin-bottom: 20px;
}

label {
  color: #ffc;
  font: 18px Lato;
}

label input {
  margin-left: 10px;
}

.player {
  position: relative;
  justify-content: space-between;
  width: 220px;
}

.player span {
  color: #ffc;
  font: 18px Lato;
}

.player-num {
  width: 100px;
  justify-content: flex-start;
  outline: none;
  cursor: text;
  white-space: nowrap;
  overflow: hidden;
}

.score {
  justify-content: flex-end;
  width: 20px;
}

input[type="color"] {
  border: 2px solid rgba(255,255,255,0.4);
  border-radius: 6px;
  background: #141428;
  cursor: pointer;
  width: 40px;
  height: 30px;
}

/* TURN INDICATOR */
.turn {
  position: absolute;
  color: #ffc;
  right: -40px;
  font-size: 24px;
  transition: transform 0.3s ease;
}

.p2-turn {
  transform: translateY(45px);
}

/* STATUS */
#status {
  font-size: 22px;
  font-weight: bold;
  color: white;
  text-shadow: 0 0 8px rgba(255,255,255,0.4);
  margin: 15px 0;
  min-height: 30px;
}

/* GAMEPLAY FIELD */
#boardContainer {
  padding: 30px;
  background: rgba(15, 15, 26, 0.7);
  border-radius: 20px;
  border: 3px solid rgba(255, 255, 255, 0.1);
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  margin-top: 10px;
}

.hex-cell {
  fill: rgba(255, 255, 255, 0.12);
  stroke: rgba(255, 255, 255, 0.25);
  stroke-width: 1.5;
  cursor: pointer;
  transition: fill 0.2s, stroke 0.2s, filter 0.2s;
}

.hex-cell:hover:not(.taken) {
  fill: rgba(255, 255, 255, 0.35);
  stroke: rgba(255, 255, 255, 0.6);
}

.hex-cell.taken {
  cursor: default;
}

/* BORDER WALL CONTOURS */
.contour-border {
  stroke-width: 5;
  stroke-linecap: round;
  stroke-linejoin: round;
}
</style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7292845069394911"
     crossorigin="anonymous"></script>
</head>
<body>

<div id="menu">
  <div class="menuBox">
    <h1>🌀 Rift Hex</h1>
    <p style="color:#aaa;">Select Mode</p>
    <button onclick="enterGameMode(1)">1 Player (vs AI)</button>
    <button onclick="enterGameMode(2)">2 Player</button>
  </div>
</div>

<h1>Rift Hex</h1>

<div class="btn-row">
  <button onclick="resetGame()">Reset</button>
  <button onclick="showMainMenu()">Menu</button>
   <button onclick="window.location.href='index.html'" id="backBtn">🏠 Back</button>
</div>
<br>

<div class="controls">
  <label>Grid Size
    <input type="range" min="5" max="11" value="9" id="gridSize" />
  </label>

  <div class="player">
    <span class="player-num" contenteditable="true" id="p1Name" onkeydown="if(event.key==='Enter')event.preventDefault()">Player 1</span>
    <input type="color" value="#4c6fff" id="p1Colour" />
    <span class="score" id="p1Score">0</span>
    <div class="turn" id="turn">●</div>
  </div>

  <div class="player">
    <span class="player-num" contenteditable="true" id="p2Name" onkeydown="if(event.key==='Enter')event.preventDefault()">Player 2</span>
    <input type="color" value="#9b5cff" id="p2Colour" />
    <span class="score" id="p2Score">0</span>
  </div>
</div>

<div id="status">Player 1's turn</div>

<div id="boardContainer">
  <svg id="hexSvg"></svg>
</div>

<script>
let boardSize = 9;
let board = []; 
let currentTurn = "p1"; 
let gameOver = false;
let mode = 2;
let scores = { p1: 0, p2: 0 };
let aiThinking = false;

const hexRadius = 24;
const hexWidth = Math.sqrt(3) * hexRadius;
const hexHeight = 2 * hexRadius;

function getColour(player) {
  return document.getElementById(player === 'p1' ? 'p1Colour' : 'p2Colour').value;
}

function getName(player) {
  return document.getElementById(player === 'p1' ? 'p1Name' : 'p2Name').textContent.trim();
}

function enterGameMode(selectedMode) {
  mode = selectedMode;
  document.getElementById("menu").style.display = "none";
  if (mode === 1) {
    document.getElementById('p2Name').textContent = 'Rift AI';
    document.getElementById('p2Name').contentEditable = 'false';
  } else {
    document.getElementById('p2Name').textContent = 'Player 2';
    document.getElementById('p2Name').contentEditable = 'true';
  }
  initBoard();
}

function initBoard() {
  boardSize = parseInt(document.getElementById("gridSize").value);
  board = Array(boardSize).fill(null).map(() => Array(boardSize).fill(""));
  gameOver = false;
  aiThinking = false;
  currentTurn = "p1";
  
  document.body.style.background = getColour('p1');
  document.getElementById("turn").classList.remove("p2-turn");
  updateStatus();
  renderSVG();
}

function getHexPoints(cx, cy) {
  const points = [];
  for (let i = 0; i < 6; i++) {
    // 0: upper-right, 1: lower-right, 2: bottom, 3: lower-left, 4: upper-left, 5: top
    const angle = (Math.PI / 180) * (60 * i - 30);
    points.push({ x: cx + hexRadius * Math.cos(angle), y: cy + hexRadius * Math.sin(angle) });
  }
  return points;
}

function renderSVG() {
  const svg = document.getElementById("hexSvg");
  svg.innerHTML = "";

  const margin = 30;
  const totalWidth = hexWidth * (boardSize + (boardSize - 1) / 2) + (margin * 2);
  const totalHeight = hexHeight * 0.75 * (boardSize - 1) + hexHeight + (margin * 2);

  svg.setAttribute("width", totalWidth);
  svg.setAttribute("height", totalHeight);

  const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
  group.setAttribute("transform", `translate(${margin}, ${margin})`);
  svg.appendChild(group);

  let cellCorners = {};

  for (let r = 0; r < boardSize; r++) {
    for (let c = 0; c < boardSize; c++) {
      const cx = hexWidth * c + (hexWidth / 2) * r + hexWidth / 2;
      const cy = hexHeight * 0.75 * r + hexRadius;

      const pts = getHexPoints(cx, cy);
      cellCorners[`${r}-${c}`] = pts;

      const polygon = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
      polygon.setAttribute("points", pts.map(p => `${p.x},${p.y}`).join(" "));
      polygon.setAttribute("class", "hex-cell");
      polygon.setAttribute("id", `hex-${r}-${c}`);
      polygon.addEventListener("click", () => handleHexClick(r, c));

      group.appendChild(polygon);
    }
  }

  drawContourBorders(group, cellCorners);
}

function drawContourBorders(parentGroup, cellCorners) {
  const p1Col = getColour('p1');
  const p2Col = getColour('p2');

  let leftContour = [], rightContour = [], topContour = [], bottomContour = [];

  // 1. TOP CONTOUR (Player 2) - Follows row r=0 top peaks
  for (let c = 0; c < boardSize; c++) {
    let h = cellCorners[`0-${c}`];
    if (c === 0) {
      topContour.push(`${h[4].x},${h[4].y}`, `${h[5].x},${h[5].y}`, `${h[0].x},${h[0].y}`);
    } else {
      topContour.push(`${h[5].x},${h[5].y}`, `${h[0].x},${h[0].y}`);
    }
  }

  // 2. BOTTOM CONTOUR (Player 2) - Follows row r=boardSize-1 bottom peaks
  for (let c = 0; c < boardSize; c++) {
    let h = cellCorners[`${boardSize - 1}-${c}`];
    if (c === 0) {
      bottomContour.push(`${h[3].x},${h[3].y}`, `${h[2].x},${h[2].y}`, `${h[1].x},${h[1].y}`);
    } else {
      bottomContour.push(`${h[2].x},${h[2].y}`, `${h[1].x},${h[1].y}`);
    }
  }

  // 3. LEFT CONTOUR (Player 1) - Follows col c=0 left-facing zig-zags
  for (let r = 0; r < boardSize; r++) {
    let h = cellCorners[`${r}-0`];
    if (r === 0) {
      leftContour.push(`${h[5].x},${h[5].y}`, `${h[4].x},${h[4].y}`, `${h[3].x},${h[3].y}`);
    } else {
      leftContour.push(`${h[4].x},${h[4].y}`, `${h[3].x},${h[3].y}`);
    }
  }
  // Connect left line cleanly down to the bottom-left corner node
  let finalLeftHex = cellCorners[`${boardSize - 1}-0`];
  leftContour.push(`${finalLeftHex[2].x},${finalLeftHex[2].y}`);

  // 4. RIGHT CONTOUR (Player 1) - Follows col c=boardSize-1 right-facing zig-zags
  for (let r = 0; r < boardSize; r++) {
    let h = cellCorners[`${r}-${boardSize - 1}`];
    if (r === 0) {
      rightContour.push(`${h[5].x},${h[5].y}`, `${h[0].x},${h[0].y}`, `${h[1].x},${h[1].y}`);
    } else {
      rightContour.push(`${h[0].x},${h[0].y}`, `${h[1].x},${h[1].y}`);
    }
  }
  // Connect right line cleanly down to the bottom-right corner node
  let finalRightHex = cellCorners[`${boardSize - 1}-${boardSize - 1}`];
  rightContour.push(`${finalRightHex[2].x},${finalRightHex[2].y}`);


  const createContourLine = (pts, color) => {
    const pl = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
    pl.setAttribute("points", pts.join(" "));
    pl.setAttribute("class", "contour-border");
    pl.setAttribute("style", `stroke: ${color}; fill: none;`);
    parentGroup.appendChild(pl);
  };

  createContourLine(leftContour, p1Col);
  createContourLine(rightContour, p1Col);
  createContourLine(topContour, p2Col);
  createContourLine(bottomContour, p2Col);
}

function handleHexClick(r, c) {
  if (gameOver || aiThinking || board[r][c] !== "") return;

  claimCell(r, c, currentTurn);

  if (checkWinCondition(currentTurn)) {
    endGame(currentTurn);
    return;
  }

  currentTurn = currentTurn === "p1" ? "p2" : "p1";
  document.getElementById("turn").classList.toggle("p2-turn");
  document.body.style.background = getColour(currentTurn);
  updateStatus();

  if (mode === 1 && currentTurn === "p2" && !gameOver) {
    aiThinking = true;
    setTimeout(executeSmartAIMove, 400);
  }
}

function claimCell(r, c, player) {
  board[r][c] = player;
  const cell = document.getElementById(`hex-${r}-${c}`);
  cell.classList.add("taken");
  cell.style.fill = getColour(player);
  cell.style.filter = `drop-shadow(0 0 6px ${getColour(player)})`;
}

function getNeighbors(r, c) {
  return [
    {r: r-1, c: c}, {r: r-1, c: c+1},
    {r: r,   c: c-1},                 {r: r,   c: c+1},
    {r: r+1, c: c-1}, {r: r+1, c: c}
  ].filter(n => n.r >= 0 && n.r < boardSize && n.c >= 0 && n.c < boardSize);
}

function checkWinCondition(player) {
  let visited = Array(boardSize).fill(null).map(() => Array(boardSize).fill(false));
  let queue = [];

  for (let i = 0; i < boardSize; i++) {
    if (player === "p1" && board[i][0] === "p1") {
      queue.push({r: i, c: 0});
      visited[i][0] = true;
    } else if (player === "p2" && board[0][i] === "p2") {
      queue.push({r: 0, c: i});
      visited[0][i] = true;
    }
  }

  while (queue.length > 0) {
    let curr = queue.shift();
    if (player === "p1" && curr.c === boardSize - 1) return true;
    if (player === "p2" && curr.r === boardSize - 1) return true;

    for (let n of getNeighbors(curr.r, curr.c)) {
      if (!visited[n.r][n.c] && board[n.r][n.c] === player) {
        visited[n.r][n.c] = true;
        queue.push(n);
      }
    }
  }
  return false;
}

function executeSmartAIMove() {
  if (gameOver) return;

  let bestMove = null;
  let highestWeight = -Infinity;

  for (let r = 0; r < boardSize; r++) {
    for (let c = 0; c < boardSize; c++) {
      if (board[r][c] === "") {
        let aiWinUrgency = evaluateCellValue(r, c, "p2");
        let playerBlockUrgency = evaluateCellValue(r, c, "p1");

        let totalWeight = (aiWinUrgency * 1.1) + playerBlockUrgency + (Math.random() * 0.2);

        if (totalWeight > highestWeight) {
          highestWeight = totalWeight;
          bestMove = { r, c };
        }
      }
    }
  }

  aiThinking = false;
  if (bestMove) {
    handleHexClick(bestMove.r, bestMove.c);
  }
}

function evaluateCellValue(r, c, player) {
  board[r][c] = player;
  let remainingDistance = computeShortestPathLength(player);
  board[r][c] = ""; 
  
  if (remainingDistance === 0) return 1000; 
  return (boardSize * 2) - remainingDistance;
}

function computeShortestPathLength(player) {
  let distance = Array(boardSize).fill(null).map(() => Array(boardSize).fill(Infinity));
  let queue = [];

  for (let i = 0; i < boardSize; i++) {
    if (player === "p1") {
      if (board[i][0] === "p1") { distance[i][0] = 0; queue.push({r: i, c: 0}); }
      else if (board[i][0] === "") { distance[i][0] = 1; queue.push({r: i, c: 0}); }
    } else {
      if (board[0][i] === "p2") { distance[0][i] = 0; queue.push({r: 0, c: i}); }
      else if (board[0][i] === "") { distance[0][i] = 1; queue.push({r: 0, c: i}); }
    }
  }

  while (queue.length > 0) {
    let curr = queue.shift();
    let currentCost = distance[curr.r][curr.c];

    if (player === "p1" && curr.c === boardSize - 1) return currentCost;
    if (player === "p2" && curr.r === boardSize - 1) return currentCost;

    for (let n of getNeighbors(curr.r, curr.c)) {
      if (board[n.r][n.c] === (player === "p1" ? "p2" : "p1")) continue; 

      let weight = (board[n.r][n.c] === player) ? 0 : 1;
      if (currentCost + weight < distance[n.r][n.c]) {
        distance[n.r][n.c] = currentCost + weight;
        queue.push(n);
      }
    }
  }
  return Infinity;
}

function endGame(winner) {
  gameOver = true;
  scores[winner]++;
  document.getElementById(`${winner}Score`).textContent = scores[winner];
  document.getElementById("status").textContent = `${getName(winner)} Wins the Match! 🎉`;
}

function updateStatus() {
  if (gameOver) return;
  document.getElementById("status").textContent = `${getName(currentTurn)}'s Turn`;
}

function showMainMenu() {
  document.getElementById("menu").style.display = "flex";
}

function resetGame() {
  initBoard();
}

document.getElementById("gridSize").addEventListener("input", initBoard);

document.getElementById("p1Colour").addEventListener("change", () => {
  if (currentTurn === "p1") document.body.style.background = getColour("p1");
  renderSVG();
  renderCellColorOverrides();
});

document.getElementById("p2Colour").addEventListener("change", () => {
  if (currentTurn === "p2") document.body.style.background = getColour("p2");
  renderSVG();
  renderCellColorOverrides();
});

function renderCellColorOverrides() {
  for (let r = 0; r < boardSize; r++) {
    for (let c = 0; c < boardSize; c++) {
      if (board[r][c] !== "") {
        const cell = document.getElementById(`hex-${r}-${c}`);
        if (cell) {
          cell.style.fill = getColour(board[r][c]);
          cell.style.filter = `drop-shadow(0 0 6px ${getColour(board[r][c])})`;
        }
      }
    }
  }
}
</script>
</body>
