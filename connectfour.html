<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Connect 4</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f0f1a;
    color:white;
    text-align:center;
}

/* ===== YOUR EXACT START MENU STYLE ===== */
#startScreen{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
}

#menu{
    background:#141428;
    border:3px solid #4c6fff;
    border-radius:20px;
    padding:40px;
    width:350px;
    box-shadow:0 0 25px #4c6fff66;
}

#menu h1{
    margin-top:0;
    color:#4c6fff;
}

.modeBtn{
    width:100%;
    margin:8px 0;
    font-size:18px;
    padding:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#4c6fff;
    color:white;
}

.modeBtn.selected{
    background:#6e85ff;
    box-shadow:0 0 15px #4c6fff;
}

/* ===== GAME ===== */
h1{
    color:#4c6fff;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#4c6fff;
    color:white;
    margin:5px;
}

/* BOARD */
#boardWrapper{
    position:relative;
    display:inline-block;
}

#board{
    display:grid;
    grid-template-columns:repeat(7,80px);
    gap:8px;
    justify-content:center;
    margin-top:20px;
    background:#141428;
    padding:15px;
    border-radius:15px;
    border:3px solid #4c6fff;
    box-shadow:0 0 20px #4c6fff55;
}

/* CELLS */
.cell{
    width:80px;
    height:80px;
    border-radius:50%;
    background:#0f0f1a;
    cursor:pointer;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.7);
}

.p1{ background:#4c6fff; box-shadow:0 0 15px #4c6fff; }
.p2{ background:#9b5cff; box-shadow:0 0 15px #9b5cff; }

/* DROP FIX (no shaking bug) */
.drop{
    animation:drop 0.2s ease;
}

@keyframes drop{
    from{transform:translateY(-120px);}
    to{transform:translateY(0);}
}

/* WIN LINE */
#winLine{
    position:absolute;
    height:6px;
    background:linear-gradient(90deg,#4c6fff,#9b5cff);
    box-shadow:0 0 15px #4c6fff;
    border-radius:10px;
    transform-origin:left center;
    z-index:10;
}
</style>
</head>

<body>

<!-- ===== YOUR MENU (UNCHANGED STYLE) ===== -->
<div id="startScreen">
    <div id="menu">
        <h1>Rift Connect 4</h1>
        <p>Select Mode</p>
        <button class="modeBtn" onclick="startGame(1)">1 Player</button>
        <button class="modeBtn" onclick="startGame(2)">2 Players</button>
    </div>
</div>

<h1>Rift Connect 4</h1>

<button onclick="backToMenu()">Back</button>
<button onclick="restart()">Restart</button>

<div id="boardWrapper">
    <div id="board"></div>
</div>

<p id="status"></p>

<script>

const ROWS=6, COLS=7;

let board=[];
let current=1;
let gameOver=false;

const boardEl=document.getElementById("board");
const statusEl=document.getElementById("status");
const wrapper=document.getElementById("boardWrapper");

/* ===== MENU ===== */
function startGame(mode){
    document.getElementById("startScreen").style.display="none";
    init();
}

function backToMenu(){
    document.getElementById("startScreen").style.display="flex";
    resetBoard();
}

/* ===== INIT ===== */
function init(){
    resetBoard();
    draw();
    statusEl.textContent="Player 1 starts";
}

function resetBoard(){
    board=Array.from({length:ROWS},()=>Array(COLS).fill(0));
    current=1;
    gameOver=false;
    clearWinLine();
}

/* ===== DRAW ===== */
function draw(){
    boardEl.innerHTML="";

    for(let r=0;r<ROWS;r++){
        for(let c=0;c<COLS;c++){

            let cell=document.createElement("div");
            cell.className="cell";

            if(board[r][c]===1) cell.classList.add("p1");
            if(board[r][c]===2) cell.classList.add("p2");

            cell.onclick=()=>play(c);
            boardEl.appendChild(cell);
        }
    }
}

/* ===== PLAY ===== */
function play(col){

    if(gameOver) return;

    for(let r=ROWS-1;r>=0;r--){
        if(board[r][col]===0){
            board[r][col]=current;
            draw();

            let path=getWinPath(r,col);

            if(path){
                statusEl.textContent=`Player ${current} wins!`;
                drawWinLine(path);
                gameOver=true;
                return;
            }

            current=current===1?2:1;
            statusEl.textContent=`Player ${current}'s turn`;
            return;
        }
    }
}

/* ===== TRUE WIN PATH ===== */
function getWinPath(r,c){

    let p=board[r][c];

    function dir(dr,dc){
        let cells=[[r,c]];
        let rr=r+dr, cc=c+dc;

        while(rr>=0&&rr<ROWS&&cc>=0&&cc<COLS&&board[rr][cc]===p){
            cells.push([rr,cc]);
            rr+=dr; cc+=dc;
        }
        return cells;
    }

    function check(dr,dc){
        let a=dir(dr,dc);
        let b=dir(-dr,-dc);
        let all=[...a,...b];

        if(all.length>=4){
            return all.slice(0,4);
        }
        return null;
    }

    return (
        check(0,1) ||
        check(1,0) ||
        check(1,1) ||
        check(1,-1)
    );
}

/* ===== PERFECT ANGLED WIN LINE ===== */
function drawWinLine(path){

    clearWinLine();

    let first=path[0];
    let last=path[3];

    let cells=document.querySelectorAll(".cell");

    let start=cells[first[0]*COLS+first[1]].getBoundingClientRect();
    let end=cells[last[0]*COLS+last[1]].getBoundingClientRect();
    let wrap=wrapper.getBoundingClientRect();

    let x1=start.left+40-wrap.left;
    let y1=start.top+40-wrap.top;
    let x2=end.left+40-wrap.left;
    let y2=end.top+40-wrap.top;

    let line=document.createElement("div");
    line.id="winLine";

    let length=Math.hypot(x2-x1,y2-y1);
    let angle=Math.atan2(y2-y1,x2-x1)*180/Math.PI;

    line.style.width=length+"px";
    line.style.left=x1+"px";
    line.style.top=y1+"px";
    line.style.transform=`rotate(${angle}deg)`;

    wrapper.appendChild(line);
}

function clearWinLine(){
    let old=document.getElementById("winLine");
    if(old) old.remove();
}

/* ===== RESTART ===== */
function restart(){
    resetBoard();
    draw();
    statusEl.textContent="Player 1 starts";
}

</script>

</body>
</html>
