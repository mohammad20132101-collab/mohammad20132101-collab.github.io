<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Connect 4</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f0f1a;
    color:white;
    text-align:center;
}

/* HEADER */
h1{
    color:#4c6fff;
    margin-top:15px;
}

/* BUTTON AREA (ABOVE GAME, CENTERED) */
#controls{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:10px;
    margin-bottom:10px;
}

button{
    background:#4c6fff;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    color:white;
    cursor:pointer;
    box-shadow:0 0 12px #4c6fff55;
}

button:hover{
    background:#9b5cff;
    box-shadow:0 0 12px #9b5cff55;
}

/* GAME BOARD */
#board{
    display:grid;
    grid-template-columns:repeat(7,80px);
    gap:8px;
    justify-content:center;
    margin-top:10px;
    background:#141428;
    padding:15px;
    border-radius:15px;
    border:3px solid #4c6fff;
    box-shadow:0 0 20px #4c6fff55;
}

/* CELLS */
.cell{
    width:80px;
    height:80px;
    border-radius:50%;
    background:#0f0f1a;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* PIECES */
.player1{
    background:#4c6fff;
    box-shadow:0 0 15px #4c6fff;
}

.player2{
    background:#9b5cff;
    box-shadow:0 0 15px #9b5cff;
}

/* WIN HIGHLIGHT (OPPOSITE COLOR RULE) */
.win-blue{
    box-shadow:0 0 25px #9b5cff, 0 0 40px #9b5cff;
}

.win-purple{
    box-shadow:0 0 25px #4c6fff, 0 0 40px #4c6fff;
}
</style>
</head>

<body>

<h1>🌀 Rift Connect 4</h1>

<div id="controls">
    <button onclick="resetGame()">Reset Rift</button>
</div>

<div id="board"></div>

<h2 id="status">Blue's turn</h2>

<script>

const ROWS = 6;
const COLS = 7;

let board = [];
let current = "player1";
let gameOver = false;

// INIT
function init(){
    board = Array.from({length:ROWS}, ()=>Array(COLS).fill(null));
    createBoard();
}

// CREATE BOARD
function createBoard(){
    const boardEl = document.getElementById("board");
    boardEl.innerHTML="";

    for(let r=0;r<ROWS;r++){
        for(let c=0;c<COLS;c++){
            const cell = document.createElement("div");
            cell.classList.add("cell");
            cell.dataset.col = c;
            cell.onclick = () => drop(c);
            boardEl.appendChild(cell);
        }
    }
}

// DROP PIECE
function drop(col){
    if(gameOver) return;

    for(let r=ROWS-1;r>=0;r--){
        if(!board[r][col]){
            board[r][col] = current;
            render();

            if(checkWin(r,col)){
                win(current);
                return;
            }

            current = current === "player1" ? "player2" : "player1";
            updateStatus();
            return;
        }
    }
}

// RENDER
function render(){
    const cells = document.querySelectorAll(".cell");

    for(let i=0;i<cells.length;i++){
        cells[i].className="cell";
    }

    for(let r=0;r<ROWS;r++){
        for(let c=0;c<COLS;c++){
            let val = board[r][c];
            if(val){
                let idx = r*COLS+c;
                cells[idx].classList.add(val);
            }
        }
    }
}

// WIN CHECK (FIXED: 4 IN A ROW)
function checkDir(r,c,dr,dc){
    let count=0;
    let player = board[r][c];

    r+=dr;
    c+=dc;

    while(
        r>=0 && r<ROWS &&
        c>=0 && c<COLS &&
        board[r][c] === player
    ){
        count++;
        r+=dr;
        c+=dc;
    }

    return count;
}

function checkWin(r,c){
    return (
        checkDir(r,c,1,0) + checkDir(r,c,-1,0) >= 3 ||
        checkDir(r,c,0,1) + checkDir(r,c,0,-1) >= 3 ||
        checkDir(r,c,1,1) + checkDir(r,c,-1,-1) >= 3 ||
        checkDir(r,c,1,-1) + checkDir(r,c,-1,1) >= 3
    );
}

// WIN HANDLER (FIXED TEXT + OPPOSITE COLOR LINE)
function win(player){
    gameOver = true;

    const status = document.getElementById("status");

    if(player === "player1"){
        status.textContent = "Blue wins";
        highlightWin("win-purple"); // opposite colour line
    } else {
        status.textContent = "Purple wins";
        highlightWin("win-blue");
    }
}

// HIGHLIGHT WINNING PIECES (simple glow all same player pieces)
function highlightWin(cls){
    const cells = document.querySelectorAll(".cell");

    cells.forEach(cell=>{
        if(cell.classList.contains("player1") || cell.classList.contains("player2")){
            cell.classList.add(cls);
        }
    });
}

// STATUS
function updateStatus(){
    document.getElementById("status").textContent =
    current === "player1" ? "Blue's turn" : "Purple's turn";
}

// RESET
function resetGame(){
    current = "player1";
    gameOver = false;
    updateStatus();
    init();
}

// START
init();

</script>

</body>
</html>
