<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Word</title>

<style>
body{
  margin:0;
  background:#0B1020;
  color:#F5F9FF;
  font-family:Arial,sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

h1{color:#3B82F6}

#board{
  display:grid;
  grid-template-columns:repeat(5,64px);
  gap:6px;
  margin:15px;
}

.tile{
  width:64px;height:64px;
  background:#131B35;
  border:2px solid #22325F;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
  font-weight:bold;
  text-transform:uppercase;
}

.correct{background:#22c55e !important; color:white;}
.present{background:#eab308 !important; color:#111;}
.absent{background:#475569 !important; color:white;}

.rowshake{animation:shake .4s}
@keyframes shake{
  25%{transform:translateX(-6px)}
  50%{transform:translateX(6px)}
  75%{transform:translateX(-6px)}
}

.flip{animation:flip .5s}
@keyframes flip{
  50%{transform:rotateX(90deg)}
  100%{transform:rotateX(0)}
}

.pop{animation:pop .12s}
@keyframes pop{
  50%{transform:scale(1.12)}
}

.keyboard{max-width:520px}
.krow{display:flex;justify-content:center;margin:4px}

.key{
  margin:2px;
  padding:12px 10px;
  border:none;
  border-radius:4px;
  background:#22325F;
  color:white;
  cursor:pointer;
  font-weight:bold;
}

.key.big{padding:12px 14px}

/* KEYBOARD COLORS */
.key.correct{background:#22c55e;color:white}
.key.present{background:#eab308;color:#111}
.key.absent{background:#475569;color:white}

#popup{
  position:fixed;
  top:20px;
  background:#111827;
  padding:10px 16px;
  border-radius:8px;
  display:none;
}
</style>
</head>

<body>

<h1>Rift Word</h1>

<div class="controls">
  <button onclick="location.href='./'">⬅ Back</button>
  <button onclick="location.reload()">🔄 Restart</button>
</div>

<div id="popup"></div>
<div id="board"></div>
<div id="keyboard"></div>

<script>
const words = [/* your full list unchanged */ 
'aback','abaft','abase','abate','abbey','abbot','abhor','abide','abler','abode','about','above','abuse','abyss','ached','aches','acids','acorn','acres','acrid','acted','actor','acute','adage','adapt','added','adder','adept','adieu','admit','adobe','adopt','adore'
];

const valid = new Set(words);

const answer = words[Math.floor(Math.random()*words.length)];

let row = 0, col = 0, gameOver = false;

const board = document.getElementById("board");
const kb = document.getElementById("keyboard");

/* create board */
for(let i=0;i<30;i++){
  let d=document.createElement("div");
  d.className="tile";
  board.appendChild(d);
}

function tile(r,c){
  return board.children[r*5+c];
}

function popup(t){
  let p=document.getElementById("popup");
  p.textContent=t;
  p.style.display='block';
  setTimeout(()=>p.style.display='none',1500);
}

function typeLetter(ch){
  if(gameOver||col>=5) return;
  let t=tile(row,col);
  t.textContent=ch;
  t.classList.add("pop");
  setTimeout(()=>t.classList.remove("pop"),120);
  col++;
}

function backspace(){
  if(gameOver||col===0) return;
  col--;
  tile(row,col).textContent="";
}

/* KEYBOARD COLOR LOGIC */
function colorKey(letter, cls){
  document.querySelectorAll(".key").forEach(k=>{
    if(k.dataset.l !== letter) return;

    if(k.classList.contains("correct")) return;
    if(k.classList.contains("present") && cls === "absent") return;

    k.classList.remove("correct","present","absent");
    k.classList.add(cls);
  });
}

function enterGuess(){
  if(gameOver) return;

  if(col < 5){
    popup("Not enough letters");
    return;
  }

  let guess = "";
  for(let i=0;i<5;i++){
    guess += tile(row,i).textContent.toLowerCase();
  }

  if(!valid.has(guess)){
    popup("Not in word list");
    for(let i=0;i<5;i++){
      tile(row,i).classList.add("rowshake");
      setTimeout(()=>tile(row,i).classList.remove("rowshake"),400);
    }
    return;
  }

  let counts = {};
  for(let ch of answer) counts[ch]=(counts[ch]||0)+1;

  let res = Array(5).fill("absent");

  for(let i=0;i<5;i++){
    if(guess[i] === answer[i]){
      res[i]="correct";
      counts[guess[i]]--;
    }
  }

  for(let i=0;i<5;i++){
    if(res[i]==="correct") continue;
    if(counts[guess[i]]>0){
      res[i]="present";
      counts[guess[i]]--;
    }
  }

  for(let i=0;i<5;i++){
    let t=tile(row,i);
    setTimeout(()=>{
      t.classList.add("flip",res[i]);
      colorKey(guess[i],res[i]);
    }, i*250);
  }

  if(guess === answer){
    setTimeout(()=>popup("🎉 You won!"),1400);
    gameOver=true;
    return;
  }

  row++;
  col=0;

  if(row>=6){
    setTimeout(()=>popup("Word: "+answer),1400);
    gameOver=true;
  }
}

/* keyboard */
const rows=["QWERTYUIOP","ASDFGHJKL","ZXCVBNM"];

rows.forEach((r,i)=>{
  let div=document.createElement("div");
  div.className="krow";

  if(i===2){
    let e=document.createElement("button");
    e.textContent="Enter";
    e.className="key big";
    e.onclick=enterGuess;
    div.appendChild(e);
  }

  for(let ch of r){
    let b=document.createElement("button");
    b.className="key";
    b.dataset.l=ch.toLowerCase();
    b.textContent=ch;
    b.onclick=()=>typeLetter(ch);
    div.appendChild(b);
  }

  if(i===2){
    let b=document.createElement("button");
    b.textContent="⌫";
    b.className="key big";
    b.onclick=backspace;
    div.appendChild(b);
  }

  kb.appendChild(div);
});

document.addEventListener("keydown",e=>{
  if(/^[a-z]$/i.test(e.key)) typeLetter(e.key.toUpperCase());
  else if(e.key==="Backspace") backspace();
  else if(e.key==="Enter") enterGuess();
});
</script>

</body>
</html>
